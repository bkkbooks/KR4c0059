front:
  text: 唐賈浪仙長江集卷第五
  hash: sha256:ec255f231d063cc7f47dd6479820884ea37d382d41cdc1a70973f99763af3900
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0059_SBCK_005-1a}
body:
  text: 普州司倉叅軍范陽賈島浪仙送雍陶入蜀江山事若諳那肯滯雲南草色分危磴杉隂近古潭日斜褒谷鳥夏淺嶲州蠶吾自疑雙鬂相逢更不堪張郎中過原東居年長惟添懶經旬止掩關高人餐藥後下馬此林間對坐天將暮同來客亦閑幾時能重至水味似深山答王建祕書人皆聞蟋蟀我獨恨蹉跎白髪無心鑷靑山去意多信來漳浦岸期負洞庭波時掃高槐影朝廽或恐過送李餘往湖南昔去候温凉秋山滿椘鄊今來從辟命春物徧涔陽嶽石挂海雪野楓堆渚檣若尋吾祖宅寂寞在瀟湘偶作野歩隨吾意那知是與非稔年時雨足閏月暮蟬稀獨樹依岡老遥峰出草㣲園林自有主宿鳥且同歸過雍秀才居夏木鳥巢邊終南嶺色鮮就凉安坐石煑茗汲隣泉鍾逺淸霄半蜩稀暑雨前幽齋如葺罷約我一來眠寄顧非熊知君歸有處山水亦難齊猶去瀟湘逺不聞猿狖啼穴通茆嶺下潮滿石頭西獨立生遥思秋原日漸低送神邈法師栁絮落濛濛西州道路中相逢春忽盡獨去講𥘉終行疾遥山雨眠遲後夜風遶房三兩樹廽去葉應紅送慈恩寺霄韻法師謁太原李司空何故謁司空雲山知幾重磧遥來鴈盡雪急去僧逢淸磬先寒角禪燈徹曉烽舊房閑片石倚著最高松送知興上人久住巴與寺如今始拂衣欲臨秋水別不向故園歸錫挂天涯樹房𨳩嶽頂扉下㸔萬里暁霜海日生㣲送恵雅法師歸玉泉秪到瀟湘水洞庭湖未遊飲泉㸔月別下峽聽猿浮講不停雷雨吟當一作曽近海流降霜歸楚夕星冷玉泉秋憶江上吳處士閩國揚帆去蟾蜍虧復圎秋風吹渭水落葉滿長安此地聚會夕當時雷雨寒蘭橈殊未返消息海雲端題張愽士新居靑楓何不種林在洞庭村應爲三湘逺難移萬里根斗牛𥘉過伏􅔽蓞欲香門一作斗移亭北榭蓮照水邊門舊即湖山隱新廬葺此原石門陂留辭從叔謩幽烏飛不逺此行千里間寒衝陂水霧醉下菊花山有耻長爲客無成又入關何時臨澗栁吾黨共來攀送朱兵曹廽越星彩練中見澄江豈有泥潮生垂釣罷楚盡去檣西磧鳥辭沙至山鼯隔水啼會稽半侵海濤白禹祠溪懷慱陵故人孤城易水頭不忘舊交遊雪壓圍碁石風吹飲酒樓路遥千萬里人別十三秋吟苦相思處天寒水急流夕思秋宵巳難曙漏向二更分我憶山水坐蟲當寂寞聞洞庭風落木天姥月離雲㑹自東浮去將何欲致君寄河中楊少尹非惟咎曩時投刺詣門遟悵望三秋後參差萬里期禹留䟽鑿跡舜在寂寥祠此致杳難共廽風逐所思孟融逸人孟君臨水居不食水中魚衣褐唯麄帛筐箱秪素書樹林幽鳥戀世界此心踈擬棹孤舟去何峰又結廬晚晴見終南諸峰秦分一作下積多峰連巴勢不窮半旬藏雨裏此日到窓中圎魄將昇兎高空一作虚欲呌鴻故山思不見碣石泬寥東宿池上泉來從絶壑亭敞在中流竹宻無空岸松長可絆舟蟪蛄潭上夜河漢島前秋異夕一作日期深漲携琴却此遊喜姚郎中自杭州廽路多楓樹林累日泊淸隂來去泛流水翛然適此心一披江上作三起月中吟東省期司諌雲門悔不尋送鄭長史之嶺南雲林頗重疊岑渚復幽竒汨水斜陽岸騷人正側祠蒼梧多蟋蟀白露濕江籬擢第榮南去晨昏近九疑送李溟謁宥州李權使君英雄典宥州迢逓苦吟遊風宿驪山下月斜㶚水流去時𥘉落葉囬日定無秋太守携才子㸔鵬百尺樓永福湖和楊鄭州積水還平岸春來引鄭溪舊渠通郭下新堰絶湖西嵩少分明對瀟湘濶狹齊客遊隨庻子孤嶼草萋萋題長江言心俱好静𪠘署落暉空歸吏封宵鑰行蛇入古桐長江頻雨後明月衆星中若任遷人去西浮與剡通泥陽館客愁何併起暮送故人囬廢館秋螢出空城寒雨來夕陽飄白露樹影掃靑苔獨坐離容慘孤燈照不開送徐員外赴河中原野正蕭瑟中間分散情吏從甘扈罷詔許朔方行邉日沉殘角河關截夜城雲居閑獨往長老出房迎送賀蘭上人野僧來別我略坐傍泉沙逺道擎空鉢深山踏落花無師禪自觧有格句堪誇此去非緣事孤雲不定家送令狐綯相公梁園趨㦸節海草幾枯春風水難遭便差池未振鱗姓名猶語及門舘阻何因苦擬修文卷重擎獻匠人吟㸔靑島處朝退赤墀晨根愛杉栽活枝憐雪霰新綴篇嗟調逸不和揣才貧早晚還霖雨滂沱洗月輪揠苗方滅列成器待陶鈞困坂思廽顧迷邦輙問津數行望外扎絶句握中珍是日榮遊汴當時怯徃陳鴻舂乖漢爵禎病卧漳濵岳整五千仭雲惟一片身故山離未死離一作心秋水宿經旬下第能無恧高科恐有神罷耕田料廢省釣岸應榛慷慨知音在誰能淚墮巾寄滄州李尚書滄溟深絶濶西岸郭東門弋者羅夷鳥桴人思嶠猿威稜高臘洌煦育極春温陂淀封疆内兼葭壁壘根揺鞞邉地脉愁箭虎狼魂水縣賣紗市塩田煑海村枝條分御葉家世食唐恩武可縱橫講功從戰伐論天涯生月片嶼頂湧泉源非是泥池物方因雷雨尊沉謀藏未露隣境帖無喧靑塜驕囬鶻蕭關䧟吐蕃何時霖歲旱早晩雪邦冤迢逓瞻旌纛浮陽寄詠言逢舊識幾歲阻干戈今朝勸酒歌羡君無白髪走馬過黃河舊宅兵燒盡新宫日奏多妖星還有角數尺鐵重磨崇聖寺斌公房近來惟一食樹下掩禪扉落日寒山磬多年壞衲衣白鬚長更剃靑靄逺還歸仍說遊南岳經行是息機送李傅侍郎劍南行營走馬從邉事新恩受外臺勇㸔雙節出期破八蠻囬許國家無戀盤江棧不摧移軍刀斗逐報捷劍門開角咽獼猴呌鼙乾霹靂來去年新甸邑猶滯佐時才別徐明府抱琴非本意生事偶相縈口尚袁安節身無子賤名地春寒雪盛山淺夕風輕百戰餘荒野千夫漸偶耕一盃宜獨夜孤客戀交情明日疲驂去蕭條過古城岐下送友人歸襄陽蹉跎隨汎梗羈旅到西州舉翮籠中鳥知心海上鷗山光分首暮草色向家秋若更登高峴㸔碑定淚流送友人遊蜀萬岑深積翠路向此中難欲暮多羈思因高莫逺㸔卓家人寂寞揚子業凋殘唯有岷江水悠悠帶月寒送鄭少府江岸一相見空令惜此分夕陽行帶月酌水少留君野地𥘉燒草荒山過雪雲明年還調集蟬可在家聞子規遊魂自相呌寜復記前身飛過隣家月聲連野路春夢邊催暁急愁處送風頻自有霑花血相和雨滴新送僧歸天台辭秦經越過歸寺海西峰石磵雙流水山門九里松曾聞清禁漏却聽赤城鍾妙宇研磨講應齊智者蹤唐賈浪仙長江集卷第五
