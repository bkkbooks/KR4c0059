front:
  text: 唐賈浪仙長江集卷第十
  hash: sha256:5bc74dfb112ad279e556867669a4878d05f77e8996432946dbc7e3909a3f1b4b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0059_SBCK_010-1a}
body:
  text: 普州司倉參軍范陽賈島浪仙早秋寄題天竺靈隱寺峰前峰後寺新秋絶頂高窗見沃州人在定中聞蟋蟀鶴從棲處挂獼猴山鍾夜度空江水汀月寒生古石樓心憶懸帆身未遂謝公此地昔年遊黎陽寄姚合魏都城裏曾遊熟才子齋中止泊多去日緑楊垂紫陌歸時白草夾黃河新詩不覺千廽詠古鏡曾經幾度磨惆悵心思滑臺北滿杯濃酒與愁和送崔約秀才歸寧髣佛三千里月向船窗見幾宵野鼠獨偷高樹果前山漸見短禾苗更深柵鎖淮波疾葦動風生雨氣遙重入石頭城下寺南朝杉老未乾燋詠懷縱把書看未省勤一生生計秪長貧可能在世無成事不覺離家作老人中嶽深林秋獨往南原多草夜無鄰經年抱疾誰來問野鳥相過啄木頻夏日寄高洗馬三十年來長在客兩三行淚忽然垂白衣蒼鬢經過懶赤日朱門偃息遲花發應耽新熟酒草顚還寫早朝詩不緣馬死西州去畫角堪聽是曉吹送周判官元範赴越原下相逢便別離蟬鳴關路使廽時過淮漸有懸帆興到越應將墜葉期城上秋山生菊早驛西寒渡落潮遲巳曾幾遍隨旌斾去謁荒郊大禹祠送羅少府歸牛渚作尉長安始三日忽思牛渚夢天台楚山逺色獨歸去灞水空流相送回霜覆鶴身松子落月分螢影石房開白雲多處應頻到寒澗泠泠漱古苔題童真上人江上修持積歲年灘聲未擬住潺湲誓從五十身披衲便向三千界坐禪月峽靑城那有滯天台廬嶽豈無緣昨宵息夢遊滄海萬里波濤在目前贈溫觀主一別羅浮竟未還觀深廊古院多關君來幾日行虛洞仙去空壇在逺山胎息存思當黑處井華懸綆取朝間弊廬道室雖鄰近自樂冬陽炙背間賀龎少尹除太常少卿太白山前終日見十旬假滿擬秋尋中峰絶頂非無路北闕除書阻入林朝謁此時間野屐宿齋何處止鳴砧省中石鐙陪隨步唯賞煙霞不猒深上邠寧邢司徒箭頭破帖渾無敵杖底𫾣毬逺有聲馬走千蹄朝萬乘地分三郡擁雙旌春風欲盡山花發曉角初吹客夢驚不是邢公來鎮此長安西北未能行欲遊嵩嶽留別李少尹益孤䇿遲廽洛水湄孤禽嘹唳幸人知嵩嶽望中常待我河梁欲上未題詩新秋愛月愁多雨古觀逢仙看盡碁微眇此來將敢問鳯凰何日定一作始歸池病鶻吟俊鳥還投高處栖騰身戞戞下雲梯有時透霧凌空去無事隨風入草迷迅疾月邊捎玉兔遲廽日裏拂金雞不緣毛羽遭零落焉肯雄心向爾低贈僧從來多是遊山水省泊禪舟月下濤𥘉過石橋年尚少久辭天柱臘應高靑松帶雪懸銅錫白髮如霜落鐵刀常恐畫工援筆寫身長七尺有眉毫贈翰林淸重無一作可過知內制從前禮絶外庭人看花在處多隨駕召宴無時不及身馬自賜來騎覺穩詩緣見徹語長新應憐獨向名場苦曾十餘年浪過春頌得上賈常侍邉臣説使朝天子發語轟然激夏雷高節羽書期獨傳分符綘郡滯長材啁啾鳥恐鷹鸇起流散人歸父母來自顧此身無所立恭談祖德朵頥開田將軍書院滿庭花木半新栽石自平湖逺岸來笋迸鄰家還長竹地經山雨幾層苔井當深夜泉微上閣入高秋戶盡開行背曲江誰到此琴書鎖著未朝廽投龎少尹閉戶息機搔白首中庭一樹有淸隂年年不改風塵趣日日轉多泉石心病起望山臺上立覺來聽雨燭前吟龎公相識元和歲春分依依直至今夏夜登南樓水岸寒一作間樓帶月躋夏林𥘉見嶽陽溪一點新螢報秋信不知何處一作樹是菩提題靑龍寺碣石山人一軸詩終南山北數人知擬看青龍寺裏月待無一點夜雲時贈李文通營當萬勝岡頭下誓立千年不朽功天子手擎新鉞斧諌官請贈李文通題虢州三堂吳郎中無窮草樹昔誰栽新起臨湖白石臺半岸泥沙孤鴈立三堂風雨四門開荷翻團一作圎露驚秋近栁轉斜陽過水來昨夜北樓堪朗詠虢城𥘉鎖月徘徊送僧池上時時松雪落焚香煙起見孤燈靜夜憶誰來對坐油江南岸寺中僧三月晦日贈劉評事三月正當三十日風光別我苦吟身共君今夜不須睡未到曉鍾猶是春送張道者新歲抱琴何處去洛陽三十六峰西生來未識山人面不得一聽烏夜啼題魚尊師院老子堂前花萬樹先生曾見幾廽春夜煎白石平明喫不擬教人哭此身宿村家亭子牀頭枕是溪中石井底泉通竹下池宿客未眠過夜半獨聞山雨到來時送稱上人歸蜀擬從巫峽過何時得入舊房禪寺中來後誰身化起塔栽松向野田楊祕書新居城角新居鄰靜寺時從新閣上經樓南山泉入宫中去先向詩人門外流聼樂山人彈易水朱絲弦底燕泉急燕將雲孫白日彈嬴氏歸山陵已掘聲聲猶帶髮衝冠經蘇秦墓沙埋古篆折碑文六國興亡事計一作繫君今日淒涼無處説亂山秋盡有寒雲題戴勝星點花冠道士衣紫陽宮女化身飛能傳上界春消息若到蓬山莫放歸題隱者居雖有柴門長不關片雲孤木伴身間猶嫌住久人知處見擬移家更上山哭孟東野蘭無香氣鶴無聲哭盡秋天月不明自從東野先生死側近雲山得散行過京索先生墳京索先生三尺墳秋風漠漠吐寒雲從來有恨君多哭今日何人更哭君客思促織聲尖尖似針更深刺著旅人心獨言獨語月明裏驚覺眠童與宿禽鹽池院觀鹿條峰五老勢相連此鹿來從若箇邊別有野麋人不見一生長飲白雲泉唐賈浪仙長江集卷第十
