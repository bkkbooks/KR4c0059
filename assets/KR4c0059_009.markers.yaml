  - {type: line-break, offset: 0, content: '', id: KR4c0059_SBCK_009-1a01}
  - {type: variant, offset: 0, length: 1869, content: 唐賈浪仙長江集卷第九普州司馬叅軍范陽賈島浪仙巴興作三年未省聞鴻呌九月何曾見草枯寒暑氣均思白社星辰正別憶皇都蘇卿持節終還漢葛相行師自渡瀘鄊味朔山林果位北歸期掛海帆孤早蟬早蟬孤抱芳槐葉噪向殘陽意度秋也任一聲催我老堪聽兩耳畏吟休得非下第無高韻湏是靑山隱白頭若問此心嗟嘆否天人不可怨而尤投元郎中心在瀟湘歸未期卷中多是得名詩髙臺聊望淸秋色片水堪留堪一作難白鷺鷥省宿有時聞急雨朝廽盡日伴禪師舊文去歲曾將獻蒙與人來說始知阮籍嘯臺如聞長嘯春風裏荆棘叢邉訪舊踪地接蘇門山近逺荒臺突兀抵髙峰滕校書使院小池小池誰見鑿時𥘉走水南來十里餘樓上日斜吹暮角院中人出鏁遊魚送陜府王司馬司馬雖然聽暁鐘尚猶髙枕恣踈慵請持僧過三門水賣藥人歸五老峰移舫緑隂深處息登樓凉夜此時逢杜陵惆悵臨相一作岐餞未寢月前多屐蹤上谷旅夜世難那堪恨旅遊龍鍾更是對窮秋故園千里數行淚隣杵一聲終夜愁月到寒窓空皓皛風翻落葉更颼飀此心不向常人說倚識平津萬戸侯寄無得頭陀夏臘今應三十餘不離樹下塜間居貌堪良匠抽毫冩行稱高僧續傳書落澗水聲來逺逺當空月色自如如白衣只在靑門裏心毎相親跡且踈崔卿池上雙白鷺鷺雛相逐出深籠頂各有絲莖數同灑石多霜移足冷隔城逺樹挂巢空其如盡在灘聲外何似雙飛浦色中見此池潭卿自鑿淸冷太液底潜通送胡道士短褐身披滿漬苔靈溪深處觀門開却從城裏移琴去許到山中寄藥來臨水古壇秋醮罷宿杉幽鳥夜飛廽丹梯願逐眞人上日久歸心白髪催寄韓潮州愈此心曾與木蘭舟直到天南潮水頭隔嶺篇章來華岳出關書信過瀧流峰懸驛路殘雲㫁海浸城根一作闉老樹秋一夕瘴烟風卷盡月明𥘉上浪西樓詶張籍王建踈林荒宅古坡一作陂前久住還因太守憐漸老更思深處隱多閑數得上方眠䑕抛貧屋收田日雁度寒江擬雪天身是龍鍾應是分水曹芸閣枉來篇逢愽陵故人彭兵曹曲陽分散會京華見說三年住海涯別後觧餐蓬虆子向前未識牡丹花偶逢日者教求禄終傍泉聲擬置家踏雪携琴相就宿夜深開戸斗牛斜贈牛山人二十年中餌茯苓致書半是老君經東都舊住商人宅南國新修道士亭鑿石養蜂休買蜜坐山秤藥不争星古來隱者多能卜欲就先生問丙丁送于中丞使廽紇册立君立天驕發使車冊文字字著金書漸通靑塜鄊山盡欲逹皇情譯語𥘉調角寒城邉色動下霜秋磧雁行踈旌旌來住幾多日應向途中見歲除送劉侍御重使江西時當苦熱逺行人石壁飛泉濺馬身又到鍾陵知務大還浮湓浦屬秋新早程猿呌雲深極宿舘禽驚葉動頻前者已聞廉使薦兼言有畫静邉塵贈圎上人誦經千𥿄得爲僧麈尾持行不拂蠅古塔月高聞呪水新壇日午見燒燈一雙童子澆紅藥百八眞珠貫綵繩且說近來心裏事仇讎相對似親朋處州李使君改任遂州因寄贈庭樹幾株隂入戸主人何在客聞蟬鑰開原上高樓鏁瓶汲池東古井泉趂静野禽曾後到休吟隣叟始安眠仙都山水誰能憶西去風濤書滿船酬慈恩寺文郁上人袈裟影入禁池淸猶憶鄊山近赤城籬落鏬間寒蟹過莓苔石上晚蛩行期登野閣閑應甚阻宿山房疾未平聞說又尋南岳去無端詩思忽然生訪鑒玄師姪維摩靑石講𥘉休縁訪親宗到普州我有軍持憑弟子岳陽溪裏汲寒流夜坐蟋蟀漸多秋不淺蜍蟾巳没夜應深三更兩鬂幾枝雪一念雙峰四祖心送別門外便伸千里別無車不得到河梁高樓直上百餘尺今日爲君南望長聞蟬感懷新蟬忽發最高枝不覺立聽無限時正遇友人來告別一心分作兩般悲夏夜上谷宿開元寺詩成一夜月中題便卧松風到曙雞帶月時聞山鳥語郡城知近武陵溪送于㧾持歸京出家𥘉隷何方寺上國西明御水東却見舊房堦下樹別來二十一春風崔卿池上鶴月中時呌葉紛紛不異洞庭霜夜聞翎羽如今從放長猶能飛起向孤雲田中丞高亭高亭林表逈嵳峩獨坐秋宵不寢多玉兎玉人歌裏出白雲誰似莫相和友人婚楊氏催粧不知今夕是何夕催促陽臺近鏡臺誰道芙蓉水中種靑銅鏡裏一枝開酬朱侍御望月見寄他寢一作今此時吾不寢近秋三五月逢晴相思唯有霜臺月望盡孤光見却生題韋雲叟草堂新起此堂開北窓當窓山隔一重江白茅草苫重重宻愛此秋天夜雨淙和韓吏部泛南溪溪裏晚從池岸出石泉秋急夜深聞木蘭船共山人上月映渡頭零落雲方鏡背如刀截機頭錦面似升量澗底泉銅雀臺南秋日得照來照去巳三千詶姚合黍穗豆苗侵古道晴原午後早秋時故人相憶僧來說楊栁無風蟬滿枝送靈應上人遍叅尊宿遊方久名岳竒峰問此公五月半間㸔瀑布靑城山裏白雲中贈丘先生常言喫藥全勝飯華岳松邉採茯神不遣髭鬚一莖白擬爲白日上昇人渡桑乾客舎并州已十霜歸心日夜憶咸陽無端更渡桑乾水却望并州是故鄊夜期嘯客不至逸人期宿石牀中遣我閑扉對晚空不知何處嘯秋月閑著一作閉松門一夜風夜集烏行中所居環爐促席復持杯松院雙扉向月𨳩座上同聲半先逹名山獨入此心來贈梁浦秀才斑竹拄杖㨂得林中最細枝結根石上長身遲莫嫌滴瀝紅斑少恰似一作是湘妃淚盡時尋石甕寺上方野寺入時春雪後﨑嶇得到此房前老僧不出迎朝客巳住上方三十年唐賈浪仙長江集卷第九, WYG: ''}
