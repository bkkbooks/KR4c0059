  - {type: variant, offset: 6, length: 0, content: '', WYG: 島之謫也唐書本傳謂在文宗時王定保摭言謂在武宗時晁公武讀書志謂長江祠中有宣宗大中九年墨制石刻陳振孫書録解題亦稱遂寧刋本首載此制二人皆辨其非今攷集中巻二有寄令狐相公詩不署其名巻五有送令狐綯相公詩巻六有謝令狐綯相公賜衣九事詩又有寄令狐綯相公詩二首則顯出綯名攷綯本傳其為相在大中四年十月與石刻墨制年號相合然韓愈送無本師歸}
  - {type: page-break, offset: 6, content: '', id: KR4c0059_WYG_000-1b, image: WYG1078/WYG1078-0389b.png}
  - {type: indent, offset: 8, content: 　, id: KR4c0059_krp_010-bkkind2}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 詩年譜在元和六年本傳載島卒時年五十六從大中九年逆數至元和六年凡四十五年則愈贈詩時島纔十二嵗自長江移普州又在其後則愈贈詩時島不滿十嵗恐無此理今檢寄綯諸詩皆在長江以後嵗月尚無顯證至送綯詩中有梁園趍旌節句又有是日榮遊汴當時怯往陳句當是楚鎮河中之時綯未嘗為是官殆原集但作令狐相公遂寧本各増一綯字以遷就大中九年之制經晁陳二家辨明故後來刋本削去此制而詩題所妄増則未及改正耳晁氏稱長江集十巻詩三百七十九首此本共存三百七十八首僅佚其一蓋猶舊本唐音統籖載島送無可上人詩獨行潭底影數息樹邊身二句之下自註一絶云二句三年得一吟雙淚流知音如不賞歸臥故山秋晁氏其併此數之為三百七十九耶集中劍客一首明代選本末二句皆作今日把示君誰有不平事惟舊本才調集誰有作誰為馮舒兄弟嘗論之以有字為後人妄改此集正作誰為然則猶舊本之未改者矣乾隆四十三年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書長江集巻一唐}
  - {type: page-break, offset: 8, content: '', id: KR4c0059_WYG_000-2a, image: WYG1078/WYG1078-0390a.png}
