  - {type: variant, offset: 12, length: 0, content: '', WYG: 投李益四十歸燕字千年外始吟已將書北嶽不用比南金弔孟協律才行古人齊生前品位低葬時貧賣馬逺日哭惟妻孤塚北邙外空齋中嶽西集詩應萬首物象徧曾題送人適越髙城滿夕陽何事欲霑裳遷客蓬蒿暮遊人道路長晴湖勝鏡碧寒栁似金黄若有相思夢殷勤載八行送僧遊衡嶽心知衡嶽路不怕去人稀船裏猶鳴磬溪頭自曝衣有家從小别無寺不言歸料得逢寒住當禪雪滿扉送路一本有某從軍三字别我就蓬蒿日斜飛伯勞龍門流水急嵩嶽片雲髙歎命無知己梳頭落白毛從軍當此去風起廣陵濤洛陽道中寄弟趨走迫流年慙經此路偏密雲埋二室積雪度三川生類梗萍泛悲無金石堅翻鴻有歸翼極目仰聨翩江亭晩望浩渺浸雲根烟嵐没逺村鳥歸沙有跡帆過浪無痕望水知柔性㸔山欲倦魂縱情猶未已迴馬欲黄昏送耿處士一瓶離别酒未盡即言行萬水千山路孤舟幾月程川原秋色静蘆葦晩風鳴迢逓不歸客人傳虛隠名長江集巻三欽定四庫全書長江集巻四唐賈島撰過唐校書書齋池滿風吹竹時時得爽神聲齊雛鳥語畫巻老僧真月出行幾步花開到四鄰江湖心自切未可掛頭巾送杜秀才東遊東遊誰見待盡室寄長安别後葉頻落後一作夜去程山已寒大河風色度曠野燒烟殘匣有青銅鏡時將照鬢㸔送天台僧逺夢歸華頂扁舟背岳陽寒蔬修净食夜浪動禪牀鴈過孤峯曉猿啼一樹霜身心無别念餘習在詩章懐紫閣隠者寂寥思隠者孤燭坐秋霖梨栗猿喜熟雲山僧説深寄書應不到結伴擬同尋廢寢方終夕迢迢紫閣心雨夜同厲𤣥懐皇甫荀桐竹遶庭匝雨多風更吹還如舊山夜卧聴瀑泉時磧鴈來期近秋鐘到夢遲溝西吟苦客中夕話兼思秋暮北門楊栁葉不覺已繽紛值鶴因臨水迎僧忽背雲白鬚相並出清淚兩行分黙黙空朝夕苦吟誰喜聞哭胡遇夭夀知齊理何曽免歎嗟祭迴一作葬時收朔雪弔後折寒花野水吟秋斷空山影暮斜弟兄相識徧猶得到君家送丹師歸閩中波濤路杳然衰栁洛陽蟬行李經雷電禪前漱島泉歸林久别寺過越未離船自説從今去身應老海邊送安南惟鑒法師講經春殿裏花遶御牀飛南海幾迴過舊山臨老歸潮揺蠻草落月濕島松㣲一作觸風香損印霑雨磬生衣空水既如彼一作雲水路迢逓往來消息稀題李凝幽居閒居少隣並草徑入荒園鳥宿池邊一作中樹僧敲月下門過橋分野色移石動雲根暫去還來此幽期不負言送韓湘掛席從古一作中路長風起廣津楚城花未發上苑蝶來新半没湖波月初生島草春孤霞臨石鏡極浦映村神細響吟乾葦餘馨動逺蘋欲慿將一札寄與沃州人寄董武雖同一城裏少省得從容門掩園林僻日髙巾幘慵孤鴻來半夜積雪在諸峯正憶毘陵客聲聲隔水鐘宿贇上人房堦前多是竹閒地擬栽松朱㸃草書疏雪平麻履蹤御溝寒夜雨宫寺静時鐘此時一作室無他事來尋不厭重訪李甘原居原西居處静門對曲江開石縫銜枯草查根上净苔一作漬古苔翠㣲泉夜落紫閣鳥時來仍憶尋淇岸同行採蕨囘題山寺井沉沉百尺餘功就豈斯須汲早僧出定鑿新蟲自無藏源重嶂底澄翳大空隅此地如經劫涼潭㑹共枯僻居無可上人相訪自從居此地少有事相關積雨荒隣圃秋池照逺山硯中枯葉落枕上斷雲閒野客將禪子依依偏往還送李餘及第歸蜀知音伸久屈覲省去光輝津渡逢清夜途程盡翠㣲雲當綿竹疊鳥離錦江飛肯寄書來否原居出亦稀荒齋草合徑㣲㣲終南對掩扉晩涼疎雨絶初曉逺山稀落葉無青地閒身著白衣朴愚猶本性不是學忘機夜喜賀蘭三見訪漏鐘仍夜淺時節欲秋分泉聒棲松鶴風除翳月雲踏苔行引興枕石卧論文即此尋常静來多祇是君題青龍寺鏡公房一夕曽留宿終南揺落時孤燈岡一作龕舎掩殘磬雪風吹樹老因寒折泉深出井遲疎慵豈有事多失上方期送陳判官赴綏徳將軍遥入幕束帶便離家身暖蕉衣窄天寒磧日斜火燒岡斷葦一作草風捲雪平沙絲竹豐州有春來祇欠花送唐環歸敷水莊毛女峰當户日髙頭未梳地侵山影掃葉帶露痕書松徑僧尋廟一作藥沙泉鶴見魚一川風景好恨不有吾廬原東居喜唐温琪頻至曲江春草生紫閣雪分明汲井嘗泉味聴鐘問寺名墨研秋日雨茶試老僧鐺地近勞頻訪烏紗出送迎送􅏡法師度嵗不相見嚴冬始出關孤烟寒色樹髙雪夕陽山瀑布寺應到牡丹房甚閒南朝遺跡在此去幾時還寄錢庶子曲江春水滿北岸掩柴關秖有僧隣舎全無物映山樹隂終日掃藥債隔年還猶記聴琴夜寒燈竹屋間原上秋居關西又落木心事復如何嵗月辭山久秋霖入夜多鳥從井口出人自岳陽過倚杖聊閒望田家未剪禾夏夜原寺偏隣近開門物景澄磬通多葉罅月離片雲稜寄宿山中鳥相尋海畔僧唯愁秋色至乍可在炎蒸冬夜羈旅復經冬瓢空盎亦空淚流寒枕上跡絶舊山中凌結浮萍水雪和衰栁風曙光雞未報嘹唳兩三鴻送厲宗上人擁䇿背岷峨終南雨雪和漱泉秋鶴至禪樹夜猿過髙頂白雲盡前山黄葉多曽吟廬嶽上月動九江波寄李存穆聞道船中病似憂親弟兄信來從水路身去到柴城久别長鬚鬢相思書姓名忽然消息絶頻夢却還京贈無懐禪師身從劫劫修果以此生周禪定石牀暖月移山樹秋捧盂觀宿飯敲磬過清流不掩𤣥關路教人問白頭寄武功姚主簿居枕江沱北情懸渭曲西數宵曽夢見幾處得書披驛路穿荒坂公田帶淤泥静棊功奥妙閒作韻清淒鋤草留叢藥尋山上石梯客迴河水漲風起夕陽低空地苔連井孤村火隔溪巻簾黄葉落鎖印子規啼隴色澄秋月邊聲入戰鼙㑹須過縣去况是屢招攜題劉華書齋白石牀無塵青松樹有鱗一鶯啼帶雨兩樹合從春荒榭苔膠砌幽叢果墮榛偶來疎或數當暑夕勝晨露滴星河水巢重草木薪終南同往意趙北獨遊身渡葉司天漏驚蛩逺地人機清公幹族也莫卧漳濵送盧秀才遊潞府雨餘滋潤在風不起塵沙邊日寡文思送君吟月華過山干相府臨水宿僧家能賦焉長屈芳春宴杏花送南康姚明府銅章美少年小邑在南天版籍多遷客封疆接洞田静江鳴野鼓發䌫帶村烟却笑陶元亮何須憶醉眠送友人棄官遊江左羨君休作尉萬事且全身寰海多虞日江湖獨往人姓名何處變鷗鳥幾時親别後吳中使應須訪子真雨中懐友人對雨思君子嘗茶近竹幽儒家隣古寺不到又逢秋寄逺家住錦水上身征遼海邊十書九不到一到忽經年南齋獨自南齋卧神閒景亦空有山來枕上無事到心中簾巻侵牀月屏遮入座風望春春未至應在海門東早春題友人湖上新居近得雲中路門長侵早開到時猶有雪行處已無苔勸酒客初醉留茶僧未來每逢晴暖日惟見乞花栽又門不當官道行人到亦稀故從餐後出多是夜深歸開篋收詩巻掃牀移卧衣幾時同買宅相送有柴扉長江集巻四欽定四庫全書長江集巻五唐賈島撰送雍陶入蜀江山事若諳那肯滯雲南草色分危磴杉隂近古潭日斜褒谷鳥夏淺巂州蠶吾自疑雙鬢相逢更不堪張郎中過原東居年長惟添懶經旬止掩關髙人餐藥後下馬此林間對坐天將暮同來客亦閒幾時能重至水味似深山荅王建袐書人皆聞蟋蟀我獨恨蹉跎白髪無心鑷青山去意多信來漳浦岸期負洞庭波時掃髙槐影朝迴或恐過送李餘往湖南昔去候温涼秋山滿楚郷今來從辟命春物徧涔陽嶽石掛海雪野楓堆渚檣若尋吾祖宅寂寞在瀟湘偶作野步随吾意那知是與非稔年時雨足閏月暮蟬稀獨樹依岡老遥峯出草㣲園林自有主宿鳥且同歸過雍秀才居夏木鳥巢邊終南嶺色鮮就涼安坐石煑茗汲隣泉鐘逺清霄半蜩稀暑雨前幽齋如葺罷約我一來眠寄顧非熊知君歸有處山水亦難齊猶去瀟湘逺不聞猿􅎜啼穴通茒嶺下潮滿石頭西獨立生遥思秋原日漸低送神邈法師栁絮落濛濛西州道路中相逢春忽盡獨去講初終行疾遥山雨眠遲後夜風遶房三兩樹迴日葉應紅送慈恩寺霄韻法師謁太原李司空何故謁司空雲山知幾重磧遥來鴈盡雪急去僧逢清磬先寒角禪燈徹曉烽舊房閒片石倚著最髙松送知興上人久住巴興寺如今始拂衣欲臨秋水别不向故園歸錫挂天涯樹房開嶽頂扉下㸔萬里曉霜海日生㣲送恵雅法師歸玉泉秖到瀟湘水洞庭湖未遊飲泉㸔月别下峽聴猿浮講不停雷雨吟當一作曽近海流降霜歸楚夕星冷玉泉秋憶江上吳處士閩國揚帆去蟾蜍虧復圎秋風吹渭水落葉滿長安此地聚㑹夕當時雷雨寒蘭橈殊未返消息海雲端題張博士新居青楓何不種林在洞庭村應為三湘逺難移萬里根斗牛初過伏菡蓞欲香門一作斗移亭北榭蓮照水邊門舊即湖山隠新廬葺此原石門陂留辭從叔謩幽鳥飛不逺此行千里間寒衝陂水霧醉下菊花山有耻長為客無成又入關何時臨澗栁吾黨共來攀送朱兵曹迴越星彩練中見澄江豈有泥潮生垂釣罷楚盡去檣西磧鳥辭沙至山鼯隔水啼㑹稽半侵海濤白禹祠溪懐博陵故人孤城易水頭不忘舊交遊雪壓圍碁石風吹飲酒樓路遥千萬里人别十三秋吟苦相思處天寒水急流夕思秋宵已難曙漏向二更分我憶山水坐蟲當寂寞聞洞庭風落木天姥月離雲㑹自東浮去將何欲致君寄河中楊少尹非惟咎曩時投刺詣門遲悵望三秋後參差萬里期禹留疏鑿跡舜在寂寥祠此致杳難共迴風逐所思孟融逸人孟君臨水居不食水中魚衣褐唯麄帛筐箱秪素書樹林幽鳥戀世界此心疎擬棹孤舟去何峰又結廬晚晴見終南諸峰秦分一作下積多峰連巴勢不窮半旬藏雨裏此日到窻中圎魄將昇髙空一作虛欲呌鴻故山思不見碣石泬寥東宿池上泉來從絶壑亭敞在中流竹密無空岸松長可絆舟蟪蛄潭上夜河漢島前秋異夕一作日期深漲攜琴却此遊喜姚郎中自杭州迴路多楓樹林累日泊清隂來去泛流水翛然適此心一披江上作三起月中吟東省期司諌雲門悔不尋送鄭長史之嶺南雲林頗重疊岑渚復幽奇汩水斜陽岸騷人正則祠蒼梧多蟋蟀白露濕江蘺擢第榮南去晨昏近九疑送李溟謁宥州李權使君英雄典宥州迢逓苦吟遊風宿驪山下月斜灞水流去時初落葉囘日定無秋太守攜才子㸔鵬百尺樓永福湖和楊鄭州積水還平岸春來引鄭溪舊渠通郭下新堰絶湖西嵩少分明對瀟湘濶狹齊客遊随庶子孤嶼草萋萋題長江言心俱好靜廨署落暉空歸吏封宵鑰行蛇入古桐長江頻雨後明月衆星中若任遷人去西溪與剡通泥陽館客愁何併起暮送故人回廢館秋螢出空城寒雨來夕陽飄白露樹影掃青苔獨坐離容慘孤燈照不開送徐員外赴河中原野正蕭瑟中間分散情吏從甘扈罷詔許朔方行邊日沉殘角河關截夜城雲居閒獨往長老出房迎送賀蘭上人野僧來别我略坐傍泉沙逺道擎空鉢深山踏落花無師禪自解有格句堪誇此去非緣事孤雲不定家送令狐綯相公梁園趨㦸節海草幾枯春風水難遭便差池未振鱗姓名猶語及門館阻何因苦擬修文巻重擎獻匠人吟㸔青島處朝退赤墀晨根愛杉栽活枝憐雪霰新綴篇嗟調逸不和揣才貧早晚還霖雨滂沱洗月輪揠苗方滅裂成器待陶鈞困坂思迴顧迷邦輙問津數行望外札絶句握中珍是日榮遊汴當時怯往陳鴻舂乖漢爵禎病卧漳濵岳整五千仞雲惟一片身故山離未死離一作心秋水宿經旬下第能無恧髙科恐有神罷耕田料廢省釣岸應榛慷慨知音在誰能淚墮巾寄滄州李尚書滄溟深絶濶西岸郭東門弋者羅夷鳥桴人思嶠猿威稜髙臘冽煦育極春温陂淀封疆内蒹葭壁壘根揺鞞邊地脉愁箭虎狼魂水縣賣紗市鹽田煑海村枝條分御葉家世食唐恩武可縱横講功從戰伐論天涯生月片嶼頂湧泉源非是泥池物方因雷雨尊沉謀藏未露隣境帖無喧青塚驕回鶻蕭關陷吐蕃何時霖嵗旱早晚雪邦寃迢逓瞻旌纛浮陽寄詠言逢舊識幾嵗阻干戈今朝勸酒歌羨君無白髪走馬過黃河舊宅兵燒盡新宫日奏多妖星還有角數尺鐵重磨崇聖寺斌公房近來惟一食樹下掩禪扉落日寒山磬多年壊衲衣白鬚長更剃青靄逺還歸仍説遊南岳經行是息機送李傅侍郎劍南行營走馬從邊事新恩受外臺勇㸔雙節出期破八蠻回許國家無戀盤江棧不摧移軍刁斗逐報㨗劍門開角咽獼猴呌鼙乾霹靂來去年新甸邑猶滯佐時才别徐明府抱琴非本意生事偶相縈口尚袁安節身無子賤名地春寒雪盛山淺夕風輕百戰餘荒野千夫漸耦耕一盃宜獨夜孤客戀交情明日疲驂去蕭條過古城岐下送友人歸襄陽蹉跎随汎梗羈旅到西州舉翮籠中鳥知心海上鷗山光分首暮草色向家秋若更登髙峴㸔碑定淚流送友人遊蜀萬岑深積翠路向此中難欲暮多羈思因髙莫逺㸔卓家人寂寞揚子業凋殘惟有岷江水悠悠帶月寒送鄭少府江岸一相見空令惜此分夕陽行帶月酌水少留君野地初燒草荒山過雪雲明年還調集蟬可在家聞子規遊魂自相呌寜復記前身飛過隣家月聲連野路春夢邊催曉急愁處送風頻自有霑花血相和雨滴新送僧歸天台辭秦經越過歸寺海西峰石磵雙流水山門九里松曽聞清禁漏却聴赤城鐘妙宇研磨講應齊智者蹤長江集巻五欽定四庫全書長江集巻六唐賈島撰讓糺曹上樂使君戰戰復兢兢猶如履薄氷雖然叨一掾還似説三乗瓶汲南溪水書來北岳僧戅愚兼抱疾權紀不相應贈友人五字詩成巻清新韻具偕不同狂客醉自伴律僧齋春别和花樹秋辭帶月淮却歸登第日名近榜頭排送雍陶及第歸成都寧親不唯詩著籍兼又賦知名議論於題稱春秋對問精半應隂隲與全賴有司平歸去峰巒衆别來松桂生漲江流水凸當道白雲坑勿以攻文捷而將學劒輕製衣新濯錦開醖舊燒罌同日昇科士誰同膝下榮謝令狐綯相公賜衣九事長江飛鳥外主簿跨驢歸逐客寒前夜元戎與厚衣雪來松更緑霜降月彌輝即日調殷鼎朝分是與非送金州鑒周上人池必尋天目溪仍住若耶帆隨風便發月不要雲遮極浦浮霜鴈迴潮落海查峨嵋省春上立雪指流沙送譚逺上人下視白雲時山房盖一作掛樹皮垂枝松落子側頂鶴聴棊清净從沙劫中終未日欹金光明本行同侍出峨嵋新年嗟以龍鍾身一作貌如何嵗復新石門思隠久銅鏡强窺頻花發新移樹心知故國春誰能平此恨豈是北宗人送僧出家從丱嵗解論造𤣥門不惜揮談柄誰能聴至言中時山果熟後夏竹隂繁此去逢何日峨嵋曉復昬送姚杭州白雲峰下城日夕白雲生人老江波釣田侵海樹耕吳山鍾入越蓮葉吹搖旌詩異石門思濤來向越迎夜集田卿宅朗詠髙齋下如將古調彈翻鴻向桂水來雪渡桑乾滴滴玉漏曙翛翛竹籟殘曩年曽宿此亦值五陵寒寄山友長孫栖嶠此時氣蕭颯琴院可應關鶴似君無事風吹雨遍山松生青石上泉落白雲間有逕連髙頂心期相與還酬厲𤣥我來從北鄙子省涉西陵白髮初相識秋山擬共登隣居帝城雨㑹宿御溝冰未報見貽作耿然中夜興送劉式洛中覲省晴峰三十六侍立上春臺同宿别離恨共看星月迴野鶯臨苑語河棹歴江來便寄相思札緘封花下開送空公往金州七百里山水手中楖栗麤松生師坐石潭滌祖傳盂長擬老岳嶠又聞思海湖恵能同俗姓不是嶺南盧贈紹明上人未住青龍室中秋獨往年上方嵩古寺下視雨和一作如烟祖豈無言去心因斷臂傳不知能已後更有幾燈然贈𢎞泉上人洗足下藍嶺古師精進同心知溪卉長居此玉林空西殿宵燈磬東林曙雨風舊峯隣太白石座雨苔濛送宣皎上人遊太白剃髮鬂無雪去年三十三山過春草寺磬度落花潭得句才隣約論宗意在南峰靈疑懶下蒼翠太虚參病起髙丘歸未得空自責遲回身事豈能遂蘭花又已開病令新作少雨阻故人來燈下南華巻袪愁當酒盃送殷侍御起同州馮翊蒲一作連蒲西郡沙岡擁地形中條全離岳清渭半和涇夜莫眠明月秋深至洞庭猶來交辟士事别偃林扃送沈鶴家楚壻於秦擕妻去養親陸行千里外風巻一帆新夜泊疏山雨秋吟搗藥輪蕪城登眺作一作後才動廣陵人秋夜仰懷錢孟二公琴客會月色四時好秋光君一作吾子知南山昨夜雨為我寫清規獨鶴聳寒骨髙杉韻細颸仙家縹緲弄髣髴此中期贈李金州綺里祠前後山程踐白雲泝流隨大斾登岸見全軍曉角吹人夢秋風巻鴈羣霧開方露日漢水底一作與沙分酬姚合校書因貧行道逺得見舊交遊美酒易傾盡好詩難卒酬公堂朝共到私第夜相留不覺入關晚别來林木秋送獨孤馬二秀才居明月山讀書濯志俱髙潔儒科慕冉顔家辭臨水郡雨到讀書山棲鳥㯶花上聲鐘礫閣間寂寥窻戸外時見一舟還病蟬病蟬飛不得向我掌中行折翼猶能薄酸吟尚極清露華凝在腹塵㸃誤侵睛黄雀并鳶鳥俱懷害爾情青門里作燕存鴻已過海内幾人愁欲問南宗理將歸北岳修若無攀桂分秖是卧雲休泉樹一為别依稀三十秋盧秀才南臺居在青門里臺當千萬岑下因岡助勢上有樹交隂陵逺根纔近空長畔可尋新晴登嘯處驚起宿枝禽寄李輈侍郎終過孟津書分明夢不虚人從清渭别地隔太行餘賔幕誰嫌静公門但晏如櫑鞞乾霹靂斜漢濕蟾蜍追琢垂今後敦龎得古初井臺憐操築漳岸想丕疏亦冀鏗珉珮終當直石渠此身多抱疾幽里近營居憶潄蘇門澗經浮楚澤瀦松栽侵古影葷斷尚芹􅉁語嘿曽延接心源離滓淤誰言姓琴氏獨跨角生魚寄令狐綯相公驢駿勝羸馬東川路匪賒一緘論賈誼三蜀寄嚴家澄徹霜江水分明露石沙話言聲及政棧閣谷離斜自著衣偏暖誰憂雪六花裏裳留濶幞防患與通茶山館中宵起星河殘月華雙僮前日僱數口向天涯良樂知騏驥張雷驗鏌鎁謙光賢將相别紙聖龍蛇豈有斯言玷應無白璧瑕不妨圓魄裏人亦指蝦蟇再投李益常侍何處初投刺當時赴尹京淹留花木變然諾肺腸傾避暑蟬移樹登髙鴈過城人家嵩岳色公府洛河聲聨句逢秋盡甞茶見月生新衣裁白紵思從曲江行積雪省屬時霖滯今逢臘雪多南猜飄桂渚北訝雨交河盡滅平蕪色彌重古木柯空中離白氣島外下滄波隠者迷樵道朝人冷玉珂夕繁仍晝宻漏間復鐘和想積髙嵩頂新秋皓月過過楊道士居先生修道處茆屋逺囂氛叩齒坐明月搘頥望白雲精神含藥色衣服帶霞紋無話瀛洲路多年别少君贈僧亂山秋木穴裏有靈蛇藏鐵錫挂臨海一作錫拄臨滄海石樓聞異香出塵頭未白入定衲凝霜莫話五湖事令人心欲狂送友人游塞飄蓬多塞下君見益澘然逈磧沙銜日長河水接天夜泉行客火曉戍向京烟少結相思恨佳期芳草前思遊邊友人凝愁對孤燭昨日飲離杯葉下故人去天中新鴈來連沙秋草薄帶雪暮山開苑北紅塵道何時見逺迴秋暮寄友人寥落闗河暮霜風樹葉低逺天垂地外寒日下峰西有志烟霞切無家嵗月迷清霄話白閣已負十年棲寄令狐綯相公官髙頻勑授老色把犂鋤一主長江印三封東省書不無濠上思唯食圃中蔬夢幻將泡影浮生事只如和孟逸人林下道情四時相陶鑄中庸道豈銷夏雲生此日春色盡今朝陋巷貧無悶毗耶疾未調已栽天末栢合抱豈非遥宿姚少府北齋石溪同夜泛復此北齋期鳥絶吏歸後蛩鳴客卧時鏁城凉雨細開印曙鐘遲憶此漳川岸如今是别離雪晴晚望倚杖望晴雪溪雲幾萬重樵人歸白屋寒日下危峰野火燒岡草斷煙生石一作古松却回山寺路聞打暮天鐘長江集巻六欽定四庫全書長江集巻七唐賈島撰送崔嶠遊瀟湘功烈尚書孫琢磨風雅言渡河山鑿處陟峴漢灘喧夢想吟天目宵同話石門楓林葉欲下極浦月清暾寄朱錫珪逺泊與誰同來從古木中長江人釣月曠野火燒風夢澤吞楚大閩山阨海叢此時檣底水濤起屈原通馬戴居華山因寄玉女洗頭盆孤髙不可言瀑流蓮岳頂河注華山根絶雀林藏鶻無人境有猿秋蟾纔過雨石上古松門寄胡遇一自殘春别經炎復到凉螢從枯樹出蛩入破堦藏落葉書勝紙閒砧坐當牀東門因送客相訪也何妨送李戎扶侍往壽安二千餘里路一半是波濤未曉著衣起出城逢日髙關山多寇盗扶侍帶弓刀臨别不揮淚誰知心鬱陶送孫逸人衣屨猶同俗妻兒亦宛然不餐能累月無病已多年是藥皆諳性令人漸信仙杖頭書數巻荷入翠微煙寄華山僧遥知白石室松栢隠朦朧月落看心次雲生閉目中五更鐘隔岳萬尺水懸空苔蘚嵌巖所依稀有徑通送李登少府伊陽耽酒尉朗詠醉醒新應見嵩山裏明年躑躅春一千尋樹直三十六峰隣流水潺潺處堅貞玉澗珉易州過郝逸人居每逢詞翰客邀我共尋君果見閒居賦未曽流俗聞也知隣市井宛似出囂氛却笑巢由輩何須隠白雲酬鄠縣李廓少府見寄稍憐公事退復遇夕陽時北朔霜凝竹南山水入籬吟懷滄海侣空問白雲師恨不相從去心惟野鶴知净業寺與前鄠縣李廓少府同宿來從城上峰京寺暮相逢往往語復黙㣲㣲雨灑松家貧初罷吏年長畏聞蛩前日猶拘束披衣起曉鐘送南卓歸京殘春别鏡陂罷郡未霜髭行李逢炎暑山泉滿路岐雲藏巢鶴樹風觸囀鶯枝三省同虚位雙旌帶去思入城宵夢後待漏月沈時長䇿并忠告從容寫玉墀卧疾走筆酬韓愈書問一卧三四旬數書惟獨君一作書至獨思君願為出海月不作歸山雲身上衣頻寄甌中物亦分欲知强健否病鶴未離羣長孫霞李溟自紫閣白閣二峰見訪寂寞吾廬貧同來二閣人所論唯野事招作一作訪我住雲隣古寺期秋宿平林散早春潄流今已矣巢許豈堯臣送惟一遊清凉寺去有巡臺侣荒溪衆樹分瓶殘秦地水錫入晉山雲秋月離喧見寒泉出定聞人間臨欲别旬日雨紛紛鄭尚書新開涪江岸鑿青山破江開白浪寒日沈源出海春至草生灘梓匠防波溢蓬仙畏水乾從今疏决後任雨滯峰巒又不侵南畝務已㧞北江流涪水方移岸潯陽有到舟潭澄初搗藥波動乍垂鈎山可疏三里蹤知一作惟應歴億秋寄喬侍郎大寧猶未到曽渡北浮橋曉出爬船寺手擎紫栗條差池不相見悵望至今朝近日營家計繩懸一小瓢送去華法師在越居何寺東南水路歸秋江洗一鉢寒日曬三衣黙聴鴻聲盡行看葉影飛囊中無寶貨船户夜扄稀送蔡京躍蹄歸魯日帶漏别秦星易折芳條桂難窮邃義經登封多泰岳巡狩徧滄溟家在何林下梁山翠滿庭慈恩寺上座院未委衡山色何如對塔峰曩宵曽宿此今夕值秋濃羽族栖煙竹寒流帶月鐘井甘源起異泉湧漬苔封題朱慶餘所居天寒吟竟曉古屋瓦生松寄信船一隻隔鄉山萬重樹來沙岸鳥窻度雪樓鐘每憶江中嶼更看城上峰送黄知新歸南安池亭沈飲徧非獨曲江花地逺路穿海春歸冬到家火山難下雪瘴土不生茶知決移來計相逢期尚賒贈胡禪師自是根機鈍非闗夏臘深秋來江上寺夜坐嶺南心井鑿山含月風吹磬出林祖師擕隻履去路杳難尋元日女道士受籙元日更新夜齋身稱浄衣數星連斗出萬里斷雲飛霜下磬聲在月髙壇影㣲立聴師語了左肘繫符歸重與彭兵曹故人在城裏休寄海邊書漸去老不逺别來情豈疎硯冰催臘日山雀到貧居每有平戎計官家别勑除贈莊上人不語焚香坐心知道已成流年衰此世定力見他生暮雪餘春冷寒燈續晝明尋常五侯至敢望下堦迎落第東歸逢僧伯陽相逢須語笑人世别離頻曉去長侵月思鄉動隔春見僧心暫静從俗事多迍宇宙詩名小山河客路新翠桐猶入爨清鏡未辭塵逸足思奔驥隨羣且退鱗宴乖紅杏寺愁在緑楊津老病難為樂開眉賴故人皇甫主簿期遊山不及赴休官疋馬在新意入山中更住應難遂前期恨不同集蟬苔樹僻留客雨堂空深夜誰相訪惟當清浄翁宿成湘林下相訪夕陽時千株木未衰石泉流出一作出幽谷山雨滴栖鴟漏向燈聴數酒因客寢遲今宵不盡興更有月明期喜雍陶至今朝笑語同幾日百憂中鳥度劍門静蠻歸瀘水空步霜吟菊畔待月坐林東且莫孤此興勿論窮與通酬胡遇麗句傳人口科名立可圗移居見山燒買樹帶巢烏遊逺風濤急吟清雪月孤却思初識面仍未有多鬚宿慈恩寺郁公房病身來寄宿自掃一床閒反照臨江磬新秋過雨山竹隂移冷月荷氣帶禪關獨往天台意方從内請還送禇山人歸日東懸帆待秋水去入杳冥闗東海幾年别中華此日還岸遥生白髮波盡露青山隔水相思在無書也是閒寄韓湘過嶺行多少潮州瘴滿川花開南去後水凍北歸前望鷺吟登閣聴猿淚滴船相思堪面話不著尺書傳雨夜寄馬戴芳林杏花樹花落子西東今夕曲江雨寒催朔北風鄉書滄海絶隠路翠微通寂寂相思際孤缸殘漏中喜無可上人遊山回一食復何如尋山無定居相逢新夏滿不見半年餘聴話龍潭雪休傳鳥道書别來還似舊白髮日髙梳寄毘陵徹公身依吳寺老黄葉幾回看早講林霜在孤禪隙月殘井通潮浪逺鐘與角聲寒已有南遊約誰言禮謁難送韋瓊校書賔佐兼歸覲此行江漢心别離從闕下道路向山隂孤嶼消寒沫空城滴夜霖若邪溪畔寺秋色共誰尋寄劉侍御衣多苔蘚痕猶擬更趨門自夏雖無病經秋不過原積泉留岱鳥疊岫隔巴猿琴月西齋集如今豈復言長江集巻七欽定四庫全書長江集巻八唐賈島撰送穆少府知眉州劍門倚青漢君昔未曽過日暮行人少山深異鳥多猿啼和峽雨棧盡到江波一路白雲裏飛泉灑薜蘿二月晦日留别鄠中友人立馬栁花裏别君當酒酣春風漸向北雲鴈不飛南明曉日初一今年月又三鞭羸去暮色逺岳起煙嵐送李校書赴吉期筮算重重吉良期詎可遷不同牛女夜是配鳳凰年佩玉春風裏題章蠟燭前詩書與箴訓夫哲又妻賢宿孤館落日投村戍愁生為客途寒山晴後緑秋月夜來孤橘樹千株在漁家一半無自知風水静舟繫岸邊蘆哭宗宻禪師鳥道雪岑巔師亡誰去禪几塵増滅後樹色改生前層塔當松吹殘蹤傍野泉唯嗟聴經虎時到壊菴邊宿山寺衆岫聳寒色精廬向此分流星透疎木走月逆行雲絶頂人來少髙松鶴不羣一僧年八十世事未曽聞送友人如邊去日重陽後前程菊正芳行車輾秋岳落葉墜寒霜雲入漢天白風髙磧色黄蒲輪待恐晚求薦向諸方題竹谷上人院禪庭髙鳥道迴望極川原樵徑連峰頂石泉通竹根木深猶積雪山淺未聞猿欲别塵中苦願師貽一言京北原作登原見城闕䇿蹇思炎天日午路中客槐花風處蟬逺山秦木上清渭漢陵前何事居人世皆從一作因名利牽寄江上人紫閣舊房在新家中岳東煙波千里隔消息一朝通寒日汀洲路秋晴島嶼風分明杜陵葉别後兩經紅兩一作雨送僧歸太白山堅氷連夏處太白接青天雲塞石房路峰明雨外巔夜禪臨虎穴寒潄撇龍泉後會不期日相逢應信縁暮過山村數里聞寒水山家少四隣怪禽啼曠野落日恐行人初月未終夕邊烽不過秦蕭條桑柘外烟火漸相親鷺鷥求魚未得食沙岸往來行島月獨棲影暮天寒過聲墮巢因木折失侣遇弦驚頻向煙霄望吾知爾去程内道塲僧𢎞紹麟徳燃香請長安春幾回夜閒一作寒同像寂晝定為吾開講罷松根老經浮海水來六年雙足履只步院中苔蔣亭和蔡湘州蔣宅為亭榭蔡城東郭門潭連秦相井松老漢朝根已積蒼苔徧何曽舊逕存髙齋無事後時復一擕樽光州王建使君水亭作楚水臨軒積澄鮮一畝餘栁根連岸盡荷葉出萍初極浦清相似幽禽到不虚夕陽庭際眺槐雨滴疎疎留别光州王使君建杜陵千里外期在末秋歸既見林花落須防木葉飛楚從何地盡淮隔數峰㣲迴首餘霞失斜陽照客衣宿姚合宅寄張司業籍閒宵因集會柱史話先生身愛無一事心期往四明松枝影揺動石磬響寒清誰伴南齋宿月髙霜滿城哭張籍精靈歸恍惚石磬韻曽聞即日是前古誰人耕此墳舊遊孤枕逺故域九江分本欲蓬瀛去餐芝御白雲靈凖上人院掩扉當太白臘數等松椿禁漏來遥夜山泉落近隣經聲終巻曉草色幾芽春海内知名士交遊凖上人寄栁舎人宗元格與功俱造何人意不降一宵三夢栁孤泊九秋江擢第名重列沖天字幾雙誓為仙者僕側執馭風幢送𤣥巖上人歸西蜀玉壘山中寺幽深勝槩多藥成彭祖搗頂受七輪摩去臘催今夏流光等逝波會當依糞掃一作草五岳徧頭陀寄宋州田中丞古郡近南徐闗河萬里餘相思深夜後未答去秋書自别知音少難忘識面初舊山期已久門掩數畦蔬送朱休歸劍南劍南歸受賀太學賦聲雄山路長江岸朝陽十月中芽新抽雪茗枝重集猿楓卓氏琴臺廢深蕪想逕通寄長武朱尚書不日即登壇槍旗一萬竿角吹邊月沒鼔絶爆雷殘中國今如此西荒可取難白衣思請謁徒步在長安送皇甫侍御曉鐘催早朝自是赴嘉招身泊湘江濶田收楚澤遥雁驚起衰草猿渴下寒條來使黔南日時應問寂寥郊居即事住此園林久其如未是家葉書傳野意簷溜煮胡茶雨後逢行鷺更深聴逺蛙自然還往裏多是愛烟霞夜集姚合宅期可公不至公堂秋雨夜已是念園林何事疾病日重論山水心孤燈明臘後微雪下更深釋子乖來約泉西寒磬音喜李餘自蜀至迢逓岷峨外西南驛路髙幾程尋嶮棧獨宿聴寒濤白鳥飛還立青猿斷更號往來從此過詞體近風騷王侍御南原莊買得足雲地新栽藥數窠峰頭盤一逕原下注雙河春寺閒眠久晴臺獨上多南齋宿雨後仍許重來麽一作過送康秀才俱為落第年相識落花前酒瀉兩三盞詩吟十數篇行岐逢塞雨嘶馬上津船樹影髙堂下迴時應有蟬送僧此生披衲過在此得身閒日午遊都市天寒往華山言歸文字外意出有無間仙掌雲邊樹巢禽時出關寄魏少府來時乖面别一作傷逺别終日使人慙易記巻中句難忘燈下談濕苔粘樹癭瀑布濺房菴音信如相恵移居古井南原居即事言懐贈孫員外出入土門偏秋深石色泉逕通原上草地接水中蓮採菌依餘枿拾薪逢刈田鑷撏白髮斷兵阻尺書傳避路來華省抄詩上彩牋髙齋久不到猶喜未經年登樓秋日登髙望涼風吹海初山川明已久河漢没無餘逺近涯寥夐髙低中太虚賦因王閣筆思比謝遊疎上樂使君救康成公曽夢諸侯笑康囚議脱枷千根池裏藕一朶火中花昆明池泛舟一枝青竹榜泛泛緑萍裏不見釣魚人漸入秋塘水送僧大内曽持論天南化俗行舊房山雪在春草岳陽生曉了蓮經義堪任寶盖迎王侯皆䕶法何寺講鐘鳴送劉知新往襄陽此别誠堪恨荆襄是舊遊眼光懸欲落心緒亂難收花木三層寺烟波五相樓因君兩地去長使夢悠悠寄慈恩寺郁上人中秋期夕望虚室省相容北斗生清漏南山出碧重露寒鳩宿竹鴻過月圓鐘此夜情應切衡陽舊住峰送饒州張使君終南雲雨連城闕去路西江白浪頭滁上郡齋離昨日鄱陽農事勸今秋道心生向前朝寺文思來因静夜樓借問泊帆干謁者誰人曽聴峽猿愁觀冬設上東川楊尚書匏革奏冬非獨樂軍城未曉啟重門何時去入三台貴此日空知八座尊羅綺舞時收雨㸃貔貅門外巻雲根逐遷屬吏隨賔列去棹扁舟不忘恩長江集巻八欽定四庫全書長江集巻九唐賈島撰巴興作三年未省聞鴻呌九月何曽見草枯寒暑氣均思白社星辰位正憶皇都蘇卿持節終還漢葛相行師自渡瀘鄉味朔山林果别北歸期掛海帆孤早蟬早蟬孤抱芳槐葉噪向殘陽意度秋也任一聲催我老堪聴兩耳畏吟休得非下第無髙韻須是青山隠白頭若問此心嗟嘆否天人不可怨而尤投元郎中心在瀟湘歸未期巻中多是得名詩髙臺聊望清秋色片水堪留堪一作難白鷺鷥省宿有時間急雨朝迴盡日伴禪師舊文去嵗曾將獻䝉與人來説始知阮籍嘯臺如聞長嘯春風裏荆棘叢邊訪舊踪地接蘇門山近逺荒臺突兀抵髙峰滕校書使院小池小池誰見鑿時初走水南來十里餘樓上日斜吹暮角院中人出鏁遊魚送陜府王司馬司馬雖然聴曉鐘尚猶髙枕恣疎慵請持僧過三門水賣藥人歸五老峰移舫緑隂深處息登樓涼夜此時逢杜陵惆悵臨相一作岐餞未寢月前多屐蹤上谷旅夜世難那堪恨旅遊龍鍾更是對窮秋故園千里數行淚隣杵一聲終夜愁月到寒窗空皓皛風翻落葉更颼飀此心不向常人説倚識平津萬户侯寄無得頭陀夏臘今應三十餘不離樹下塜間居貌堪良匠抽毫寫行稱髙僧續傳書落澗水聲來逺逺當空月色自如如白衣只在青門裏心每相親跡且疎崔卿池上雙白鷺鷺雛相逐出深籠頂各有絲莖數同灑石多霜移足冷隔城逺樹挂巢空其如盡在灘聲外何似雙飛浦色中見此池潭卿自鑿清泠太液底潛通送胡道士短褐身披滿漬苔靈溪深處觀門開却從城裏移琴去許到山中寄藥來臨水古壇秋醮罷宿杉幽鳥夜飛迴丹梯願逐真人上日夕歸心白髮催寄韓潮州愈此心曽與木蘭舟直到天南潮水頭隔嶺篇章來華岳出闗書信過瀧流峰懸驛路殘雲斷海浸城根一作闉老樹秋一夕瘴烟風巻盡月明初上浪西樓酬張籍王建疎林荒宅古坡一作陂前久住還因太守憐漸老更思深處隠多閒數得上方眠鼠抛貧屋收田日雁度寒江擬雪天身事龍鍾應是分水曹芸閣枉來篇逢博陵故人彭兵曹曲陽分散㑹京華見説三年住海涯别後解餐蓬虆子向前未識牡丹花偶逢日者教求禄終傍泉聲擬置家踏雪攜琴相就宿夜深開户斗牛斜贈牛山人二十年中餌茯苓致書半是老君經東都舊住商人宅南國新修道士亭鑿石養蜂休買蜜坐山秤藥不争星古來隠者多能卜欲就先生問丙丁送于中丞使回紇册立君立天驕發使車册文字字著金書漸通青塜鄉山盡欲逹皇情譯語初調角寒城邊色動下霜秋磧雁行疎旌旗來往幾多日應向途中見嵗除送劉侍御重使江西時當苦熱逺行人石壁飛泉濺馬身又到鍾陵知務大還浮湓浦屬秋新早程猿呌雲深極宿館禽驚葉動頻前者已聞廉使薦兼言有畫静邊塵贈圓上人誦經千紙得為僧麈尾持行不拂蠅古塔月髙聞咒水新壇日午見燒燈一雙童子澆紅藥百八真珠貫綵繩且説近來心裏事仇讐相對似親朋處州李使君改任遂州因寄贈庭樹幾株隂入户主人何在客聞蟬鑰開原上髙樓鏁瓶汲池東古井泉趂静野禽曽後到休吟隣叟始安眠仙都山水誰能憶西去風濤書滿船酬慈恩寺文郁上人袈裟影入禁池清猶憶鄉山近赤城籬落罅間寒蟹過莓苔石上晚蛩行期登野閣閒應甚阻宿山房疾未平聞説又尋南岳去無端詩思忽然生訪鑒𤣥師姪維摩青石講初休縁訪親宗到普州我有軍持慿弟子岳陽溪裏汲寒流夜坐蟋蟀漸多秋不淺蟾蜍已沒夜應深三更兩鬂幾枝雪一念雙峰四祖心送别門外便伸千里别無車不得到河梁髙樓直上百餘尺今日為君南望長聞蟬感懐新蟬忽發最髙枝不覺立聴無限時正遇友人來告别一心分作兩般悲夏夜上谷宿開元寺詩成一夜月中題便卧松風到曙雞帶月時聞山鳥語郡城知近武陵溪送于總持歸京出家初𨽻何方寺上國西明御水東却見舊房堦下樹别來二十一春風崔卿池上鶴月中時呌葉紛紛不異洞庭霜夜聞翎羽如今從放長猶能飛起向孤雲田中丞髙亭髙亭林表逈嵳峩獨坐秋宵不寢多玉兔玉人歌裏出白雲誰似莫相和友人婚楊氏催粧不知今夕是何夕催促陽臺近鏡臺誰道芙蓉水中種青銅鏡裏一枝開酬朱侍御望月見寄他寢一作今夜此時吾不寢近秋三五月逢晴相思唯有霜臺月望盡孤光見却生題韋雲叟草堂新起此堂開北牕當牕山隔一重江白茅草苫重重密愛此秋天夜雨淙和韓吏部泛南溪溪裏晚從池岸出石泉秋急夜深聞木蘭船共山人上月映渡頭零落雲方鏡背如刀截機頭錦面似升量澗㡳泉銅雀臺南秋日得照來照去已三千酬姚合黍穗豆苖侵古道晴原午後早秋時故人相憶僧來説楊栁無風蟬滿枝送靈應上人遍叅尊宿游方久名岳竒峰問此公五月半間看瀑布青城山裏白雲中贈丘先生常言喫藥全勝飯華岳松邊採茯神不遣髭鬚一莖白擬為白日上昇人渡桑乾客舎并州已十霜歸心日夜憶咸陽無端更渡桑乾水却望并州是故鄉夜期嘯客不至逸人期宿石牀中遣我閒扉對晚空不知何處嘯秋月閒著一作閉松門一夜風夜集烏行中所居環爐促席復持杯松院雙扉向月開座上同聲半先逹名山獨入此心來贈梁浦秀才斑竹拄杖揀得林中最細枝結根石上長身遲莫嫌滴瀝紅斑少恰似一作是湘妃涙盡時尋石甕寺上方野寺入時春雪後﨑嶇得到此房前老僧不出迎朝客已住上方三十年長江集巻九欽定四庫全書長江集巻十唐賈島撰}
