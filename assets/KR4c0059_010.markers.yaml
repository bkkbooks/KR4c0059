  - {type: variant, offset: 10, length: 0, content: '', WYG: 撰古意碌碌復碌碌百年雙轉轂志士終夜心良馬白日足俱為不等閒誰是知音目眼中兩行淚曾弔三獻玉望山南山三十里不見踰一旬冒雨時立望望之如朋親虬龍一掬波洗蕩千萬春一作里日日雨不斷愁殺望山人天事不可長勁風來如奔隂霪一作霾一以掃浩翠寫國門長安百萬家家家張屏新誰家最好山我願為其鄰北嶽廟天地有五嶽恒嶽居其北巖巒疊萬重詭怪浩難測人來不敢入祠宇白日黒有時起霖雨一灑天地徳神兮安在哉永康我王國朝飢市中有樵山此舍朝無煙井底有甘泉釜中乃空然我要見白日雪來寒一作塞青天坐聞西牀琴凍折兩三絃饑莫詣他門古人有拙言哭盧仝賢人無官死不親者亦悲空令古鬼哭更得新隣比平生四十年惟著白布衣天子未辟召地府誰來追長安有交友託孤遽棄移塜側誌石短文字行參差無錢買松栽自生蒿草枝在日贈我文淚流把讀時從兹加敬重深藏恐失遺劍客十年磨一劍霜刄未曽試今日把似君誰為不平事口號中夜忽自起汲此百尺泉林木含白露星斗在青天寄逺别腸多鬱紆豈能肥肌膚始知相結宻不及相結疎疎别恨應少宻離恨難袪門前南流水中有北飛魚魚飛向北海可以寄逺書不惜寄逺書故人今在無况此數尺身阻彼萬里途自非日月光難以知子軀齋中躭靜非謬為本性實疎索齋中一就枕不覺白日落低扉礙軒轡寡徳謝接一作然諾叢菊在牆隂秋窮未開萼所餐類病馬動影似移嶽欲駐迫逃衰豈殊辭綆縛已見飽時雨應豐蔬與藥感秋商氣颯已來嵗華又虛擲朝雲藏竒峰暮雨灑疎滴幾蜩嘿凉葉一作幾番飛凉葉數蛩思隂壁落日空館中歸心逺山碧昔人多秋感今人何異昔四序馳百年𤣥髪坐成白喧喧徇聲利擾擾同轍跡儻無世上懐去偃松下石翫月寒月破東北賈生立西南西南立倚何立倚青青杉近月有數星星名未詳諳但愛杉倚月我倚杉為三月乃不上杉上杉難相參眙􅌓子細視睛瞳桂枝劖目常有熱疾久視無煩炎以手捫衣裳零露已濡霑久立雙足凍時向股䏶淹立久病足折兀然黐膠粘他人應已睡轉喜此景恬此景亦胡及而我苦淫耽無異市井人見金不知㢘不知此夜中幾人同無厭待得上頂㸔未擬歸枕函强步望寢齋步步情不堪步到竹叢西東望如隔簾却坐竹叢外清思刮幽潛量知愛月人身願化為蟾辭二知已一雙千嵗鶴立别孤翔鴻波島忽已暮海雨寒濛濛離人聞一作逢美彈亦與哀彈同况兹切切弄繞彼行行躬雲飛北嶽碧火息西山紅何以代逺誠折芳臘雪中義雀行和朱評事𤣥鳥雄雌俱春雷驚蟄餘口銜黄河泥空即翔天隅一夕皆莫歸嘵嘵遺衆雛雙雀抱人義哺食勞劬劬雛既邐迤飛雲間聲相呼燕感雀深恩雀愧揚不殊禽賢難自彰幸得主人書宿懸泉驛曉行瀝水樓暮到懸泉驛林月值雲􅃒山燈照愁寂辯士辯士多毁訾不聞談已非猛虎恣殺暴未嘗齧妻兒此理天所感所感當問誰求食飼雛禽吐出美言詞善哉君子人揚光掩瑕玼不欺上不欺星辰下不欺鬼神知心兩如此然後何所陳食魚味在鮮食蓼味在辛掘井須到流結交須到頭此語誠不謬敵君三萬秋絶句海底有明月圎于天上輪得之一寸光可買千里春寓興莫居暗室中開目閉目同莫趨碧霄路容飛不容步暗室未可居碧霄未可趨勸君跨仙鶴日下雲為衢遊仙借得孤鶴騎髙近金烏飛掬河洗老貌照月生光輝天中鶴路直天盡鶴一息歸來不騎鶴身自有羽翼若人無仙骨芝术無煩食枕上吟夜長憶白日枕上吟千詩何當苦寒氣忽被東風吹冰開魚龍别天波殊路岐雙魚謡時韓職方書中以孟常州簡詩見示天河墮雙魴飛我庭中央掌握尺餘雪劈開腸有璜見令饞舌短烹遶隣舍香一得古詩字與玉含異藏易水懐古荆卿重虛死節烈書前史我歎方寸心誰論一時事至今易水橋寒風兮蕭蕭易水流得盡荆卿名不消早起北客入西京北鴈再離北秋寢獨前興天梭星落織躭翫餘恬爽顧盻輕痾力旅途少顔盡明鏡勸仙食出門路縱横張家路最直昨夜夢見書張家㕔上壁客喜客喜非實喜客悲非實悲百迴信到家未當身一歸未歸長嗟愁嗟愁塡中懐開口吐愁聲還却入耳來常恐滴淚多自損兩目輝鬢邊雖有絲不堪織寒衣延夀里精舍寓居旅託避華館荒樓遂愚慵短庭無繁植珍果春亦濃側廬發扃樞纖魄時卧逢耳目乃􅆵井肺肝即巖峰汲泉飲酌餘見我閒靜容霜蹊猶舒英寒蝶斷來踪雙履與誰逐欲尋青瘦笻欲一作一贈智朗禪師上人分明見玉潭底没上人光慘貌古來恨峭發涕辭孔顔廟笑訪禪寂室步隨青山影坐學白塔骨解聴無弄琴不禮有身佛欲問師何之忽與我相别率賦贈逺言言慙非子曰送沈秀才下第東歸曲言惡者誰恱耳如彈絲直言好者誰刺耳如長錐沈生才俊秀心腸無邪欺君子忌苟合擇交如求師毁出疾夫口騰入禮部闈下第子不恥遺才人耻之東歸家室逺掉轡時參差浙雲近吳見汴栁接楚垂明年春光别囘首不復疑酬棲上人夜久城館閒情幽出在山新月有微輝朗朗空庭間處世雖識機伊余多掩關松姿度臘見籬藥知春還靜覽冰雪詞厚為酬贈顔東林有躑躅脫屣期共攀冬月長安雨中見終南雪秋節新已盡雨一作林疎露山雪西峰稍覺明殘滴猶未絶氣侵瀑布水凍著白雲宂今朝㶚滻鴈何夕瀟湘月想彼石房人對雪扉不閉必結切長江集巻一欽定四庫全書長江集巻二唐賈島撰寄孟協律我有弔古泣不泣向路岐揮淚灑暮天滴著一作毎滴桂樹枝别後冬節至離心北風吹坐孤雪扉夕泉落石橋時不驚猛虎嘯難辱君子詞欲酬空覺老無以堪逺持岧嶤倚角窻王屋懸清思和劉涵京官始云滿野人依舊閒閉扉一畝居中有古風還市井日已午幽牕夢南山喬木覆北齋有鳥鳴其間前日逺嶽僧來時與開關新題驚我瘦窺鏡見醜顔陶情惜清澹此意復誰攀明月山懐獨孤崇魚琢明月長在目明月長在心在心復在目何得稀去尋試望明月人孟夏樹蔽岑想彼嘆此懐樂喧㤀幽林鄉本北嶽外悔一作每恨東夷深願縮地脉還豈待天恩臨非不渴隠秀却嫌他事侵或云岳樓鐘來繞草堂吟當從令尹後再往步栢林投張太祝風骨髙更老向春初陽葩泠泠月下韻一一落海涯有子不敢和一聽千嘆嗟身卧東北泥魂掛西南霞手把一枝栗往輕覺程賒水天朔方色暖日嵩根花達一作逵閒幽棲山遣尋種藥家欲買雙瓊瑶慙無一木𤓰詠韓氏二子千巖一尺璧八月十五夕清露墮桂花白鳥舞虛碧送别丈夫未得意行行且低眉素琴彈復彈㑹有知音知攜新文詣張籍韓愈途中成袖有新成詩欲見張韓老青竹未生翼一步萬里道仰望青冥天雲雪壓我腦失却終南山惆悵滿懐抱安得西北風身願變蓬草地祗聞此語突出驚我倒上谷送客遊江湖莫嘆迢逓分何殊咫尺别江樓到夜登還見南臺月重酬姚少府隙月斜枕旁諷詠夏詒什如今何時節蟲虺亦已蟄荅遲禮涉傲抱疾思加澁僕本胡為者銜肩貢客集茫然九州内譬如一錐立欺暗少此懐自明曽瀝泣量無趫勇士誠欲戈矛戢原閣期躋攀潭舫偶俱入深齋竹木合一作多畢夕風雨急俸利沐均分價稱煩噓噏百篇見刪罷一命嗟未及滄浪愚將還知音激所習投孟郊月中有孤芳天下聆薫風江南有髙唱海北初來通容飄清冷餘自藴襟抱中止息乃流溢推尋却冥䝉我知雪山子謁彼偈句空必竟獲所實爾焉遂深􅇆錄之孤燈前猶恨百首終一吟動狂機萬疾辭頑躬生年面未交永夕夢輙同叙詰誰君師詎言無吾宗余求履其跡君曰可但攻啜波腸易飽揖險神難從前嵗曾入洛差池阻從龍萍家復從趙雲思長縈縈嵩海每可詣長途追再窮願傾肺腸事盡入焦梧桐代邊將持戈簇邊日戰罷浮雲收露草泣寒霽夜泉鳴隴頭三尺握中鐵氣衝星斗牛報國不拘貴憤將平虜讐寄劉栖楚趨走與偃卧去就自殊分當窻一重樹上有萬里雲離披不相顧髣髴類人羣友生去更逺來書絶如焚蟬吟我為聽我歌蟬豈聞嵗暮儻旋歸晤言桂氛氲寄丘儒地近輕數見地逺重一面一面如何重重甚珍寳片自經失歡笑幾度騰霜霰此心鎮懸懸天象固迴轉長安秋風髙子在東甸縣儀形信寂蔑風雨豈乖間慿人報消息何易慿筆硯俱不盡我心終須對君宴送陳商古道長荆棘新岐路交横君於荒榛中尋得古轍行足踏聖人路貌端禪士形我曾接夜談似聽講一經聨翩曾數舉昨登髙第名釜底絶烟火曉行皇帝京上客逺府遊主人須目明青雲别青山何日復可升送張校書季霞從京去容州馬在船上多容州幾千里直傍青天涯掌記試校書未稱髙詞華義往不可屈出家如入家城市七月初熱與夏未差餞君到野地秋涼滿山坡南境異北候風起無塵沙秦吟宿楚澤海酒落桂花暫醉即還醒彼土生桂茶寄友人同人半年别一别寂來音賴有别時文相思時一吟我常倦投跡君亦知此衿筆硯且勿棄蘇張曾陸沈但存舌在口當冀身遂心君㸔明月夜松桂寒森森荅王參寸晷不相待四時互如競客思先覺秋蟲聲苦知暝霜松積舊翠露月團如鏡詩負屬景同琴孤坐堂聴相期黄菊節别約紅桃徑毎把式微篇臨風一長詠延康吟寄居延夀里為與延康隣不愛延康里愛此里中人人非十年故人非九族親人有不朽語得之烟山春戱贈友人一日不作詩心源如廢井筆硯為轆轤吟詠作縻綆朝來重汲引依舊得清泠書贈同懐人詞中多苦辛寓興真集道方至貌殊妬還多山泉入城池自然生渾波今時出古言在衆翻為訛有琴含正韻知音者如何一生足感激世言忽嵳峩不得市井味思嚮吾巖阿浮華豈我事日月徒蹉跎曠哉潁陽風千載無其他懐鄭從志西風吹隂雪雨雪半夜收忽憶天涯人起㸔斗與牛故人别二年我意如百秋音信兩杳杳誰云昔綢繆平明一封書寄向東北舟翩翩春歸烏㑹自為匹儔易州登龍興寺樓望郡北髙峯郡北最髙峯巉巖絶雲路朝來上樓望稍覺得幽趣朦朧碧烟裏羣嶺若相附何時一登陟萬物皆下顧送鄭山人遊江湖南遊衡嶽上東往天台裏足躡華峰頂目觀滄海水就峰公宿河出鳥宿後螢火白露中上人坐不倚共我論量空殘月華晻曖逺水響玲瓏爾時無了夢兹宵方未窮劉景陽東齋松隂連竹影中有無苔井清風此地多白日空自永景陽公幹孫詩句得真景勸我不須歸月出東齋靜對菊九日不出門十日見黄菊灼灼尚繁英美人無消息送集文上人遊方來從道陵井雙木溪邊㑹分首芳草時逺意青天外此遊詣幾嶽嵩華衡恒泰題岸上人郡内閒居靜向方寸求不居山一作千嶂幽池開菡蓞香門閉莓苔秋金玉重四句粃糠輕九流鑪烟上喬木鐘磬下危樓手種一株松貞心與師儔遊子遊子喜鄉逺非吾憶歸廬誰知奔他山自欲早旋車朝賞暮已足圖歸願無餘當期附鵬翼未偶方躊躇寄山中王參我㸔嶽西雲君㸔嶽北月長懐燕城南相送十里别别來千餘日日日憶不歇逺寄一紙書數字論白髪送汲鵬淮南卧理後復逢君姓汲文采非尋常志願期卓立深江東泛舟夕陽聎原隰夏夜言詩㑹往往追不及長江集巻二欽定四庫全書長江集巻三唐賈島撰寄令狐相公䇿杖馳山驛逢人問梓州長江那可到行客替生愁哭栢巖禪師苔覆石牀新師曽占幾春冩留行道影焚却坐禪身塔院關松雪經房鎻隙塵自嫌雙淚下不是解空人山中道士頭髪梳千下休糧帶瘦容養雛成大鶴種子作髙松白石通宵煑寒泉盡日舂不曽離隠處那得世人逢就可公宿十里尋幽寺寒流數派分僧同雪夜坐鴈向草堂聞靜語終燈焰餘生許嶠雲由來多抱疾聲不達明君旅遊此心非一事書札若為傳舊國别多日故人無少年空巢霜葉落疎牖水螢穿留得林僧宿中宵坐黙一作黯然送鄒明府遊靈武曽宰西畿縣三年馬不肥債多平一作慿劍與官滿載書歸邊雪藏行徑林風透卧衣靈州聴曉角客館未開扉題皇甫荀藍田㕔任官經一年縣與玉峯連竹籠拾山果瓦瓶擔石泉客歸秋雨後印鎻暮鐘前久别丹陽浦時時夢釣船贈王將軍宿衛爐烟近除書墨未乾馬曽金鏃中身有寳刀瘢父子同時㨗君王畫陣㸔何當為外帥白日出長安下第下第只空囊如何住一作在帝鄉杏園啼百舌誰醉在花傍淚落故山逺病來春草長知音逢一作酧豈易孤棹負三湘寄賀蘭朋吉往往東林下花香似火焚故園從小别夜雨近秋聞野菜連寒水枯株簇古墳泛舟同逺客尋寺入幽雲斜日扉多掩荒田徑細分相思蟬幾處偶坐蝶成羣㑹宿曽論道登髙省議文苦吟遥可想邊葉向紛紛憶吳處士半夜長安雨燈前越客吟孤舟行一月萬水與千岑島嶼夏雲起汀洲芳草深何當折松葉拂石剡溪隂哭孟郊身死聲名在多應萬古傳寡妻無子息破宅帶林泉塚近登山道詩随過海船故人相弔後斜日下寒天送崔定未知遊子意何不避炎蒸幾日到漢水新蟬鳴杜陵秋江待得月夜語恨無僧巴峽吟過否連天十二層寄白閣黙公已知歸白閣山逺晩晴㸔石室人心靜冰潭月影殘㣲雲分片滅古木落薪乾後夜誰聞磬西峯絶頂寒雨後宿劉司馬池上藍溪秋漱玉此地漲清澄蘆葦聲兼雨芰荷香遶燈岸頭秦古道亭面漢荒陵靜想泉根本幽崖落幾層送朱可久歸越中石頭城下泊北固暝鐘初汀鷺潮衝起船窻月過虚吳山侵越衆隋栁入唐疎日欲躬調膳辟來何府書送田卓入華山幽深足暮蟬驚覺石牀眠瀑布五千仭草堂瀑布邊壇松涓滴露嶽月泬寥天鶴過君須㸔上頭應有仙送董正字常州覲省相逐一行鴻何時出磧中江流翻白浪木葉落青楓輕檝浮吳國繁霜下楚空春來懽侍阻正字在東宫酬姚少府海樹與山木俱應揺落初柴門掩寒雨蟲響出秋蔬枯槁彰清鏡孱愚友道書刋文非不朽君子自相於送無可上人圭峯霽色新送此草堂人麈尾同離寺蛩鳴暫别親獨行潭底影數息樹邊身終有煙霞約天台作近隣送李騎胄歸騎雙旌逺懽生此别中蘭關分磧路嘶馬背寒鴻朔色晴天北河源落日東賀蘭山頂草時動巻帆風送烏行中石淙别業淙一作琮寒水長繩汲丁泠數滴翻草通石淙脉硯帶海潮痕嶽色何曽逺蟬聲尚未繁勞思當此夕苖稼在西原送覺興上人歸中條山兼謁河中李司空又憶西巖寺秦原草白時山尋樵徑上人到雪房遲暮磬潭泉凍荒林野燒移聞師新譯偈説擬對旌麾寄無可上人僻寺多髙樹涼天憶重遊磬過溝水盡月入草堂秋穴蟻苔痕靜藏蟬栢葉稠名山思徧往早晩到嵩丘南池蕭條㣲雨絶荒岸抱清源入舫山偏塞分泉稻接村秋聲依樹色月影在蒲根淹泊方難遂他宵關夢魂寄龍池寺貞空二上人受請終南住俱妨去石橋林中秋信絶峰頂夜禪遥寒草煙藏虎髙松月照鵰霜天期到寺寺置即前朝送貞空二上人林下中餐後天涯欲去時衡陽過有伴夢澤出應遲石磬疎寒韻銅瓶結夜澌殷勤訝此别且未定歸期送裴校書拜官從秘省署職在藩維多故長疎索髙秋逺别離天寒泗上醉夜靜岳陽碁使府臨南海帆飛到不遲昇道精舍南臺對月寄姚合月向南臺見秋霖洗滌餘出逢危葉落靜㸔衆峰疎冷露常時有禪窻此夜虛相思聊悵望潤氣徧衣初即事索漠對孤燈隂雲積幾層自嗟憐十上誰肯待三徵心被通人見文叨大匠稱悲秋秦塞草懐古漢家陵城靜髙崖樹漏多幽沼冰過聲沙島鷺絶行石菴僧豈謂舊廬在誰言歸未曾謂一作為黄子陂上韓吏部石樓云一别二十二三春相逐升堂者幾為埋骨人涕流聞渡瘴病起喜還秦曽是令勤道非惟䘏在迍疎衣蕉縷細爽味茗芽新鐘絶滴殘雨螢多無近隣溪潭承到數位秩見辭頻若箇山一作中招隠機忘任此身天津橋南山中各題一句野坐分苔石李益山行遶菊叢韋執中雲衣惹不破諸葛覺秋色望來空}
