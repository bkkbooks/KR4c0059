  - {type: variant, offset: 348, length: 1344, content: 寄姚合即事上韓吏部題天津橋南山投李益弔孟協律送人適越送僧遊衡岳送路道中寄弟江亭晚望送耿處士卷第四過唐校書書齋送杜秀才送天台僧懷紫閣隱者懷皇甫荀秋暮哭胡遇送丹師歸閩中送惟鍳法師題李疑幽居送韓湘寄董武宿贇上人方訪李甘原居題山井寺無可上人相訪送李餘及第歸荒齋喜賀蘭三見訪題鏡公房送陳判官送唐環喜唐温琪頻至送敡法師寄錢庻子原上秋居夏夜冬夜送厲宗上人寄李存穆贈無懷禪師寄主簿姚題劉華書齋送盧秀才送姚明府送友人遊江左雨中懷友人寄逺南齋題友人新居二首卷第五送雍陶入蜀張郎中過原東居答王秘書送李餘偶作過秀才雍君居寄顧非熊送神邈法師送霄韻法師送知興上人送惠雅法師憶吳處士題章愽士新居留辭從叔謩送朱兵曹懷慱陵故人夕思寄楊少尹孟融逸人晚晴見終南諸峰宿池上喜姚郎中囬送鄭史送李溟和楊鄭州題長江泥陽舘送徐員外送賀蘭上人寄令狐相公寄李尚書逢舊識崇聖寺斌公房送李傅侍郎別徐明府送友人歸襄陽送友人遊蜀送鄭少府子規送僧歸天台卷第六上樂使君贈友人送雍陶及第歸謝令狐相公賜衣送鍳周上人送譚逺上人新年送姚杭州送僧夜集田卿宅寄長孫栖嶠酬厲玄送劉式送空公贈紹明上人贈弘泉上人送宣皎上人病起送殷侍御送沈鶴懷錢孟二人贈李金州酬姚校書送獨孤馬二秀才病禪靑門里作盧秀才南臺寄李輈侍御寄令狐相公再投李益積雪過楊道士居贈僧送友人遊塞思遊邉友人秋暮寄友人寄令狐相公和孟逸人宿姚少府北齋雪晴晚望卷第七送崔嶠寄朱錫珪馬戴居華山因寄寄胡遇送李戎送孫逸人寄華山僧送李登過郝逸人居酬李廓與李廓同宿送南卓歸京酬韓愈書問長孫霞李溟見訪送惟一鄭尚書新開涪口寄喬侍郎送華法師送蔡京慈恩寺上座院題朱慶餘所居送王知新贈胡禪師元日女道士受重與彭兵曹贈莊上人逢僧伯陽贈皇甫主簿遊山宿成湘林下喜雍陶至酬胡遇宿郁公房送禇山人寄韓湘雨夜寄馬戴喜無可上人囬寄毘陵徹公送韋校書寄劉侍郎卷第八送穆少府留別鄠中友人送李校書宿孤舘哭宗宻禪師宿山寺送友人知邉題竹谷上人院京北原作寄江上人送僧歸太白山暮過山村鷺鷥内道塲僧弘紹蔣亭和蔡湘州光州王使君水亭作留別王使君宿姚合宅寄張司業哭張籍靈凖上人院寄栁舍人送玄巖上人歸西蜀寄宋州田中丞送朱休歸劍南寄長武朱尚書送皇甫侍御郊居即事夜集姚合宅期可公不至喜李餘自蜀至王侍御南原莊送康秀才送僧寄魏少府原居即事言懷登樓上樂使君救康成公昆明池泛舟送僧送劉知新寄慈恩寺郁上人送饒州張使君觀冬設上楊尚書卷第九巴興作早蟬投元郎中阮籍嘯臺滕校書院小池送陜府王司馬上谷旅夜寄無得頭陀雙白鷺送胡道士寄韓潮州詶張籍王建逢故人彭兵曹贈牛山人送于中丞送劉侍御重使江西贈圎上人贈李使君酬文郁上人訪鍳玄師姪夜坐送別聞蟬感懷夏夜上谷宿開元寺送于總持歸京崔卿池上鶴田中丞高亭友人婚楊氏催粧酬朱侍御望月題韋雲叟草堂和韓愈泛南溪方鏡酬姚合送靈應上人贈丘先生渡桑乾夜期嘯客不至夜集烏行中所居贈梁浦斑竹杖尋石甕寺上方卷第十秋寄題靈隱寺黎陽寄姚合送崔約秀才詠懷夏日寄髙洗馬送周判官元範赴越送羅少府歸牛渚題童眞上人贈温觀主賀龎少尹除太常少卿上邠寜邢司徒欲遊嵩岳留別李益病鶻吟贈翰林贈僧頌德上賈常侍田將軍書院投龎少府夏夜登南樓題靑龍寺贈李文通贈虢州三堂吳郎中送僧三月晦日贈劉評事送張道者題魚尊師院宿杜家亭送稱上人楊祕書新居聽樂山人彈易水經蘇秦墓題戴勝題隱者居哭孟東野過京索先生墳客思塩池院觀鹿唐賈浪仙, WYG: ''}
