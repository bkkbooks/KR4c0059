front:
  text: 唐賈浪仙長江集卷第八
  hash: sha256:56105e30fd55f5d48b4d69e73ce1c03f1780f2a096ea9ba7107bfc75afed82fd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0059_SBCK_008-1a}
body:
  text: 普州司馬參軍范陽賈島浪仙送穆少府知眉州劍門倚靑漢君昔未曾過日暮行人少山深異鳥多猿啼和峽雨棧盡到江波一路白雲裏飛泉灑薜蘿二月晦日留別鄠中友人立馬栁花裏别君當酒酣春風漸向北雲鴈不飛南明曉日𥘉一今年月又三鞭羸去暮色逺嶽起煙嵐送李校書赴吉期筮算重重吉良期詎可遷不同牛女夜是配鳯凰年佩玉春風裏題章臘燭前詩書與針訓夫哲又妻賢宿孤館落日投村戍愁生為客途寒山晴後緑秋水夜來孤橘樹千株在漁家一半無自知風水靜舟繫岸邉蘆哭宗密禪師鳥道雪岑巔師亡誰去禪几塵增滅後樹色改生前層塔當松吹殘蹤傍野泉唯嗟聽經虎時到壞菴邉宿山寺衆岫聳寒色精廬向此分流星透踈木走月逆行雲絶頂人來少高松鶴不群一僧年八十世事未曾聞送友人如邉去日重陽後前程菊正芳行車輾秋嶽落葉墜寒霜雲入漢天白風高磧色黃蒲輪待恐晚求薦向諸方題竹谷上人院禪庭高鳥道廽望極川原樵徑連峰頂石泉通竹根木深猶積雪山淺未聞猿欲別塵中苦願師貽一言京北原作登原見城闕策蹇思炎天日午路中客槐花風處蟬逺山秦木上淸渭漢陵前何事居人世皆從一作因名利牽寄江上人紫閣舊房在新家中嶽東煙波千里隔消息一朝通寒日汀洲路秋晴島嶼風分明杜陵葉別後兩經紅兩一作雨送僧歸太白山堅氷連夏處太白接靑天雲塞石房路峰明雨外巔夜禪臨虎穴寒漱撇龍泉後會不期日相逢應信緣暮過山村數里聞寒水山家少四鄰怪禽啼曠野落日恐行人𥘉月未終夕邉烽不過秦蕭條桑柘外煙火漸相親鷺鷥求魚未得食沙岸往來行島月獨棲影暮天寒過聲墮巢因木折失侣遇弦驚頻向煙霄望吾知爾去程內道場僧弘紹麟德燃香請長安春幾回夜間一作寒同像寂晝定為吾開講罷松根老經浮海水來六年雙足履只步院中苔蔣亭和蔡湘州蔣宅為亭榭蔡城東郭門潭連秦相井松老漢朝根巳積蒼苔遍何曾舊徑存高齋無事後時復一携樽光州王建使君水亭作楚水臨軒積澄鮮一畝餘栁根連岸盡荷葉出萍𥘉極浦淸相似幽禽到不虛夕陽庭際眺槐雨滴踈踈留別光州王使君建杜陵千里外期在末秋歸既見林花落須防木葉飛楚從何地盡淮隔數峰微廽首餘霞失斜陽照客衣宿姚合宅寄張司業籍間宵因集會柱史話先生身愛無一事心期往四明松枝影搖動石磬響寒淸誰伴南齋宿月高霜滿城哭張籍精靈歸恍惚石磬韻曾聞即日是前古誰人耕此墳舊遊孤枕逺故域九江分本欲蓬瀛去餐芝御白雲靈凖上人院掩扉當太白臘數等松椿禁漏來遙夜山泉落近鄰經聲終卷曉草色幾芽春海內知名士交遊凖上人寄栁舍人宗元格與功俱造何人意不降一宵三夢栁孤泊九秋江擢第名重列沖天字幾雙誓為仙者僕側執馭風幢送玄巖上人歸西蜀玉壘山中寺幽深勝槩多藥成彭祖搗頂受七輪摩去臘催今夏流光等逝波會當依糞掃一作草五嶽遍頭陀寄宋州田中丞古郡近南徐關河萬里餘相思深夜後未答去秋書自別知音少難忘識面𥘉舊山期巳久門掩數畦𬞞送朱休歸劍南劍南歸受賀大學賦聲雄山路長江岸朝陽十月中芽新抽雪茗枝重集猿楓卓氏琴臺廢深蕪想徑通寄長武朱尚書不日即登壇槍旗一萬竿角吹邊月沒鼓絶爆雷殘中國今如此西荒可取難白衣思請謁徒步在長安送皇甫侍御曉鍾催早朝自是赴嘉招身泊湘江濶田收楚澤遙雁驚起衰草猿渴下寒條來使黔南日時應問寂寥郊居即事住此園林久其如未是家葉書傳野意簷溜煮胡茶雨後逢行鷺更深聽逺蛙自然還往裏多是愛煙霞夜集姚合宅期可公不至公堂秋雨夜已是念園林何事疾病日重論山水心孤燈明臘後微雪下更深釋子乖來約泉西寒磬音喜李餘自蜀至迢遞岷峨外西南驛路高幾程尋嶮棧獨宿聽寒濤白鳥飛還立靑猿斷更號往來從此過詞體近風騷王侍御南原莊買得足雲地新栽藥數窠峰頭盤一徑原下注雙河春寺間眠久晴臺獨上多南齋宿雨後仍許重來麼一作過送康秀才俱為落第年相識落花前酒㵼兩三盞詩吟十數篇行𡵨逢塞雨嘶馬上津船樹影高堂下廽時應有蟬送僧此生披衲過在此得身間日午遊都市天寒往華山言歸文字外意出有無間仙掌雲邉樹巢禽時出關寄魏少府來時乖面別一作傷逺別終日使人慙易記卷中句難忘燈下談濕苔粘樹癭瀑布濺房菴音信如相惠移居古井南原居即事言懷贈孫員外出入土門偏秋深石色泉徑通原上草地接水中蓮採菌依餘枿拾薪逢刈田鑷撏白髮斷兵阻尺書傳避路來華省抄詩上彩箋高齋久不到猶喜未經年登樓秋日登高望涼風吹海𥘉山川明巳久河漢沒無餘逺近涯寥敻髙低中太虛賦因王閣筆思比謝遊踈上樂使君救康成公曾夢諸侯笑康囚議脫枷千根池裏藕一朵火中花昆明池泛舟一枝靑竹榜泛泛緑萍裏不見釣魚人漸入秋塘水送僧大內曾持論天南化俗行舊房山雪在春草嶽陽生曉了蓮經義堪任寶蓋迎王侯皆護法何寺講鍾鳴送劉知新往襄陽此別誠堪恨荆襄是舊遊眼光懸欲落心緒亂難妝花木三層寺煙波五相樓因君兩地去長使夢悠悠寄慈恩寺郁山人中秋期夕望虛室省相容北斗生淸漏南山出碧重露寒鳩宿雨鴻過月圓鍾此夜情應切衡陽舊住峰送饒州張使君終南雲雨連城闕去路西江白浪頭滁上郡齋離昨日鄱陽農事勸今秋道心生向前朝寺文思來因靜夜樓借問泊帆干謁者誰人曾聽峽猿愁觀冬設上東川楊尚書匏革奏冬非獨樂軍城未曉啓重門何時去入三台貴此日空知八座尊羅綺舞時收雨點貔貅門外卷雲根逐遷屬吏隨賔列去棹扁舟不忘恩唐賈浪仙長江集卷第八
