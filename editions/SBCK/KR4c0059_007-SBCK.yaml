front:
  text: 唐賈浪仙長江集卷第七
  hash: sha256:57c1877ad8aff811b35d826b1a294a7108b44280f6601532ef6393bc228b056c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0059_SBCK_007-1a}
body:
  text: 普州司倉叅軍范陽賈島浪仙送崔嶠遊瀟湘功烈尚書孫琢磨風雅言渡河山鑿處陟峴漢灘喧夢想吟天目宵同話石門楓林葉欲下極浦月清􅚐􅀉朱錫珪逺泊與誰同來從古木中長江人釣月曠野火燒風夢澤吞楚大閩山阨海叢此時檣底水濤起屈原通馬戴居華山因􅀉玉女洗頭盆􅀌高不可言瀑流蓮岳頂河注華山根絶雀林藏鶻無人境有猿秋蟾􅂊過雨石上古松門􅀉胡遇一自殘春別經炎復到凉螢從枯樹出蛩入破堦藏落葉書勝􅁓閑砧坐當牀東門因送客相訪也何妨送李戎扶侍往夀安二千餘里路一半是波濤未暁著衣起出城逢日高關山多寇盗扶侍帶􅃓刀臨別不揮淚誰知心欎陶送孫逸人衣屨猶同俗妻兒亦宛然不餐能累月無病巳多年是藥皆諳性令人漸信仙杖頭書數卷荷入翠㣲煙􅀉華山僧遥知白石室松栢隱朦朧月落㸔心次雲生閉目中五更鍾隔岳萬尺水懸空苔蘚嵌巖所依稀有徑通送李登少府伊陽耽酒尉朗詠醉醒新應見嵩山裏明年躑躅春一千尋樹直三十六峰隣流水潺潺處堅貞玉澗珉易州過郝逸人居毎逢詞翰客邀我共尋君果見閑居賦未曾流俗聞也知隣市井宛似出􅅝氛􅁍笑巢由軰何湏隱白雲詶鄠縣李廓少府見􅀉稍憐公事退復遇夕陽時北朔霜凝竹南山水入籬吟懷滄海侣空問白雲師恨不相從去心惟野鶴知净業寺與前鄠縣李廓少府同􅀫來從城上峰京寺暮相逢往往語復黙㣲㣲雨灑松家貧􅀄罷吏年長畏聞蛩前日猶拘束披衣起暁鍾送南卓歸京殘春別鏡陂罷郡未霜髭行李逢炎暑山泉滿路岐雲藏巢樹鶴風觸囀鶯枝三省同虚位􅀟旌帶去思入城霄夢後待漏月沉時長䇿并忠告從容冩玉墀卧疾走筆詶韓愈書問一卧三四旬數書惟獨君一作書至獨思君願爲出海月不作歸山雲身上衣頻􅀉甌中物亦分欲知强徤否病鶴未離群長孫霞李溟自紫閣白閣二峰見訪寂寞吾廬貧同來二閣人所論唯野事招作一作訪我住雲隣古寺期秋􅀫平林散早春漱流今巳矣巢許豈尭臣送惟一遊淸凉寺去有廵臺侣荒溪衆樹分瓶殘秦地水錫入晉山雲秋月離喧見寒泉出定聞人間臨欲別旬日雨紛紛鄭尚書新􅄏涪江二首岸鑿靑山破江􅄏白浪寒日沉源出海春至草生灘梓匠防波溢蓬仙畏水乾從今䟽决後任雨滯峰巒又不侵南畝務已㧞北江流涪水方移岸潯陽有到舟潭澄􅀄搗藥波動乍垂鈎山可䟽三里蹤知一作惟應暦億秋􅀉喬侍郎大寜猶未到曾渡北浮橋暁出􅐡船寺手擎紫栗條差池不相見悵望至今朝近日營家計繩懸一小瓢送去華法師在越居何寺東南水路歸秋江洗一鉢寒日曬三衣黙􅃪鴻聲盡行㸔葉影飛囊中無寳貨船戸夜扄稀送蔡京躍蹄歸魯日帶漏別秦星易折芳條桂難窮􅃉義經登封多泰岳廵狩徧滄溟家在何林下梁山翠滿庭慈恩寺上座院未委衡山色何如對塔峰􅇮宵曾􅀫此今夕值秋濃羽族栖煙竹寒流帶月鍾井甘源起異泉湧漬苔封題朱慶餘所居天寒吟竟暁古屋瓦生松􅀉信船一􅃗隔鄊山萬重樹來沙岸鳥窓度雪樓鍾毎憶江中嶼更㸔城上峰送黃知新歸安南池亭沉飲徧非獨曲江花地逺路穿海春歸冬到家火山難下雪瘴土不生茶知决移來計相逢期尚賖贈胡禪師自是根機鈍非關夏臘􅀷秋來江上寺夜坐嶺南心井鑿山含月風吹磬出林祖師携􅃗履去路杳難尋元日女道士受籙元日更新夜齋身稱净衣數星連斗出萬里㫁雲飛天寒吟竟暁古屋瓦生松􅀉信船一􅃗隔鄊山萬重樹來沙岸鳥窓度雪樓鍾毎憶江中嶼更㸔城上峰送黃知新歸安南池亭沉飲徧非獨曲江花地逺路穿海春歸冬到家火山難下雪瘴土不生茶知决移來計相逢期尚賖贈胡禪師自是根機鈍非關夏臘􅀷秋來江上寺夜坐嶺南心井鑿山含月風吹磬出林祖師携􅃗履去路杳難尋元日女道士受籙元日更新夜齋身稱净衣數星連斗出萬里㫁雲飛霜下磬聲在月高壇影㣲立聽師語了左肘繋符歸重與曹彭兵曹故人在城裏休􅀉海邉書漸去老不逺別來情豈踈硯氷催臘日山雀到貧居毎有平戎計官家別勑書贈荘上人不語焚香坐心知道巳成流年衰此世定力見他生暮雪餘春冷寒燈續晝明尋常五侯至敢望下堦迎落第東歸逢僧伯陽相逢湏語笑人世別離頻暁去長侵月思鄊動隔春見僧心暫静從俗事多迍宇宙詩名小山河客路新翠桐猶入㸑淸鏡未辭塵逸足思奔驥隨群且退鱗宴乖紅杏寺愁在緑楊津老病難爲樂􅄏眉頼故人皇甫主簿期遊山不及赴休官疋馬在新意入山中更住應難遂前期恨不同集蟬苔樹僻留客雨堂空􅀷夜誰相訪惟當淸浄翁􅀫成湘林下相訪夕陽時千株木未衰石泉流出一作出幽谷山雨滴栖鴟漏向燈􅃪數酒因客寢遲今宵不盡興更有月明期喜雍陶至今朝笑語同幾日百憂中烏度劍門静蠻歸瀘水空歩霜吟菊畔待月坐林東且莫􅀌此興勿論窮與通酬胡遇麗句傳人口科名立可圖移居見山燒買樹帶巢烏遊逺風濤急吟清雪月􅀌􅁍思􅀄識面仍未有多􅂡􅀫慈恩寺郁公房病身來􅀉􅀫自掃一床閑反照臨江磬新秋過雨山竹隂移冷月荷氣帶禪關獨往天台意方從内請還送禇山人歸日東懸帆待秋水去入杳􅁳關東海幾年別中華此日還岸遥生白髪波盡露靑山隔水相思在無書也是閑􅀉韓湘過嶺行多少潮州漳滿川花􅄏南去後水凍北歸前望鷺吟登閣􅃪猿淚滴船相思堪面話不著尺書傳雨夜􅀉馬戴芳林杏花樹花落子西東今夕曲江雨寒催朔北風鄊書滄海絶隱路翠㣲通寂寂相思際􅀌缸殘漏中喜無可上人遊山囬一食復何如尋山無定居相逢新夏滿不見半年餘􅃪話龍潭雪休傳鳥道書別來還似舊白髪日高梳􅀉毘陵徹公身依吳寺老黃葉幾廽㸔早講林霜在􅀌禪􅂩月殘井通潮浪逺鐘與角聲寒已有南遊約誰言禮謁難其二賔佐兼歸覲此行江漢心别離從闕下道路向山隂孤嶼消寒沬空城滴夜霖若邪溪畔寺秋色共誰尋􅀉劉侍御衣多苔蘚痕猶擬更趨門自夏雖無病經秋不過原積泉留岱鳥疊岫隔巴猿琴月西齋集如今豈復言送韋瓊校書缺唐賈浪仙長江集卷第七
