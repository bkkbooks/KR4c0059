front:
  text: 唐賈浪仙長江集卷三
  hash: sha256:b1662e32b6ae79112dbe153a2f20297864eed66ebf58888b1bd91d280652d3ea
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0059_SBCK_003-1a}
body:
  text: 普州司倉叅軍范陽賈島浪仙􅀉令狐相公䇿杖馳山驛逢人問梓州長江那可到行客替生愁哭栢巖禪師苔覆石床新師曾占幾春冩留行道影焚􅁍坐禪身塔院關松雪經房鎻􅂩塵自嫌􅀟淚下不是觧空人山中道士頭髪梳千下休糧帶瘦容養雛成大鶴種子作高松白石通宵煑寒泉盡日舂不曾離隱處那得世人逢就可松􅀫十里尋幽寺寒流數􅂀分僧同雪夜坐鴈向草堂聞静語終燈熖餘生許嶠雲猶來多抱疾聲不逹明君旅遊此心非一事書札􅀂爲傳舊國別多日故人無少年空巢霜葉落踈牖水螢穿留得林僧􅀫中宵坐黙一作黯然送鄒明府遊靈武曽宰西畿縣三年馬不肥債多平一作憑劍與官滿載書歸􅁁雪藏行徑林風透卧衣靈州聽曉角客舘未開扉題皇甫荀藍田㕔任官經一年縣與玉峰連竹籠拾山果瓦瓶擔石泉客歸秋雨後印鎻暮鍾前久別丹陽浦時時夢釣船贈王將軍􅀫衞爐烟近除書墨未乾馬曾金鏃中身有寳刀瘢父子同時捷君王􅀞陣㸔何當爲外帥白日出長安下第下第只空囊如何住一作在帝鄕杏園啼百舌誰醉在花傍淚落故山逺病來春草長知音逢一作酧豈易􅀌棹􅀒三湘􅀉賀蘭朋吉往往東林下花香似火焚故園從小別夜雨近秋聞野菜連寒水枯株簇古墳泛舟同逺客尋寺入幽雲斜日扉多掩荒田徑細分相思蟬幾處偶坐蛺成群會􅀫曾論道登高省議文苦吟遥可想邉葉向紛紛憶吳處士半夜長安雨燈前越客吟􅀌舟行一月萬水與千岑島嶼夏雲起汀洲芳草􅀷何當折松葉拂石剡溪隂哭孟郊身死聲名在多應萬古傳寡妻無子息破宅帶林泉塚近登山道詩隨過海船故人相吊後斜日下寒天送崔定未知遊子意何不避炎蒸幾日到漢水新蟬鳴杜陵秋江待得月夜語恨無僧巴峽吟過否連天十二層􅀉白閣黙公巳知歸白閣山逺晚晴㸔石室人心静氷潭月影殘㣲雲分片滅古木落薪乾後夜誰聞磬西峰絶頂寒雨後􅀫劉司馬池上藍溪秋漱玉此地漲淸澄蘆葦聲兼雨芰荷香遶燈岸頭秦古道亭面漢荒陵静想泉根本幽崖落幾層送朱可久歸越中石頭城下泊北固暝鍾初汀鷺潮衝起船窓月過虚吳山侵越衆隋栁入唐踈日欲躬調膳辟來何府書送田卓入華山幽􅀷足暮蟬驚覺石􅇃眠瀑布五千仭草堂瀑布􅁁壇松涓滴露嶽月泬􅋁天鶴過君湏㸔上頭應有仙送董正字常州覲省相逐一行鴻何時出磧中江流翻白浪木葉落靑楓輕檝浮吳國繁霜下椘空春來懽侍阻正字在東宮酬姚少府梅樹與山木俱應揺落􅀄柴門掩寒雨蟲響出秋􅂼枯槁彰淸鏡孱愚友道書刋文非不朽君子自相於送無可上人圭峰霽色新送此草堂人麈尾同離寺蛩鳴暫別親獨行潭底影數息樹􅁁身終有煙霞約天台作近隣送李􅀐胄歸􅀐􅀟旌逺懽生此别中蘭關分磧路嘶馬背寒鴻朔色晴天北河源落日東賀蘭山頂草時動卷帆風送烏行中石淙別業淙一作琮寒水長䋲汲丁泠數滴翻草通石淙脉硯帶海潮㾗嶽色何曾逺蟬聲尚未繁勞思當此夕苗稼在西原送覺興上人歸中條山兼謁河中李司空又憶西巖寺秦原草白時山尋樵徑上人到雪房遲暮磬潭泉凍荒林野燒移聞師新譯偈說擬對旌麾􅀉無可上人僻寺多高樹凉天憶重遊磬過溝水盡月入草堂秋穴蟻苔痕静藏蟬栢葉稠名山思徧往早晚到嵩丘南池蕭條㣲雨絶荒岸抱淸源入舫山偏塞分泉稻接村秋聲依樹色月影在蒲根淹泊方難遂他宵關夢魂􅀉龍池寺貞空二上人受請終南住俱妨去石橋林中秋信絶峰頂夜禪遥寒草煙藏虎高松月照鵰霜天期到寺寺置即前朝送貞空二上人林下中餐後天涯欲去時衡陽過有伴夢澤出應遲石磬踈寒韻銅瓶結夜澌殷勤訝此別且未定歸期送裴校書拜官從秘省署職在藩維多故長踈索高秋逺別離天寒泗上醉夜静岳陽碁使府臨南海帆飛到不遲昇道精舎南臺對月􅀉姚合月向南臺見秋霖洗滌餘出逢危葉落静㸔衆峰踈冷露尋時有禪窓此夜虚相思聊悵望潤氣徧衣􅀄即事索漠對孤燈隂雲積幾層自嗟憐十上誰肯待三徴心􅀍通人見文叨大匠稱悲秋秦塞草懷古漢家陵城静高崖草漏多幽沼氷過聲沙島鷺絶行石菴僧豈謂舊廬在誰言歸未曾謂一作爲黃子陂上韓吏部石樓云一別二十二三春相逐升堂者幾爲埋骨人涕流聞渡瘴病起喜還秦曾是令勤道非惟䘏在迍踈衣蕉縷細爽味茗芽新鍾絶滴殘雨螢多無近隣溪潭承到數位秩見辭頻􅀂箇山一作中招隱機忘任此身天津橋南山中各題一句野坐分苔石李益山行遶菊叢韋執中雲衣惹不破諸􅁑覺秋色望來空浪仙投李益四十歸燕字千年外始吟巳將書北嶽不用比南金吊孟協律才行古人齊生前品位低葬時貧賣馬逺日􅂘惟妻􅀌塜北邙外空齋中嶽西集詩應萬首物象徧曾題送人適越高城滿夕陽何事欲霑裳遷客蓬蒿暮遊人道路長晴湖勝鏡碧寒栁似金黃􅀂有相思夢殷勤載入行送僧遊衡嶽心知衡嶽路不怕去人稀船裏猶鳴磬溪頭自曝衣有家從小別無寺不言歸料得逢寒往當禪雪滿扉送路別我就蓬蒿日斜飛伯勞龍門流水急嵩嶽片雲高歎命無知已梳頭落白毛從軍當此去風起廣陵濤洛陽道中􅀉弟趨走迫流年慙經此路偏宻雲埋二室積雪度三川生􅀋梗萍泛悲無金石堅翻鴻有歸翼極目仰聮翩江亭晚望浩渺浸雲根烟嵐没逺村鳥歸沙有跡帆過浪無㾗望水知柔性㸔山欲倦魂縱情猶未巳廽馬欲黃昏送耿處士一瓶離別酒未盡即言行萬水千山路􅀌丹幾月程川原秋色静蘆葦晚風鳴迢逓不歸客人傳虚隱名唐賈浪仙長江集卷第三
