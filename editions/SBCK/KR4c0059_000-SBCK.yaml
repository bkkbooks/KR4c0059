front:
  text: 唐賈浪仙長江集目錄
  hash: sha256:819599663221112c96f9c505d4c99db6c94011c49301d32469e40cdae9e60d6d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0059_SBCK_000-1a}
body:
  text: 普州司倉叅軍范陽賈島卷第一古意望山北嶽廟朝飢哭盧仝劍客口號􅀉逺齋中感秋翫月辭二知巳義雀行􅀫懸泉驛辯士不欺絶句寓興遊仙枕上吟􅀟魚謡易水懷古早起客喜寓延夀里精舎贈智朗禪師送沈秀才酬栖上人見終南雪卷第二􅀉孟協律和劉􅆂懷獨􅀌崇魚􅅣投張太祝詠韓氏二子送別詣張籍韓愈上谷送客重酬姚少府投孟郊代邉將􅀉劉栖楚􅀉丘儒送陳商送張校書季霞􅀉友人答王叅延康吟戯贈友人寓興懷鄭從志登龍興寺樓送鄭山人就峰公􅀫劉景陽東齋對菊送集文上人題岸上人閑居游子􅀉王叅送汲鵬卷第三􅀉令狐相公哭栢巖禪師山中道士就可公􅀫旅遊送鄒明府遊靈武題藍田㕔贈王將軍下第􅀉賀蘭朋吉憶吳處士􅂘孟郊送崔定􅀉白閣黙公􅀫劉司馬池上送朱可久歸越中送田卓入華山送董正字常州覲侍酬姚少府送無可上人送李􅀐胄送烏行中送覺興上人􅀉無可上人南池􅀉貞空二上人送貞空二上人送裴校書􅀉姚合即事上韓吏部題天津橋南山投李益弔孟協律送人適越送僧遊衡岳送路道中􅀉弟江亭晚望送耿處士卷第四過唐校書書齋送杜秀才送天台僧懷紫閣隱者懷皇甫荀秋暮哭胡遇送丹師歸閩中送惟鍳法師題李疑幽居送韓湘􅀉董武􅀫贇上人方訪李甘原居題山井寺無可上人相訪送李餘及第歸荒齋喜賀蘭三見訪題鏡公房送陳判官送唐環喜唐温琪頻至送􅆒法師􅀉錢庻子原上秋居夏夜冬夜送厲宗上人􅀉李存穆贈無懷禪師􅀉主簿姚題劉華書齋送盧秀才送姚明府送友人遊江左雨中懷友人􅀉逺南齋題友人新居二首卷第五送雍陶入蜀張郎中過原東居答王秘書送李餘偶作過秀才雍君居􅀉顧非熊送神邈法師送霄韻法師送知興上人送惠雅法師憶吳處士題章愽士新居留辭從叔謩送朱兵曹懷慱陵故人夕思􅀉楊少尹孟融逸人晚晴見終南諸峰􅀫池上喜姚郎中囬送鄭史送李溟和楊鄭州題長江泥陽舘送徐員外送賀蘭上人􅀉令狐相公􅀉李尚書逢舊識崇聖寺斌公房送李傅侍郎別徐明府送友人歸襄陽送友人遊蜀送鄭少府子規送僧歸天台卷第六上樂使君贈友人送雍陶及第歸謝令狐相公賜衣送鍳周上人送譚逺上人新年送姚杭州送僧夜集田卿宅􅀉長孫栖嶠酬厲玄送劉式送空公贈紹明上人贈弘泉上人送宣皎上人病起送殷侍御送沈鶴懷錢孟二人贈李金州酬姚校書送獨􅀌馬二秀才病禪靑門里作盧秀才南臺􅀉李輈侍御􅀉令狐相公再投李益積雪過楊道士居贈僧送友人遊塞思遊邉友人秋暮􅀉友人􅀉令狐相公和孟逸人􅀫姚少府北齋雪晴晚望卷第七送崔嶠􅀉朱錫珪馬戴居華山因􅀉􅀉胡遇送李戎送孫逸人􅀉華山僧送李登過郝逸人居酬李廓與李廓同􅀫送南卓歸京酬韓愈書問長孫霞李溟見訪送惟一鄭尚書新開涪口􅀉喬侍郎送華法師送蔡京慈恩寺上座院題朱慶餘所居送王知新贈胡禪師元日女道士受重與彭兵曹贈莊上人逢僧伯陽贈皇甫主簿遊山􅀫成湘林下喜雍陶至酬胡遇􅀫郁公房送禇山人􅀉韓湘雨夜􅀉馬戴喜無可上人囬􅀉毘陵徹公送􅅊校書􅀉劉侍郎卷第八送穆少府留別鄠中友人送李校書􅀫􅀌舘哭宗宻禪師􅀫山寺送友人知邉題竹谷上人院京北原作􅀉江上人送僧歸太白山暮過山村鷺鷥内道塲僧弘紹蔣亭和蔡湘州光州王使君水亭作留別王使君􅀫姚合宅􅀉張司業哭張籍靈凖上人院􅀉栁􅃕人送玄巖上人歸西蜀􅀉宋州田中丞送朱休歸劍南􅀉長武朱尚書送皇甫侍御郊居即事夜集姚合宅期可公不至喜李餘自蜀至王侍御南原莊送康秀才送僧􅀉魏少府原居即事言懷登樓上樂使君救康成公昆明池泛舟送僧送劉知新􅀉慈恩寺郁上人送饒州張使君觀冬設上楊尚書卷第九巴興作早蟬投元郎中阮籍嘯臺滕校書院小池送陜府王司馬上谷旅夜􅀉無得頭陀􅀟白鷺送胡道士􅀉韓潮州詶張籍王建逢故人彭兵曹贈牛山人送于中丞送劉侍御重使江西贈圎上人贈李使君酬文郁上人訪鍳玄師姪夜坐送別聞蟬感懷夏夜上谷􅀫開元寺送于總持歸京崔卿池上鶴田中丞高亭友人婚楊氏催粧酬朱侍御望月題􅅊雲􅅱草堂和韓愈泛南溪方鏡酬姚合送靈應上人贈丘先生渡桑乾夜期嘯客不至夜集烏行中所居贈梁浦斑竹杖尋石甕寺上方卷第十秋􅀉題靈隱寺黎陽􅀉姚合送崔約秀才詠懷夏日􅀉髙洗馬送周判官元範赴越送羅少府歸牛渚題童眞上人贈温觀主賀龎少尹除太常少卿上邠寜邢司徒欲遊嵩岳留別李益病鶻吟贈翰林贈僧頌德上賈常侍田將軍書院投龎少府夏夜登南樓題靑龍寺贈李文通贈虢州三堂吳郎中送僧三月晦日贈劉評事送張道者題魚尊師院􅀫杜家亭送稱上人楊祕書新居􅃪樂山人彈易水經蘇秦墓題戴勝題隱者居哭孟東野過京索先生墳客思塩池院觀鹿唐賈浪仙長江集目録
