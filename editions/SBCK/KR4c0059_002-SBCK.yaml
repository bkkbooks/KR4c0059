front:
  text: 唐賈浪仙長江集卷第二
  hash: sha256:3220542bf926a6147dfc548a17d7095baae8f2daaaeb48ae2e8f589fe9cf8f5d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0059_SBCK_002-1a}
body:
  text: 普州司倉叅軍范陽賈島浪仙􅀉孟協律我有吊古泣不泣向路岐揮淚灑暮天滴著一作毎滴桂樹枝別後冬節至離心北風吹坐􅀌雪扉夕泉落石橋時不驚猛虎嘯難辱君子詞欲酬空覺老無以堪逺持岧嶤􅀝角窓王屋懸淸思和劉􅆂京官始云滿野人依舊閑閉扉一畝居中有古風還市井日巳午幽窓夢南山喬木覆北齋有鳥鳴其間前日逺嶽僧來時與開關新題驚我瘦窺鏡見醜顔陶情惜淸澹此意復誰攀明月山懷獨孤崇魚琢明月長在目明月長在心在心復在目何得稀去尋試望明月人孟夏樹蔽岑想彼嘆此懷樂喧忘幽林鄕本北嶽外悔一作毎恨東夷􅀷願縮地脉還豈待天恩臨非不渇隱秀却嫌他事侵或云岳樓鍾來繞草堂吟當從令尹後再往歩栢林投張太祝風骨高更老何春􅀄陽葩泠泠月下韻一一落海涯有子不敢和一聽千嘆嗟身卧東北泥魂掛西南霞手把一枝栗往輕覺程賖水天朔方色暖日嵩根花逹一作逵間幽栖山遣尋種藥家欲買􅀟瓊瑶慙無一木􅀲詠韓氏二子千巖一尺璧八月十五夕清露墮桂花白鳥舞虚碧送別丈夫未得意行行且低眉素琴彈復彈會有知音知携新文詣張籍韓愈途中成䄂有新成詩欲見張韓老靑竹未生翼一歩萬里道仰望靑􅁳天雲雪壓我腦失却終南山惆悵滿懷抱安得西北風身願變蓬草地祗聞此語突出驚我倒上谷送客遊江湖莫嘆迢逓分何殊咫尺別江樓到夜登還見南臺月重酬姚少府隙月斜枕旁諷詠夏詒什如今何時節虫虺亦巳蟄答遲禮渉傲抱疾思加澁僕本胡爲者銜肩貢客集茫然九州内譬如一錐立欺暗少此懷自明曾􅄋泣量無趫勇士誠欲戈矛戢原閣期躋攀潭舫偶俱入􅀷齋竹木合一作多畢夕風雨急俸利沐均分價稱煩嘘噏百篇見刪罷一命嗟未及滄浪愚將還知音激所習投孟郊月中有􅀌芳天下聆薫風江南有高唱海北􅀄來通容飄清冷餘自藴􅁭抱中止息乃流溢推尋却􅁳蒙我知雪山子謁彼偈句空必竟􅀗所實爾焉遂􅀷􅂨錄之􅀌燈前猶恨百首終一吟動狂機萬疾辭頑躬生年面未交永夕夢輙同敘詰誰君師詎言無吾宗余未履其跡君曰可但攻啜波腸易飽揖險神難從前􅀊曾入洛差池阻從龍萍家復從趙雲思長縈縈嵩海毎可詣長途追再窮願傾肺腸事盡入焦梧桐代邉將持戈簇􅁁日戰罷浮雲􅀵露草泣寒霽夜泉鳴隴頭三尺握中鐵氣衝星斗牛報國不拘貴憤將平虜讎􅀉劉栖椘趨走與偃卧去就自殊分當窓一重樹上有萬里雲離披不相顧髣髴􅀋人群友生去更逺來書絶如焚蟬吟我爲聽我歌蟬豈聞􅀊暮儻旋歸晤言桂氛氲􅀉丘儒地近輕數見地逺重一面一面如何重重甚珍寳片自經失歡笑幾度騰霜霰此心鎮懸懸天象固廽轉長安秋風高子在東甸縣儀形信寂蔑風雨豈乖間憑人報消息何易憑筆硯俱不盡我心終湏對君宴送陳商古道長荆􅁄新岐路交橫君於荒榛中尋得古轍行足􅂿聖人路貌端禪士形我曾接夜談似聽講一經聮翩曾數舉昨登高第名釜底絶烟火暁行皇帝經上客逺府遊主人湏目明青雲別靑山何日復可升送張校書季霞從京去容州馬在船上多容州幾千里􅀡傍靑天涯掌記試校書未稱高詞華義往不可屈出家如入家城市七月􅀄􅀬與夏未差餞君到野地秋凉滿山坡南境異北候風起無塵沙秦吟􅀫椘澤海酒落桂花暫醉即還醒彼土生桂茶􅀉友人同人半年別一別寂來音頼有別時文相思時一吟我常倦投跡君亦知此衿筆硯且勿棄蘇張曾陸沈但存舌在口當冀身遂心君㸔明月夜松桂寒森森答王叅寸晷不相待四時互如競客思先覺秋虫聲苦知暝霜松積舊翠露月團如鏡詩􅀒属景同琴孤坐堂聽相期黃菊節別約紅桃徑毎把式㣲篇臨風一長詠延康吟􅀉居延夀里爲與延康隣不愛延康里愛此里中人人非十年故人非九族親人有不朽語得之烟山春戯贈友人一日不作詩心源如廢井筆硯爲轆轤吟詠作縻綆朝來重汲引依舊得淸泠書贈同懷人詞中多苦辛寓興眞集道方至貌殊妬還多山泉入城池自然生渾波今時出古言在衆翻爲訛有琴含正韻知音者如何一生足感激世言忽嵳峩不得市井味思響吾巖阿浮華豈我事日月徒蹉跎曠哉頴陽風千載無其他懷鄭從志西風吹隂雪雨雪半夜􅀵忽憶天涯人起㸔斗與牛故人別二年我意如百秋音信兩杳杳誰云昔綢繆平明一封書􅀉向東北舟翩翩春歸烏會自爲匹儔易州登龍興寺樓望郡北高峰郡北最高峰巉巖絶雲路朝來上樓望稍覺得幽趣朦朧碧烟裏群嶺􅀂相附何時一登陟萬物皆下顧送鄭山人遊江湖南游衡嶽上東往天台裏足躡華峰頂目觀滄海水就峰公􅀫河出鳥􅀫後螢火白露中上人坐不􅀝共我論量空殘月華晻曖逺水響玲瓏爾時無了夢兹宵方未窮劉景陽東齋松隂連竹影中有無苔井淸風此地多白日空自永景陽公幹孫詩句得眞景勸我不湏歸月出東齋静對菊九日不出門十日見黃菊灼灼尚繁英美人無消息送集文上人遊方來從道陵井􅀟木溪邉會分首芳草時逺意靑天外此遊詣幾嶽嵩華衡恒泰題岸上人郡内閑居静向方寸求不居山一作千嶂幽池􅄏􅔽蓞香門閉莓苔秋金玉童四句粃糠輕九流鑪烟上喬木鍾磬下危樓手種一株松貞心與師儔遊子遊子喜郷逺非吾憶歸廬誰知奔他山自欲早旋車朝賞暮巳足圖歸願無餘當期附鵬翼未偶方躊躇􅀉山中王叅我㸔嶽西雲君㸔嶽北月長懷燕城南相送十里別別來千餘日日日憶不歇逺􅀉一􅁓書數字論白髪送汲鵬淮南卧理後復逢君姓汲文采非尋常志願期卓立深江東泛舟夕陽跳原隰夏夜言詩會徃徃追不及唐賈浪仙長江集卷第二
