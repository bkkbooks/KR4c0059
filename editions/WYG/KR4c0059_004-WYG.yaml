  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0059_WYG_004-1a, image: WYG1078/WYG1078-0403c.png}
body:
  text: 長江集巻四唐賈島撰過唐校書書齋池滿風吹竹時時得爽神聲齊雛鳥語畫巻老僧真月出行幾步花開到四鄰江湖心自切未可掛頭巾送杜秀才東遊東遊誰見待盡室寄長安别後葉頻落後一作夜去程山已寒大河風色度曠野燒烟殘匣有青銅鏡時將照鬢㸔送天台僧逺夢歸華頂扁舟背岳陽寒蔬修净食夜浪動禪牀鴈過孤峯曉猿啼一樹霜身心無别念餘習在詩章懐紫閣隠者寂寥思隠者孤燭坐秋霖梨栗猿喜熟雲山僧説深寄書應不到結伴擬同尋廢寢方終夕迢迢紫閣心雨夜同厲𤣥懐皇甫荀桐竹遶庭匝雨多風更吹還如舊山夜卧聴瀑泉時磧鴈來期近秋鐘到夢遲溝西吟苦客中夕話兼思秋暮北門楊栁葉不覺已繽紛值鶴因臨水迎僧忽背雲白鬚相並出清淚兩行分黙黙空朝夕苦吟誰喜聞哭胡遇夭夀知齊理何曽免歎嗟祭迴一作葬時收朔雪弔後折寒花野水吟秋斷空山影暮斜弟兄相識徧猶得到君家送丹師歸閩中波濤路杳然衰栁洛陽蟬行李經雷電禪前漱島泉歸林久别寺過越未離船自説從今去身應老海邊送安南惟鑒法師講經春殿裏花遶御牀飛南海幾迴過舊山臨老歸潮揺蠻草落月濕島松㣲一作觸風香損印霑雨磬生衣空水既如彼一作雲水路迢逓往來消息稀題李凝幽居閒居少隣並草徑入荒園鳥宿池邊一作中樹僧敲月下門過橋分野色移石動雲根暫去還來此幽期不負言送韓湘掛席從古一作中路長風起廣津楚城花未發上苑蝶來新半没湖波月初生島草春孤霞臨石鏡極浦映村神細響吟乾葦餘馨動逺蘋欲慿將一札寄與沃州人寄董武雖同一城裏少省得從容門掩園林僻日髙巾幘慵孤鴻來半夜積雪在諸峯正憶毘陵客聲聲隔水鐘宿贇上人房堦前多是竹閒地擬栽松朱㸃草書疏雪平麻履蹤御溝寒夜雨宫寺静時鐘此時一作室無他事來尋不厭重訪李甘原居原西居處静門對曲江開石縫銜枯草查根上净苔一作漬古苔翠㣲泉夜落紫閣鳥時來仍憶尋淇岸同行採蕨囘題山寺井沉沉百尺餘功就豈斯須汲早僧出定鑿新蟲自無藏源重嶂底澄翳大空隅此地如經劫涼潭㑹共枯僻居無可上人相訪自從居此地少有事相關積雨荒隣圃秋池照逺山硯中枯葉落枕上斷雲閒野客將禪子依依偏往還送李餘及第歸蜀知音伸久屈覲省去光輝津渡逢清夜途程盡翠㣲雲當綿竹疊鳥離錦江飛肯寄書來否原居出亦稀荒齋草合徑㣲㣲終南對掩扉晩涼疎雨絶初曉逺山稀落葉無青地閒身著白衣朴愚猶本性不是學忘機夜喜賀蘭三見訪漏鐘仍夜淺時節欲秋分泉聒棲松鶴風除翳月雲踏苔行引興枕石卧論文即此尋常静來多祇是君題青龍寺鏡公房一夕曽留宿終南揺落時孤燈岡一作龕舎掩殘磬雪風吹樹老因寒折泉深出井遲疎慵豈有事多失上方期送陳判官赴綏徳將軍遥入幕束帶便離家身暖蕉衣窄天寒磧日斜火燒岡斷葦一作草風捲雪平沙絲竹豐州有春來祇欠花送唐環歸敷水莊毛女峰當户日髙頭未梳地侵山影掃葉帶露痕書松徑僧尋廟一作藥沙泉鶴見魚一川風景好恨不有吾廬原東居喜唐温琪頻至曲江春草生紫閣雪分明汲井嘗泉味聴鐘問寺名墨研秋日雨茶試老僧鐺地近勞頻訪烏紗出送迎送􅏡法師度嵗不相見嚴冬始出關孤烟寒色樹髙雪夕陽山瀑布寺應到牡丹房甚閒南朝遺跡在此去幾時還寄錢庶子曲江春水滿北岸掩柴關秖有僧隣舎全無物映山樹隂終日掃藥債隔年還猶記聴琴夜寒燈竹屋間原上秋居關西又落木心事復如何嵗月辭山久秋霖入夜多鳥從井口出人自岳陽過倚杖聊閒望田家未剪禾夏夜原寺偏隣近開門物景澄磬通多葉罅月離片雲稜寄宿山中鳥相尋海畔僧唯愁秋色至乍可在炎蒸冬夜羈旅復經冬瓢空盎亦空淚流寒枕上跡絶舊山中凌結浮萍水雪和衰栁風曙光雞未報嘹唳兩三鴻送厲宗上人擁䇿背岷峨終南雨雪和漱泉秋鶴至禪樹夜猿過髙頂白雲盡前山黄葉多曽吟廬嶽上月動九江波寄李存穆聞道船中病似憂親弟兄信來從水路身去到柴城久别長鬚鬢相思書姓名忽然消息絶頻夢却還京贈無懐禪師身從劫劫修果以此生周禪定石牀暖月移山樹秋捧盂觀宿飯敲磬過清流不掩𤣥關路教人問白頭寄武功姚主簿居枕江沱北情懸渭曲西數宵曽夢見幾處得書披驛路穿荒坂公田帶淤泥静棊功奥妙閒作韻清淒鋤草留叢藥尋山上石梯客迴河水漲風起夕陽低空地苔連井孤村火隔溪巻簾黄葉落鎖印子規啼隴色澄秋月邊聲入戰鼙㑹須過縣去况是屢招攜題劉華書齋白石牀無塵青松樹有鱗一鶯啼帶雨兩樹合從春荒榭苔膠砌幽叢果墮榛偶來疎或數當暑夕勝晨露滴星河水巢重草木薪終南同往意趙北獨遊身渡葉司天漏驚蛩逺地人機清公幹族也莫卧漳濵送盧秀才遊潞府雨餘滋潤在風不起塵沙邊日寡文思送君吟月華過山干相府臨水宿僧家能賦焉長屈芳春宴杏花送南康姚明府銅章美少年小邑在南天版籍多遷客封疆接洞田静江鳴野鼓發䌫帶村烟却笑陶元亮何須憶醉眠送友人棄官遊江左羨君休作尉萬事且全身寰海多虞日江湖獨往人姓名何處變鷗鳥幾時親别後吳中使應須訪子真雨中懐友人對雨思君子嘗茶近竹幽儒家隣古寺不到又逢秋寄逺家住錦水上身征遼海邊十書九不到一到忽經年南齋獨自南齋卧神閒景亦空有山來枕上無事到心中簾巻侵牀月屏遮入座風望春春未至應在海門東早春題友人湖上新居近得雲中路門長侵早開到時猶有雪行處已無苔勸酒客初醉留茶僧未來每逢晴暖日惟見乞花栽又門不當官道行人到亦稀故從餐後出多是夜深歸開篋收詩巻掃牀移卧衣幾時同買宅相送有柴扉長江集巻四
