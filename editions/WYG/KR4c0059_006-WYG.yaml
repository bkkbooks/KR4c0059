  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0059_WYG_006-1a, image: WYG1078/WYG1078-0413a.png}
body:
  text: 長江集巻六唐賈島撰讓糺曹上樂使君戰戰復兢兢猶如履薄氷雖然叨一掾還似説三乗瓶汲南溪水書來北岳僧戅愚兼抱疾權紀不相應贈友人五字詩成巻清新韻具偕不同狂客醉自伴律僧齋春别和花樹秋辭帶月淮却歸登第日名近榜頭排送雍陶及第歸成都寧親不唯詩著籍兼又賦知名議論於題稱春秋對問精半應隂隲與全賴有司平歸去峰巒衆别來松桂生漲江流水凸當道白雲坑勿以攻文捷而將學劒輕製衣新濯錦開醖舊燒罌同日昇科士誰同膝下榮謝令狐綯相公賜衣九事長江飛鳥外主簿跨驢歸逐客寒前夜元戎與厚衣雪來松更緑霜降月彌輝即日調殷鼎朝分是與非送金州鑒周上人池必尋天目溪仍住若耶帆隨風便發月不要雲遮極浦浮霜鴈迴潮落海查峨嵋省春上立雪指流沙送譚逺上人下視白雲時山房盖一作掛樹皮垂枝松落子側頂鶴聴棊清净從沙劫中終未日欹金光明本行同侍出峨嵋新年嗟以龍鍾身一作貌如何嵗復新石門思隠久銅鏡强窺頻花發新移樹心知故國春誰能平此恨豈是北宗人送僧出家從丱嵗解論造𤣥門不惜揮談柄誰能聴至言中時山果熟後夏竹隂繁此去逢何日峨嵋曉復昬送姚杭州白雲峰下城日夕白雲生人老江波釣田侵海樹耕吳山鍾入越蓮葉吹搖旌詩異石門思濤來向越迎夜集田卿宅朗詠髙齋下如將古調彈翻鴻向桂水來雪渡桑乾滴滴玉漏曙翛翛竹籟殘曩年曽宿此亦值五陵寒寄山友長孫栖嶠此時氣蕭颯琴院可應關鶴似君無事風吹雨遍山松生青石上泉落白雲間有逕連髙頂心期相與還酬厲𤣥我來從北鄙子省涉西陵白髮初相識秋山擬共登隣居帝城雨㑹宿御溝冰未報見貽作耿然中夜興送劉式洛中覲省晴峰三十六侍立上春臺同宿别離恨共看星月迴野鶯臨苑語河棹歴江來便寄相思札緘封花下開送空公往金州七百里山水手中楖栗麤松生師坐石潭滌祖傳盂長擬老岳嶠又聞思海湖恵能同俗姓不是嶺南盧贈紹明上人未住青龍室中秋獨往年上方嵩古寺下視雨和一作如烟祖豈無言去心因斷臂傳不知能已後更有幾燈然贈𢎞泉上人洗足下藍嶺古師精進同心知溪卉長居此玉林空西殿宵燈磬東林曙雨風舊峯隣太白石座雨苔濛送宣皎上人遊太白剃髮鬂無雪去年三十三山過春草寺磬度落花潭得句才隣約論宗意在南峰靈疑懶下蒼翠太虚參病起髙丘歸未得空自責遲回身事豈能遂蘭花又已開病令新作少雨阻故人來燈下南華巻袪愁當酒盃送殷侍御起同州馮翊蒲一作連蒲西郡沙岡擁地形中條全離岳清渭半和涇夜莫眠明月秋深至洞庭猶來交辟士事别偃林扃送沈鶴家楚壻於秦擕妻去養親陸行千里外風巻一帆新夜泊疏山雨秋吟搗藥輪蕪城登眺作一作後才動廣陵人秋夜仰懷錢孟二公琴客會月色四時好秋光君一作吾子知南山昨夜雨為我寫清規獨鶴聳寒骨髙杉韻細颸仙家縹緲弄髣髴此中期贈李金州綺里祠前後山程踐白雲泝流隨大斾登岸見全軍曉角吹人夢秋風巻鴈羣霧開方露日漢水底一作與沙分酬姚合校書因貧行道逺得見舊交遊美酒易傾盡好詩難卒酬公堂朝共到私第夜相留不覺入關晚别來林木秋送獨孤馬二秀才居明月山讀書濯志俱髙潔儒科慕冉顔家辭臨水郡雨到讀書山棲鳥㯶花上聲鐘礫閣間寂寥窻戸外時見一舟還病蟬病蟬飛不得向我掌中行折翼猶能薄酸吟尚極清露華凝在腹塵㸃誤侵睛黄雀并鳶鳥俱懷害爾情青門里作燕存鴻已過海内幾人愁欲問南宗理將歸北岳修若無攀桂分秖是卧雲休泉樹一為别依稀三十秋盧秀才南臺居在青門里臺當千萬岑下因岡助勢上有樹交隂陵逺根纔近空長畔可尋新晴登嘯處驚起宿枝禽寄李輈侍郎終過孟津書分明夢不虚人從清渭别地隔太行餘賔幕誰嫌静公門但晏如櫑鞞乾霹靂斜漢濕蟾蜍追琢垂今後敦龎得古初井臺憐操築漳岸想丕疏亦冀鏗珉珮終當直石渠此身多抱疾幽里近營居憶潄蘇門澗經浮楚澤瀦松栽侵古影葷斷尚芹􅉁語嘿曽延接心源離滓淤誰言姓琴氏獨跨角生魚寄令狐綯相公驢駿勝羸馬東川路匪賒一緘論賈誼三蜀寄嚴家澄徹霜江水分明露石沙話言聲及政棧閣谷離斜自著衣偏暖誰憂雪六花裏裳留濶幞防患與通茶山館中宵起星河殘月華雙僮前日僱數口向天涯良樂知騏驥張雷驗鏌鎁謙光賢將相别紙聖龍蛇豈有斯言玷應無白璧瑕不妨圓魄裏人亦指蝦蟇再投李益常侍何處初投刺當時赴尹京淹留花木變然諾肺腸傾避暑蟬移樹登髙鴈過城人家嵩岳色公府洛河聲聨句逢秋盡甞茶見月生新衣裁白紵思從曲江行積雪省屬時霖滯今逢臘雪多南猜飄桂渚北訝雨交河盡滅平蕪色彌重古木柯空中離白氣島外下滄波隠者迷樵道朝人冷玉珂夕繁仍晝宻漏間復鐘和想積髙嵩頂新秋皓月過過楊道士居先生修道處茆屋逺囂氛叩齒坐明月搘頥望白雲精神含藥色衣服帶霞紋無話瀛洲路多年别少君贈僧亂山秋木穴裏有靈蛇藏鐵錫挂臨海一作錫拄臨滄海石樓聞異香出塵頭未白入定衲凝霜莫話五湖事令人心欲狂送友人游塞飄蓬多塞下君見益澘然逈磧沙銜日長河水接天夜泉行客火曉戍向京烟少結相思恨佳期芳草前思遊邊友人凝愁對孤燭昨日飲離杯葉下故人去天中新鴈來連沙秋草薄帶雪暮山開苑北紅塵道何時見逺迴秋暮寄友人寥落闗河暮霜風樹葉低逺天垂地外寒日下峰西有志烟霞切無家嵗月迷清霄話白閣已負十年棲寄令狐綯相公官髙頻勑授老色把犂鋤一主長江印三封東省書不無濠上思唯食圃中蔬夢幻將泡影浮生事只如和孟逸人林下道情四時相陶鑄中庸道豈銷夏雲生此日春色盡今朝陋巷貧無悶毗耶疾未調已栽天末栢合抱豈非遥宿姚少府北齋石溪同夜泛復此北齋期鳥絶吏歸後蛩鳴客卧時鏁城凉雨細開印曙鐘遲憶此漳川岸如今是别離雪晴晚望倚杖望晴雪溪雲幾萬重樵人歸白屋寒日下危峰野火燒岡草斷煙生石一作古松却回山寺路聞打暮天鐘長江集巻六
