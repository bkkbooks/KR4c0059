  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0059_WYG_002-1a, image: WYG1078/WYG1078-0395a.png}
body:
  text: 長江集巻二唐賈島撰寄孟協律我有弔古泣不泣向路岐揮淚灑暮天滴著一作毎滴桂樹枝别後冬節至離心北風吹坐孤雪扉夕泉落石橋時不驚猛虎嘯難辱君子詞欲酬空覺老無以堪逺持岧嶤倚角窻王屋懸清思和劉涵京官始云滿野人依舊閒閉扉一畝居中有古風還市井日已午幽牕夢南山喬木覆北齋有鳥鳴其間前日逺嶽僧來時與開關新題驚我瘦窺鏡見醜顔陶情惜清澹此意復誰攀明月山懐獨孤崇魚琢明月長在目明月長在心在心復在目何得稀去尋試望明月人孟夏樹蔽岑想彼嘆此懐樂喧㤀幽林鄉本北嶽外悔一作每恨東夷深願縮地脉還豈待天恩臨非不渴隠秀却嫌他事侵或云岳樓鐘來繞草堂吟當從令尹後再往步栢林投張太祝風骨髙更老向春初陽葩泠泠月下韻一一落海涯有子不敢和一聽千嘆嗟身卧東北泥魂掛西南霞手把一枝栗往輕覺程賒水天朔方色暖日嵩根花達一作逵閒幽棲山遣尋種藥家欲買雙瓊瑶慙無一木𤓰詠韓氏二子千巖一尺璧八月十五夕清露墮桂花白鳥舞虛碧送别丈夫未得意行行且低眉素琴彈復彈㑹有知音知攜新文詣張籍韓愈途中成袖有新成詩欲見張韓老青竹未生翼一步萬里道仰望青冥天雲雪壓我腦失却終南山惆悵滿懐抱安得西北風身願變蓬草地祗聞此語突出驚我倒上谷送客遊江湖莫嘆迢逓分何殊咫尺别江樓到夜登還見南臺月重酬姚少府隙月斜枕旁諷詠夏詒什如今何時節蟲虺亦已蟄荅遲禮涉傲抱疾思加澁僕本胡為者銜肩貢客集茫然九州内譬如一錐立欺暗少此懐自明曽瀝泣量無趫勇士誠欲戈矛戢原閣期躋攀潭舫偶俱入深齋竹木合一作多畢夕風雨急俸利沐均分價稱煩噓噏百篇見刪罷一命嗟未及滄浪愚將還知音激所習投孟郊月中有孤芳天下聆薫風江南有髙唱海北初來通容飄清冷餘自藴襟抱中止息乃流溢推尋却冥䝉我知雪山子謁彼偈句空必竟獲所實爾焉遂深􅇆錄之孤燈前猶恨百首終一吟動狂機萬疾辭頑躬生年面未交永夕夢輙同叙詰誰君師詎言無吾宗余求履其跡君曰可但攻啜波腸易飽揖險神難從前嵗曾入洛差池阻從龍萍家復從趙雲思長縈縈嵩海每可詣長途追再窮願傾肺腸事盡入焦梧桐代邊將持戈簇邊日戰罷浮雲收露草泣寒霽夜泉鳴隴頭三尺握中鐵氣衝星斗牛報國不拘貴憤將平虜讐寄劉栖楚趨走與偃卧去就自殊分當窻一重樹上有萬里雲離披不相顧髣髴類人羣友生去更逺來書絶如焚蟬吟我為聽我歌蟬豈聞嵗暮儻旋歸晤言桂氛氲寄丘儒地近輕數見地逺重一面一面如何重重甚珍寳片自經失歡笑幾度騰霜霰此心鎮懸懸天象固迴轉長安秋風髙子在東甸縣儀形信寂蔑風雨豈乖間慿人報消息何易慿筆硯俱不盡我心終須對君宴送陳商古道長荆棘新岐路交横君於荒榛中尋得古轍行足踏聖人路貌端禪士形我曾接夜談似聽講一經聨翩曾數舉昨登髙第名釜底絶烟火曉行皇帝京上客逺府遊主人須目明青雲别青山何日復可升送張校書季霞從京去容州馬在船上多容州幾千里直傍青天涯掌記試校書未稱髙詞華義往不可屈出家如入家城市七月初熱與夏未差餞君到野地秋涼滿山坡南境異北候風起無塵沙秦吟宿楚澤海酒落桂花暫醉即還醒彼土生桂茶寄友人同人半年别一别寂來音賴有别時文相思時一吟我常倦投跡君亦知此衿筆硯且勿棄蘇張曾陸沈但存舌在口當冀身遂心君㸔明月夜松桂寒森森荅王參寸晷不相待四時互如競客思先覺秋蟲聲苦知暝霜松積舊翠露月團如鏡詩負屬景同琴孤坐堂聴相期黄菊節别約紅桃徑毎把式微篇臨風一長詠延康吟寄居延夀里為與延康隣不愛延康里愛此里中人人非十年故人非九族親人有不朽語得之烟山春戱贈友人一日不作詩心源如廢井筆硯為轆轤吟詠作縻綆朝來重汲引依舊得清泠書贈同懐人詞中多苦辛寓興真集道方至貌殊妬還多山泉入城池自然生渾波今時出古言在衆翻為訛有琴含正韻知音者如何一生足感激世言忽嵳峩不得市井味思嚮吾巖阿浮華豈我事日月徒蹉跎曠哉潁陽風千載無其他懐鄭從志西風吹隂雪雨雪半夜收忽憶天涯人起㸔斗與牛故人别二年我意如百秋音信兩杳杳誰云昔綢繆平明一封書寄向東北舟翩翩春歸烏㑹自為匹儔易州登龍興寺樓望郡北髙峯郡北最髙峯巉巖絶雲路朝來上樓望稍覺得幽趣朦朧碧烟裏羣嶺若相附何時一登陟萬物皆下顧送鄭山人遊江湖南遊衡嶽上東往天台裏足躡華峰頂目觀滄海水就峰公宿河出鳥宿後螢火白露中上人坐不倚共我論量空殘月華晻曖逺水響玲瓏爾時無了夢兹宵方未窮劉景陽東齋松隂連竹影中有無苔井清風此地多白日空自永景陽公幹孫詩句得真景勸我不須歸月出東齋靜對菊九日不出門十日見黄菊灼灼尚繁英美人無消息送集文上人遊方來從道陵井雙木溪邊㑹分首芳草時逺意青天外此遊詣幾嶽嵩華衡恒泰題岸上人郡内閒居靜向方寸求不居山一作千嶂幽池開菡蓞香門閉莓苔秋金玉重四句粃糠輕九流鑪烟上喬木鐘磬下危樓手種一株松貞心與師儔遊子遊子喜鄉逺非吾憶歸廬誰知奔他山自欲早旋車朝賞暮已足圖歸願無餘當期附鵬翼未偶方躊躇寄山中王參我㸔嶽西雲君㸔嶽北月長懐燕城南相送十里别别來千餘日日日憶不歇逺寄一紙書數字論白髪送汲鵬淮南卧理後復逢君姓汲文采非尋常志願期卓立深江東泛舟夕陽聎原隰夏夜言詩㑹往往追不及長江集巻二
  hash: sha256:6da6e1851d8bb01c8a96fd2c5993615245e32b3b84a0698c227ae6bc45b46d54
