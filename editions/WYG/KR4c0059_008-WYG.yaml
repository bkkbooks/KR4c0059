  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0059_WYG_008-1a, image: WYG1078/WYG1078-0422a.png}
body:
  text: 長江集巻八唐賈島撰送穆少府知眉州劍門倚青漢君昔未曽過日暮行人少山深異鳥多猿啼和峽雨棧盡到江波一路白雲裏飛泉灑薜蘿二月晦日留别鄠中友人立馬栁花裏别君當酒酣春風漸向北雲鴈不飛南明曉日初一今年月又三鞭羸去暮色逺岳起煙嵐送李校書赴吉期筮算重重吉良期詎可遷不同牛女夜是配鳳凰年佩玉春風裏題章蠟燭前詩書與箴訓夫哲又妻賢宿孤館落日投村戍愁生為客途寒山晴後緑秋月夜來孤橘樹千株在漁家一半無自知風水静舟繫岸邊蘆哭宗宻禪師鳥道雪岑巔師亡誰去禪几塵増滅後樹色改生前層塔當松吹殘蹤傍野泉唯嗟聴經虎時到壊菴邊宿山寺衆岫聳寒色精廬向此分流星透疎木走月逆行雲絶頂人來少髙松鶴不羣一僧年八十世事未曽聞送友人如邊去日重陽後前程菊正芳行車輾秋岳落葉墜寒霜雲入漢天白風髙磧色黄蒲輪待恐晚求薦向諸方題竹谷上人院禪庭髙鳥道迴望極川原樵徑連峰頂石泉通竹根木深猶積雪山淺未聞猿欲别塵中苦願師貽一言京北原作登原見城闕䇿蹇思炎天日午路中客槐花風處蟬逺山秦木上清渭漢陵前何事居人世皆從一作因名利牽寄江上人紫閣舊房在新家中岳東煙波千里隔消息一朝通寒日汀洲路秋晴島嶼風分明杜陵葉别後兩經紅兩一作雨送僧歸太白山堅氷連夏處太白接青天雲塞石房路峰明雨外巔夜禪臨虎穴寒潄撇龍泉後會不期日相逢應信縁暮過山村數里聞寒水山家少四隣怪禽啼曠野落日恐行人初月未終夕邊烽不過秦蕭條桑柘外烟火漸相親鷺鷥求魚未得食沙岸往來行島月獨棲影暮天寒過聲墮巢因木折失侣遇弦驚頻向煙霄望吾知爾去程内道塲僧𢎞紹麟徳燃香請長安春幾回夜閒一作寒同像寂晝定為吾開講罷松根老經浮海水來六年雙足履只步院中苔蔣亭和蔡湘州蔣宅為亭榭蔡城東郭門潭連秦相井松老漢朝根已積蒼苔徧何曽舊逕存髙齋無事後時復一擕樽光州王建使君水亭作楚水臨軒積澄鮮一畝餘栁根連岸盡荷葉出萍初極浦清相似幽禽到不虚夕陽庭際眺槐雨滴疎疎留别光州王使君建杜陵千里外期在末秋歸既見林花落須防木葉飛楚從何地盡淮隔數峰㣲迴首餘霞失斜陽照客衣宿姚合宅寄張司業籍閒宵因集會柱史話先生身愛無一事心期往四明松枝影揺動石磬響寒清誰伴南齋宿月髙霜滿城哭張籍精靈歸恍惚石磬韻曽聞即日是前古誰人耕此墳舊遊孤枕逺故域九江分本欲蓬瀛去餐芝御白雲靈凖上人院掩扉當太白臘數等松椿禁漏來遥夜山泉落近隣經聲終巻曉草色幾芽春海内知名士交遊凖上人寄栁舎人宗元格與功俱造何人意不降一宵三夢栁孤泊九秋江擢第名重列沖天字幾雙誓為仙者僕側執馭風幢送𤣥巖上人歸西蜀玉壘山中寺幽深勝槩多藥成彭祖搗頂受七輪摩去臘催今夏流光等逝波會當依糞掃一作草五岳徧頭陀寄宋州田中丞古郡近南徐闗河萬里餘相思深夜後未答去秋書自别知音少難忘識面初舊山期已久門掩數畦蔬送朱休歸劍南劍南歸受賀太學賦聲雄山路長江岸朝陽十月中芽新抽雪茗枝重集猿楓卓氏琴臺廢深蕪想逕通寄長武朱尚書不日即登壇槍旗一萬竿角吹邊月沒鼔絶爆雷殘中國今如此西荒可取難白衣思請謁徒步在長安送皇甫侍御曉鐘催早朝自是赴嘉招身泊湘江濶田收楚澤遥雁驚起衰草猿渴下寒條來使黔南日時應問寂寥郊居即事住此園林久其如未是家葉書傳野意簷溜煮胡茶雨後逢行鷺更深聴逺蛙自然還往裏多是愛烟霞夜集姚合宅期可公不至公堂秋雨夜已是念園林何事疾病日重論山水心孤燈明臘後微雪下更深釋子乖來約泉西寒磬音喜李餘自蜀至迢逓岷峨外西南驛路髙幾程尋嶮棧獨宿聴寒濤白鳥飛還立青猿斷更號往來從此過詞體近風騷王侍御南原莊買得足雲地新栽藥數窠峰頭盤一逕原下注雙河春寺閒眠久晴臺獨上多南齋宿雨後仍許重來麽一作過送康秀才俱為落第年相識落花前酒瀉兩三盞詩吟十數篇行岐逢塞雨嘶馬上津船樹影髙堂下迴時應有蟬送僧此生披衲過在此得身閒日午遊都市天寒往華山言歸文字外意出有無間仙掌雲邊樹巢禽時出關寄魏少府來時乖面别一作傷逺别終日使人慙易記巻中句難忘燈下談濕苔粘樹癭瀑布濺房菴音信如相恵移居古井南原居即事言懐贈孫員外出入土門偏秋深石色泉逕通原上草地接水中蓮採菌依餘枿拾薪逢刈田鑷撏白髮斷兵阻尺書傳避路來華省抄詩上彩牋髙齋久不到猶喜未經年登樓秋日登髙望涼風吹海初山川明已久河漢没無餘逺近涯寥夐髙低中太虚賦因王閣筆思比謝遊疎上樂使君救康成公曽夢諸侯笑康囚議脱枷千根池裏藕一朶火中花昆明池泛舟一枝青竹榜泛泛緑萍裏不見釣魚人漸入秋塘水送僧大内曽持論天南化俗行舊房山雪在春草岳陽生曉了蓮經義堪任寶盖迎王侯皆䕶法何寺講鐘鳴送劉知新往襄陽此别誠堪恨荆襄是舊遊眼光懸欲落心緒亂難收花木三層寺烟波五相樓因君兩地去長使夢悠悠寄慈恩寺郁上人中秋期夕望虚室省相容北斗生清漏南山出碧重露寒鳩宿竹鴻過月圓鐘此夜情應切衡陽舊住峰送饒州張使君終南雲雨連城闕去路西江白浪頭滁上郡齋離昨日鄱陽農事勸今秋道心生向前朝寺文思來因静夜樓借問泊帆干謁者誰人曽聴峽猿愁觀冬設上東川楊尚書匏革奏冬非獨樂軍城未曉啟重門何時去入三台貴此日空知八座尊羅綺舞時收雨㸃貔貅門外巻雲根逐遷屬吏隨賔列去棹扁舟不忘恩長江集巻八
