body:
  text: 長江集巻三唐賈島撰寄令狐相公䇿杖馳山驛逢人問梓州長江那可到行客替生愁哭栢巖禪師苔覆石牀新師曽占幾春冩留行道影焚却坐禪身塔院關松雪經房鎻隙塵自嫌雙淚下不是解空人山中道士頭髪梳千下休糧帶瘦容養雛成大鶴種子作髙松白石通宵煑寒泉盡日舂不曽離隠處那得世人逢就可公宿十里尋幽寺寒流數派分僧同雪夜坐鴈向草堂聞靜語終燈焰餘生許嶠雲由來多抱疾聲不達明君旅遊此心非一事書札若為傳舊國别多日故人無少年空巢霜葉落疎牖水螢穿留得林僧宿中宵坐黙一作黯然送鄒明府遊靈武曽宰西畿縣三年馬不肥債多平一作慿劍與官滿載書歸邊雪藏行徑林風透卧衣靈州聴曉角客館未開扉題皇甫荀藍田㕔任官經一年縣與玉峯連竹籠拾山果瓦瓶擔石泉客歸秋雨後印鎻暮鐘前久别丹陽浦時時夢釣船贈王將軍宿衛爐烟近除書墨未乾馬曽金鏃中身有寳刀瘢父子同時㨗君王畫陣㸔何當為外帥白日出長安下第下第只空囊如何住一作在帝鄉杏園啼百舌誰醉在花傍淚落故山逺病來春草長知音逢一作酧豈易孤棹負三湘寄賀蘭朋吉往往東林下花香似火焚故園從小别夜雨近秋聞野菜連寒水枯株簇古墳泛舟同逺客尋寺入幽雲斜日扉多掩荒田徑細分相思蟬幾處偶坐蝶成羣㑹宿曽論道登髙省議文苦吟遥可想邊葉向紛紛憶吳處士半夜長安雨燈前越客吟孤舟行一月萬水與千岑島嶼夏雲起汀洲芳草深何當折松葉拂石剡溪隂哭孟郊身死聲名在多應萬古傳寡妻無子息破宅帶林泉塚近登山道詩随過海船故人相弔後斜日下寒天送崔定未知遊子意何不避炎蒸幾日到漢水新蟬鳴杜陵秋江待得月夜語恨無僧巴峽吟過否連天十二層寄白閣黙公已知歸白閣山逺晩晴㸔石室人心靜冰潭月影殘㣲雲分片滅古木落薪乾後夜誰聞磬西峯絶頂寒雨後宿劉司馬池上藍溪秋漱玉此地漲清澄蘆葦聲兼雨芰荷香遶燈岸頭秦古道亭面漢荒陵靜想泉根本幽崖落幾層送朱可久歸越中石頭城下泊北固暝鐘初汀鷺潮衝起船窻月過虚吳山侵越衆隋栁入唐疎日欲躬調膳辟來何府書送田卓入華山幽深足暮蟬驚覺石牀眠瀑布五千仭草堂瀑布邊壇松涓滴露嶽月泬寥天鶴過君須㸔上頭應有仙送董正字常州覲省相逐一行鴻何時出磧中江流翻白浪木葉落青楓輕檝浮吳國繁霜下楚空春來懽侍阻正字在東宫酬姚少府海樹與山木俱應揺落初柴門掩寒雨蟲響出秋蔬枯槁彰清鏡孱愚友道書刋文非不朽君子自相於送無可上人圭峯霽色新送此草堂人麈尾同離寺蛩鳴暫别親獨行潭底影數息樹邊身終有煙霞約天台作近隣送李騎胄歸騎雙旌逺懽生此别中蘭關分磧路嘶馬背寒鴻朔色晴天北河源落日東賀蘭山頂草時動巻帆風送烏行中石淙别業淙一作琮寒水長繩汲丁泠數滴翻草通石淙脉硯帶海潮痕嶽色何曽逺蟬聲尚未繁勞思當此夕苖稼在西原送覺興上人歸中條山兼謁河中李司空又憶西巖寺秦原草白時山尋樵徑上人到雪房遲暮磬潭泉凍荒林野燒移聞師新譯偈説擬對旌麾寄無可上人僻寺多髙樹涼天憶重遊磬過溝水盡月入草堂秋穴蟻苔痕靜藏蟬栢葉稠名山思徧往早晩到嵩丘南池蕭條㣲雨絶荒岸抱清源入舫山偏塞分泉稻接村秋聲依樹色月影在蒲根淹泊方難遂他宵關夢魂寄龍池寺貞空二上人受請終南住俱妨去石橋林中秋信絶峰頂夜禪遥寒草煙藏虎髙松月照鵰霜天期到寺寺置即前朝送貞空二上人林下中餐後天涯欲去時衡陽過有伴夢澤出應遲石磬疎寒韻銅瓶結夜澌殷勤訝此别且未定歸期送裴校書拜官從秘省署職在藩維多故長疎索髙秋逺别離天寒泗上醉夜靜岳陽碁使府臨南海帆飛到不遲昇道精舍南臺對月寄姚合月向南臺見秋霖洗滌餘出逢危葉落靜㸔衆峰疎冷露常時有禪窻此夜虛相思聊悵望潤氣徧衣初即事索漠對孤燈隂雲積幾層自嗟憐十上誰肯待三徵心被通人見文叨大匠稱悲秋秦塞草懐古漢家陵城靜髙崖樹漏多幽沼冰過聲沙島鷺絶行石菴僧豈謂舊廬在誰言歸未曾謂一作為黄子陂上韓吏部石樓云一别二十二三春相逐升堂者幾為埋骨人涕流聞渡瘴病起喜還秦曽是令勤道非惟䘏在迍疎衣蕉縷細爽味茗芽新鐘絶滴殘雨螢多無近隣溪潭承到數位秩見辭頻若箇山一作中招隠機忘任此身天津橋南山中各題一句野坐分苔石李益山行遶菊叢韋執中雲衣惹不破諸葛覺秋色望來空浪仙投李益四十歸燕字千年外始吟已將書北嶽不用比南金弔孟協律才行古人齊生前品位低葬時貧賣馬逺日哭惟妻孤塚北邙外空齋中嶽西集詩應萬首物象徧曾題送人適越髙城滿夕陽何事欲霑裳遷客蓬蒿暮遊人道路長晴湖勝鏡碧寒栁似金黄若有相思夢殷勤載八行送僧遊衡嶽心知衡嶽路不怕去人稀船裏猶鳴磬溪頭自曝衣有家從小别無寺不言歸料得逢寒住當禪雪滿扉送路一本有某從軍三字别我就蓬蒿日斜飛伯勞龍門流水急嵩嶽片雲髙歎命無知己梳頭落白毛從軍當此去風起廣陵濤洛陽道中寄弟趨走迫流年慙經此路偏密雲埋二室積雪度三川生類梗萍泛悲無金石堅翻鴻有歸翼極目仰聨翩江亭晩望浩渺浸雲根烟嵐没逺村鳥歸沙有跡帆過浪無痕望水知柔性㸔山欲倦魂縱情猶未已迴馬欲黄昏送耿處士一瓶離别酒未盡即言行萬水千山路孤舟幾月程川原秋色静蘆葦晩風鳴迢逓不歸客人傳虛隠名長江集巻三
