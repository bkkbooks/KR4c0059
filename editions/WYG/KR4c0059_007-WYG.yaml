  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0059_WYG_007-1a, image: WYG1078/WYG1078-0418a.png}
body:
  text: 長江集巻七唐賈島撰送崔嶠遊瀟湘功烈尚書孫琢磨風雅言渡河山鑿處陟峴漢灘喧夢想吟天目宵同話石門楓林葉欲下極浦月清暾寄朱錫珪逺泊與誰同來從古木中長江人釣月曠野火燒風夢澤吞楚大閩山阨海叢此時檣底水濤起屈原通馬戴居華山因寄玉女洗頭盆孤髙不可言瀑流蓮岳頂河注華山根絶雀林藏鶻無人境有猿秋蟾纔過雨石上古松門寄胡遇一自殘春别經炎復到凉螢從枯樹出蛩入破堦藏落葉書勝紙閒砧坐當牀東門因送客相訪也何妨送李戎扶侍往壽安二千餘里路一半是波濤未曉著衣起出城逢日髙關山多寇盗扶侍帶弓刀臨别不揮淚誰知心鬱陶送孫逸人衣屨猶同俗妻兒亦宛然不餐能累月無病已多年是藥皆諳性令人漸信仙杖頭書數巻荷入翠微煙寄華山僧遥知白石室松栢隠朦朧月落看心次雲生閉目中五更鐘隔岳萬尺水懸空苔蘚嵌巖所依稀有徑通送李登少府伊陽耽酒尉朗詠醉醒新應見嵩山裏明年躑躅春一千尋樹直三十六峰隣流水潺潺處堅貞玉澗珉易州過郝逸人居每逢詞翰客邀我共尋君果見閒居賦未曽流俗聞也知隣市井宛似出囂氛却笑巢由輩何須隠白雲酬鄠縣李廓少府見寄稍憐公事退復遇夕陽時北朔霜凝竹南山水入籬吟懷滄海侣空問白雲師恨不相從去心惟野鶴知净業寺與前鄠縣李廓少府同宿來從城上峰京寺暮相逢往往語復黙㣲㣲雨灑松家貧初罷吏年長畏聞蛩前日猶拘束披衣起曉鐘送南卓歸京殘春别鏡陂罷郡未霜髭行李逢炎暑山泉滿路岐雲藏巢鶴樹風觸囀鶯枝三省同虚位雙旌帶去思入城宵夢後待漏月沈時長䇿并忠告從容寫玉墀卧疾走筆酬韓愈書問一卧三四旬數書惟獨君一作書至獨思君願為出海月不作歸山雲身上衣頻寄甌中物亦分欲知强健否病鶴未離羣長孫霞李溟自紫閣白閣二峰見訪寂寞吾廬貧同來二閣人所論唯野事招作一作訪我住雲隣古寺期秋宿平林散早春潄流今已矣巢許豈堯臣送惟一遊清凉寺去有巡臺侣荒溪衆樹分瓶殘秦地水錫入晉山雲秋月離喧見寒泉出定聞人間臨欲别旬日雨紛紛鄭尚書新開涪江岸鑿青山破江開白浪寒日沈源出海春至草生灘梓匠防波溢蓬仙畏水乾從今疏决後任雨滯峰巒又不侵南畝務已㧞北江流涪水方移岸潯陽有到舟潭澄初搗藥波動乍垂鈎山可疏三里蹤知一作惟應歴億秋寄喬侍郎大寧猶未到曽渡北浮橋曉出爬船寺手擎紫栗條差池不相見悵望至今朝近日營家計繩懸一小瓢送去華法師在越居何寺東南水路歸秋江洗一鉢寒日曬三衣黙聴鴻聲盡行看葉影飛囊中無寶貨船户夜扄稀送蔡京躍蹄歸魯日帶漏别秦星易折芳條桂難窮邃義經登封多泰岳巡狩徧滄溟家在何林下梁山翠滿庭慈恩寺上座院未委衡山色何如對塔峰曩宵曽宿此今夕值秋濃羽族栖煙竹寒流帶月鐘井甘源起異泉湧漬苔封題朱慶餘所居天寒吟竟曉古屋瓦生松寄信船一隻隔鄉山萬重樹來沙岸鳥窻度雪樓鐘每憶江中嶼更看城上峰送黄知新歸南安池亭沈飲徧非獨曲江花地逺路穿海春歸冬到家火山難下雪瘴土不生茶知決移來計相逢期尚賒贈胡禪師自是根機鈍非闗夏臘深秋來江上寺夜坐嶺南心井鑿山含月風吹磬出林祖師擕隻履去路杳難尋元日女道士受籙元日更新夜齋身稱浄衣數星連斗出萬里斷雲飛霜下磬聲在月髙壇影㣲立聴師語了左肘繫符歸重與彭兵曹故人在城裏休寄海邊書漸去老不逺别來情豈疎硯冰催臘日山雀到貧居每有平戎計官家别勑除贈莊上人不語焚香坐心知道已成流年衰此世定力見他生暮雪餘春冷寒燈續晝明尋常五侯至敢望下堦迎落第東歸逢僧伯陽相逢須語笑人世别離頻曉去長侵月思鄉動隔春見僧心暫静從俗事多迍宇宙詩名小山河客路新翠桐猶入爨清鏡未辭塵逸足思奔驥隨羣且退鱗宴乖紅杏寺愁在緑楊津老病難為樂開眉賴故人皇甫主簿期遊山不及赴休官疋馬在新意入山中更住應難遂前期恨不同集蟬苔樹僻留客雨堂空深夜誰相訪惟當清浄翁宿成湘林下相訪夕陽時千株木未衰石泉流出一作出幽谷山雨滴栖鴟漏向燈聴數酒因客寢遲今宵不盡興更有月明期喜雍陶至今朝笑語同幾日百憂中鳥度劍門静蠻歸瀘水空步霜吟菊畔待月坐林東且莫孤此興勿論窮與通酬胡遇麗句傳人口科名立可圗移居見山燒買樹帶巢烏遊逺風濤急吟清雪月孤却思初識面仍未有多鬚宿慈恩寺郁公房病身來寄宿自掃一床閒反照臨江磬新秋過雨山竹隂移冷月荷氣帶禪關獨往天台意方從内請還送禇山人歸日東懸帆待秋水去入杳冥闗東海幾年别中華此日還岸遥生白髮波盡露青山隔水相思在無書也是閒寄韓湘過嶺行多少潮州瘴滿川花開南去後水凍北歸前望鷺吟登閣聴猿淚滴船相思堪面話不著尺書傳雨夜寄馬戴芳林杏花樹花落子西東今夕曲江雨寒催朔北風鄉書滄海絶隠路翠微通寂寂相思際孤缸殘漏中喜無可上人遊山回一食復何如尋山無定居相逢新夏滿不見半年餘聴話龍潭雪休傳鳥道書别來還似舊白髮日髙梳寄毘陵徹公身依吳寺老黄葉幾回看早講林霜在孤禪隙月殘井通潮浪逺鐘與角聲寒已有南遊約誰言禮謁難送韋瓊校書賔佐兼歸覲此行江漢心别離從闕下道路向山隂孤嶼消寒沫空城滴夜霖若邪溪畔寺秋色共誰尋寄劉侍御衣多苔蘚痕猶擬更趨門自夏雖無病經秋不過原積泉留岱鳥疊岫隔巴猿琴月西齋集如今豈復言長江集巻七
