  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0059_WYG_005-1a, image: WYG1078/WYG1078-0408a.png}
body:
  text: 長江集巻五唐賈島撰送雍陶入蜀江山事若諳那肯滯雲南草色分危磴杉隂近古潭日斜褒谷鳥夏淺巂州蠶吾自疑雙鬢相逢更不堪張郎中過原東居年長惟添懶經旬止掩關髙人餐藥後下馬此林間對坐天將暮同來客亦閒幾時能重至水味似深山荅王建袐書人皆聞蟋蟀我獨恨蹉跎白髪無心鑷青山去意多信來漳浦岸期負洞庭波時掃髙槐影朝迴或恐過送李餘往湖南昔去候温涼秋山滿楚郷今來從辟命春物徧涔陽嶽石掛海雪野楓堆渚檣若尋吾祖宅寂寞在瀟湘偶作野步随吾意那知是與非稔年時雨足閏月暮蟬稀獨樹依岡老遥峯出草㣲園林自有主宿鳥且同歸過雍秀才居夏木鳥巢邊終南嶺色鮮就涼安坐石煑茗汲隣泉鐘逺清霄半蜩稀暑雨前幽齋如葺罷約我一來眠寄顧非熊知君歸有處山水亦難齊猶去瀟湘逺不聞猿􅎜啼穴通茒嶺下潮滿石頭西獨立生遥思秋原日漸低送神邈法師栁絮落濛濛西州道路中相逢春忽盡獨去講初終行疾遥山雨眠遲後夜風遶房三兩樹迴日葉應紅送慈恩寺霄韻法師謁太原李司空何故謁司空雲山知幾重磧遥來鴈盡雪急去僧逢清磬先寒角禪燈徹曉烽舊房閒片石倚著最髙松送知興上人久住巴興寺如今始拂衣欲臨秋水别不向故園歸錫挂天涯樹房開嶽頂扉下㸔萬里曉霜海日生㣲送恵雅法師歸玉泉秖到瀟湘水洞庭湖未遊飲泉㸔月别下峽聴猿浮講不停雷雨吟當一作曽近海流降霜歸楚夕星冷玉泉秋憶江上吳處士閩國揚帆去蟾蜍虧復圎秋風吹渭水落葉滿長安此地聚㑹夕當時雷雨寒蘭橈殊未返消息海雲端題張博士新居青楓何不種林在洞庭村應為三湘逺難移萬里根斗牛初過伏菡蓞欲香門一作斗移亭北榭蓮照水邊門舊即湖山隠新廬葺此原石門陂留辭從叔謩幽鳥飛不逺此行千里間寒衝陂水霧醉下菊花山有耻長為客無成又入關何時臨澗栁吾黨共來攀送朱兵曹迴越星彩練中見澄江豈有泥潮生垂釣罷楚盡去檣西磧鳥辭沙至山鼯隔水啼㑹稽半侵海濤白禹祠溪懐博陵故人孤城易水頭不忘舊交遊雪壓圍碁石風吹飲酒樓路遥千萬里人别十三秋吟苦相思處天寒水急流夕思秋宵已難曙漏向二更分我憶山水坐蟲當寂寞聞洞庭風落木天姥月離雲㑹自東浮去將何欲致君寄河中楊少尹非惟咎曩時投刺詣門遲悵望三秋後參差萬里期禹留疏鑿跡舜在寂寥祠此致杳難共迴風逐所思孟融逸人孟君臨水居不食水中魚衣褐唯麄帛筐箱秪素書樹林幽鳥戀世界此心疎擬棹孤舟去何峰又結廬晚晴見終南諸峰秦分一作下積多峰連巴勢不窮半旬藏雨裏此日到窻中圎魄將昇髙空一作虛欲呌鴻故山思不見碣石泬寥東宿池上泉來從絶壑亭敞在中流竹密無空岸松長可絆舟蟪蛄潭上夜河漢島前秋異夕一作日期深漲攜琴却此遊喜姚郎中自杭州迴路多楓樹林累日泊清隂來去泛流水翛然適此心一披江上作三起月中吟東省期司諌雲門悔不尋送鄭長史之嶺南雲林頗重疊岑渚復幽奇汩水斜陽岸騷人正則祠蒼梧多蟋蟀白露濕江蘺擢第榮南去晨昏近九疑送李溟謁宥州李權使君英雄典宥州迢逓苦吟遊風宿驪山下月斜灞水流去時初落葉囘日定無秋太守攜才子㸔鵬百尺樓永福湖和楊鄭州積水還平岸春來引鄭溪舊渠通郭下新堰絶湖西嵩少分明對瀟湘濶狹齊客遊随庶子孤嶼草萋萋題長江言心俱好靜廨署落暉空歸吏封宵鑰行蛇入古桐長江頻雨後明月衆星中若任遷人去西溪與剡通泥陽館客愁何併起暮送故人回廢館秋螢出空城寒雨來夕陽飄白露樹影掃青苔獨坐離容慘孤燈照不開送徐員外赴河中原野正蕭瑟中間分散情吏從甘扈罷詔許朔方行邊日沉殘角河關截夜城雲居閒獨往長老出房迎送賀蘭上人野僧來别我略坐傍泉沙逺道擎空鉢深山踏落花無師禪自解有格句堪誇此去非緣事孤雲不定家送令狐綯相公梁園趨㦸節海草幾枯春風水難遭便差池未振鱗姓名猶語及門館阻何因苦擬修文巻重擎獻匠人吟㸔青島處朝退赤墀晨根愛杉栽活枝憐雪霰新綴篇嗟調逸不和揣才貧早晚還霖雨滂沱洗月輪揠苗方滅裂成器待陶鈞困坂思迴顧迷邦輙問津數行望外札絶句握中珍是日榮遊汴當時怯往陳鴻舂乖漢爵禎病卧漳濵岳整五千仞雲惟一片身故山離未死離一作心秋水宿經旬下第能無恧髙科恐有神罷耕田料廢省釣岸應榛慷慨知音在誰能淚墮巾寄滄州李尚書滄溟深絶濶西岸郭東門弋者羅夷鳥桴人思嶠猿威稜髙臘冽煦育極春温陂淀封疆内蒹葭壁壘根揺鞞邊地脉愁箭虎狼魂水縣賣紗市鹽田煑海村枝條分御葉家世食唐恩武可縱横講功從戰伐論天涯生月片嶼頂湧泉源非是泥池物方因雷雨尊沉謀藏未露隣境帖無喧青塚驕回鶻蕭關陷吐蕃何時霖嵗旱早晚雪邦寃迢逓瞻旌纛浮陽寄詠言逢舊識幾嵗阻干戈今朝勸酒歌羨君無白髪走馬過黃河舊宅兵燒盡新宫日奏多妖星還有角數尺鐵重磨崇聖寺斌公房近來惟一食樹下掩禪扉落日寒山磬多年壊衲衣白鬚長更剃青靄逺還歸仍説遊南岳經行是息機送李傅侍郎劍南行營走馬從邊事新恩受外臺勇㸔雙節出期破八蠻回許國家無戀盤江棧不摧移軍刁斗逐報㨗劍門開角咽獼猴呌鼙乾霹靂來去年新甸邑猶滯佐時才别徐明府抱琴非本意生事偶相縈口尚袁安節身無子賤名地春寒雪盛山淺夕風輕百戰餘荒野千夫漸耦耕一盃宜獨夜孤客戀交情明日疲驂去蕭條過古城岐下送友人歸襄陽蹉跎随汎梗羈旅到西州舉翮籠中鳥知心海上鷗山光分首暮草色向家秋若更登髙峴㸔碑定淚流送友人遊蜀萬岑深積翠路向此中難欲暮多羈思因髙莫逺㸔卓家人寂寞揚子業凋殘惟有岷江水悠悠帶月寒送鄭少府江岸一相見空令惜此分夕陽行帶月酌水少留君野地初燒草荒山過雪雲明年還調集蟬可在家聞子規遊魂自相呌寜復記前身飛過隣家月聲連野路春夢邊催曉急愁處送風頻自有霑花血相和雨滴新送僧歸天台辭秦經越過歸寺海西峰石磵雙流水山門九里松曽聞清禁漏却聴赤城鐘妙宇研磨講應齊智者蹤長江集巻五
