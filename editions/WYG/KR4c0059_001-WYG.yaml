body:
  text: 唐賈島撰古意碌碌復碌碌百年雙轉轂志士終夜心良馬白日足俱為不等閒誰是知音目眼中兩行淚曾弔三獻玉望山南山三十里不見踰一旬冒雨時立望望之如朋親虬龍一掬波洗蕩千萬春一作里日日雨不斷愁殺望山人天事不可長勁風來如奔隂霪一作霾一以掃浩翠寫國門長安百萬家家家張屏新誰家最好山我願為其鄰北嶽廟天地有五嶽恒嶽居其北巖巒疊萬重詭怪浩難測人來不敢入祠宇白日黒有時起霖雨一灑天地徳神兮安在哉永康我王國朝飢市中有樵山此舍朝無煙井底有甘泉釜中乃空然我要見白日雪來寒一作塞青天坐聞西牀琴凍折兩三絃饑莫詣他門古人有拙言哭盧仝賢人無官死不親者亦悲空令古鬼哭更得新隣比平生四十年惟著白布衣天子未辟召地府誰來追長安有交友託孤遽棄移塜側誌石短文字行參差無錢買松栽自生蒿草枝在日贈我文淚流把讀時從兹加敬重深藏恐失遺劍客十年磨一劍霜刄未曽試今日把似君誰為不平事口號中夜忽自起汲此百尺泉林木含白露星斗在青天寄逺别腸多鬱紆豈能肥肌膚始知相結宻不及相結疎疎别恨應少宻離恨難袪門前南流水中有北飛魚魚飛向北海可以寄逺書不惜寄逺書故人今在無况此數尺身阻彼萬里途自非日月光難以知子軀齋中躭靜非謬為本性實疎索齋中一就枕不覺白日落低扉礙軒轡寡徳謝接一作然諾叢菊在牆隂秋窮未開萼所餐類病馬動影似移嶽欲駐迫逃衰豈殊辭綆縛已見飽時雨應豐蔬與藥感秋商氣颯已來嵗華又虛擲朝雲藏竒峰暮雨灑疎滴幾蜩嘿凉葉一作幾番飛凉葉數蛩思隂壁落日空館中歸心逺山碧昔人多秋感今人何異昔四序馳百年𤣥髪坐成白喧喧徇聲利擾擾同轍跡儻無世上懐去偃松下石翫月寒月破東北賈生立西南西南立倚何立倚青青杉近月有數星星名未詳諳但愛杉倚月我倚杉為三月乃不上杉上杉難相參眙􅌓子細視睛瞳桂枝劖目常有熱疾久視無煩炎以手捫衣裳零露已濡霑久立雙足凍時向股䏶淹立久病足折兀然黐膠粘他人應已睡轉喜此景恬此景亦胡及而我苦淫耽無異市井人見金不知㢘不知此夜中幾人同無厭待得上頂㸔未擬歸枕函强步望寢齋步步情不堪步到竹叢西東望如隔簾却坐竹叢外清思刮幽潛量知愛月人身願化為蟾辭二知已一雙千嵗鶴立别孤翔鴻波島忽已暮海雨寒濛濛離人聞一作逢美彈亦與哀彈同况兹切切弄繞彼行行躬雲飛北嶽碧火息西山紅何以代逺誠折芳臘雪中義雀行和朱評事𤣥鳥雄雌俱春雷驚蟄餘口銜黄河泥空即翔天隅一夕皆莫歸嘵嘵遺衆雛雙雀抱人義哺食勞劬劬雛既邐迤飛雲間聲相呼燕感雀深恩雀愧揚不殊禽賢難自彰幸得主人書宿懸泉驛曉行瀝水樓暮到懸泉驛林月值雲􅃒山燈照愁寂辯士辯士多毁訾不聞談已非猛虎恣殺暴未嘗齧妻兒此理天所感所感當問誰求食飼雛禽吐出美言詞善哉君子人揚光掩瑕玼不欺上不欺星辰下不欺鬼神知心兩如此然後何所陳食魚味在鮮食蓼味在辛掘井須到流結交須到頭此語誠不謬敵君三萬秋絶句海底有明月圎于天上輪得之一寸光可買千里春寓興莫居暗室中開目閉目同莫趨碧霄路容飛不容步暗室未可居碧霄未可趨勸君跨仙鶴日下雲為衢遊仙借得孤鶴騎髙近金烏飛掬河洗老貌照月生光輝天中鶴路直天盡鶴一息歸來不騎鶴身自有羽翼若人無仙骨芝术無煩食枕上吟夜長憶白日枕上吟千詩何當苦寒氣忽被東風吹冰開魚龍别天波殊路岐雙魚謡時韓職方書中以孟常州簡詩見示天河墮雙魴飛我庭中央掌握尺餘雪劈開腸有璜見令饞舌短烹遶隣舍香一得古詩字與玉含異藏易水懐古荆卿重虛死節烈書前史我歎方寸心誰論一時事至今易水橋寒風兮蕭蕭易水流得盡荆卿名不消早起北客入西京北鴈再離北秋寢獨前興天梭星落織躭翫餘恬爽顧盻輕痾力旅途少顔盡明鏡勸仙食出門路縱横張家路最直昨夜夢見書張家㕔上壁客喜客喜非實喜客悲非實悲百迴信到家未當身一歸未歸長嗟愁嗟愁塡中懐開口吐愁聲還却入耳來常恐滴淚多自損兩目輝鬢邊雖有絲不堪織寒衣延夀里精舍寓居旅託避華館荒樓遂愚慵短庭無繁植珍果春亦濃側廬發扃樞纖魄時卧逢耳目乃􅆵井肺肝即巖峰汲泉飲酌餘見我閒靜容霜蹊猶舒英寒蝶斷來踪雙履與誰逐欲尋青瘦笻欲一作一贈智朗禪師上人分明見玉潭底没上人光慘貌古來恨峭發涕辭孔顔廟笑訪禪寂室步隨青山影坐學白塔骨解聴無弄琴不禮有身佛欲問師何之忽與我相别率賦贈逺言言慙非子曰送沈秀才下第東歸曲言惡者誰恱耳如彈絲直言好者誰刺耳如長錐沈生才俊秀心腸無邪欺君子忌苟合擇交如求師毁出疾夫口騰入禮部闈下第子不恥遺才人耻之東歸家室逺掉轡時參差浙雲近吳見汴栁接楚垂明年春光别囘首不復疑酬棲上人夜久城館閒情幽出在山新月有微輝朗朗空庭間處世雖識機伊余多掩關松姿度臘見籬藥知春還靜覽冰雪詞厚為酬贈顔東林有躑躅脫屣期共攀冬月長安雨中見終南雪秋節新已盡雨一作林疎露山雪西峰稍覺明殘滴猶未絶氣侵瀑布水凍著白雲宂今朝㶚滻鴈何夕瀟湘月想彼石房人對雪扉不閉必結切長江集巻一
