front:
  text: 唐賈浪仙長江集卷第二
  hash: sha256:3220542bf926a6147dfc548a17d7095baae8f2daaaeb48ae2e8f589fe9cf8f5d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0059_SBCK_002-1a}
body:
  text: 普州司倉參軍范陽賈島浪仙寄孟協律我有吊古泣不泣向路岐揮淚灑暮天滴著一作每滴桂樹枝別後冬節至離心北風吹坐孤雪扉夕泉落石橋時不驚猛虎嘯難辱君子詞欲酬空覺老無以堪逺持岧嶤倚角窗王屋懸淸思和劉涵京官始云滿野人依舊間閉扉一畝居中有古風還市井日巳午幽窗夢南山喬木覆北齋有鳥鳴其間前日逺嶽僧來時與開關新題驚我瘦窺鏡見醜顔陶情惜淸淡此意復誰攀明月山懷獨孤崇魚琢明月長在目明月長在心在心復在目何得稀去尋試望明月人孟夏樹蔽岑想彼嘆此懷樂喧忘幽林鄉本北嶽外悔一作每恨東夷深願縮地脈還豈待天恩臨非不渴隱秀却嫌他事侵或云嶽樓鍾來繞草堂吟當從令尹後再往步柏林投張太祝風骨高更老何春𥘉陽葩泠泠月下韻一一落海涯有子不敢和一聽千嘆嗟身卧東北泥魂挂西南霞手把一枝栗往輕覺程賖水天朔方色暖日嵩根花逹一作逵間幽栖山遣尋種藥家欲買雙瓊瑶慙無一木瓜詠韓氏二子千巖一尺璧八月十五夕清露墮桂花白鳥舞虛碧送別丈夫未得意行行且低眉素琴彈復彈會有知音知携新文詣張籍韓愈途中成袖有新成詩欲見張韓老靑竹未生翼一步萬里道仰望靑冥天雲雪壓我腦失却終南山惆悵滿懷抱安得西北風身願變蓬草地祗聞此語突出驚我倒上谷送客遊江湖莫嘆迢遞分何殊咫尺別江樓到夜登還見南臺月重酬姚少府隙月斜枕旁諷詠夏詒什如今何時節蟲虺亦巳蟄答遲禮涉傲抱疾思加澀僕本胡為者銜肩貢客集茫然九州內譬如一錐立欺暗少此懷自明曾瀝泣量無趫勇士誠欲戈矛戢原閣期躋攀潭舫偶俱入深齋竹木合一作多畢夕風雨急俸利沐均分價稱煩噓吸百篇見刪罷一命嗟未及滄浪愚將還知音激所習投孟郊月中有孤芳天下聆薰風江南有高唱海北𥘉來通容飄清冷餘自藴襟抱中止息乃流溢推尋却冥蒙我知雪山子謁彼偈句空必竟獲所實爾焉遂深衷録之孤燈前猶恨百首終一吟動狂機萬疾辭頑躬生年面未交永夕夢輒同敘詰誰君師詎言無吾宗余未履其迹君曰可但攻啜波腸易飽揖險神難從前歲曾入洛差池阻從龍萍家復從趙雲思長縈縈嵩海每可詣長途追再窮願傾肺腸事盡入焦梧桐代邉將持戈簇邊日戰罷浮雲收露草泣寒霽夜泉鳴隴頭三尺握中鐵氣衝星斗牛報國不拘貴憤將平虜讎寄劉栖椘趨走與偃卧去就自殊分當窗一重樹上有萬里雲離披不相顧髣佛類人群友生去更逺來書絶如焚蟬吟我為聽我歌蟬豈聞歲暮儻旋歸晤言桂氛氲寄丘儒地近輕數見地逺重一面一面如何重重甚珍寶片自經失歡笑幾度騰霜霰此心鎮懸懸天象固廽轉長安秋風高子在東甸縣儀形信寂蔑風雨豈乖間憑人報消息何易憑筆硯俱不盡我心終須對君宴送陳商古道長荆棘新岐路交橫君於荒榛中尋得古轍行足踏聖人路貌端禪士形我曾接夜談似聽講一經聮翩曾數舉昨登高第名釜底絶煙火曉行皇帝經上客逺府遊主人須目明青雲別靑山何日復可升送張校書季霞從京去容州馬在船上多容州幾千里直傍靑天涯掌記試校書未稱高詞華義往不可屈出家如入家城市七月𥘉熱與夏未差餞君到野地秋涼滿山坡南境異北候風起無塵沙秦吟宿椘澤海酒落桂花暫醉即還醒彼土生桂茶寄友人同人半年別一別寂來音賴有別時文相思時一吟我常倦投迹君亦知此襟筆硯且勿棄蘇張曾陸沈但存舌在口當冀身遂心君看明月夜松桂寒森森答王參寸晷不相待四時互如競客思先覺秋蟲聲苦知暝霜松積舊翠露月團如鏡詩負屬景同琴孤坐堂聽相期黃菊節別約紅桃徑每把式微篇臨風一長詠延康吟寄居延夀里為與延康鄰不愛延康里愛此里中人人非十年故人非九族親人有不朽語得之煙山春戲贈友人一日不作詩心源如廢井筆硯為轆轤吟詠作縻綆朝來重汲引依舊得淸泠書贈同懷人詞中多苦辛寓興真集道方至貌殊妬還多山泉入城池自然生渾波今時出古言在衆翻為訛有琴含正韻知音者如何一生足感激世言忽嵳峩不得市井味思響吾巖阿浮華豈我事日月徒蹉跎曠哉頴陽風千載無其他懷鄭從志西風吹隂雪雨雪半夜收忽憶天涯人起看斗與牛故人別二年我意如百秋音信兩杳杳誰云昔綢繆平明一封書寄向東北舟翩翩春歸烏會自為匹儔易州登龍興寺樓望郡北高峰郡北最高峰巉巖絶雲路朝來上樓望稍覺得幽趣朦朧碧煙裏群嶺若相附何時一登陟萬物皆下顧送鄭山人遊江湖南遊衡嶽上東往天台裏足躡華峰頂目觀滄海水就峰公宿河出鳥宿後螢火白露中上人坐不倚共我論量空殘月華暗曖逺水響玲瓏爾時無了夢兹宵方未窮劉景陽東齋松隂連竹影中有無苔井淸風此地多白日空自永景陽公幹孫詩句得真景勸我不須歸月出東齋靜對菊九日不出門十日見黃菊灼灼尚繁英美人無消息送集文上人遊方來從道陵井雙木溪邉會分首芳草時逺意靑天外此遊詣幾嶽嵩華衡恆泰題岸上人郡內間居靜向方寸求不居山一作千嶂幽池開􅔽蓞香門閉莓苔秋金玉童四句粃粳輕九流爐煙上喬木鍾磬下危樓手種一株松貞心與師儔遊子遊子喜鄉逺非吾憶歸廬誰知奔他山自欲早旋車朝賞暮巳足圖歸願無餘當期附鵬翼未偶方躊躇寄山中王參我看嶽西雲君看嶽北月長懷燕城南相送十里別別來千餘日日日憶不歇逺寄一𥿄書數字論白髮送汲鵬淮南卧理後復逢君姓汲文采非尋常志願期卓立深江東泛舟夕陽跳原隰夏夜言詩會往往追不及唐賈浪仙長江集卷第二
