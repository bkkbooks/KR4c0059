front:
  text: 唐賈浪仙長江集卷第四
  hash: sha256:98aa909bd1af509ee56c85b69f2c1cca152f2edcaca853e5a84588abbe24b76e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0059_SBCK_004-1a}
body:
  text: 普州司倉叅軍范陽賈島浪仙過唐校書書齋池滿風吹竹時時得爽神聲齊雛鳥語畫卷老僧眞月出行幾歩花𨳩到四鄰江湖心自切未可掛頭巾送杜秀才東遊東遊誰見待盡室寄長安別後葉頻落後一作夜去程山巳寒大河風色度曠野燒烟殘匣有靑銅鏡時將照鬂㸔送天台僧逺夢歸華頂扁舟背岳陽寒𬞞修净食夜浪動禪牀鴈過孤峰暁猿啼一樹霜身心無別念餘習在詩章懷紫閣隱者寂寥思隱者孤燭坐秋霖梨栗猿喜熟雲山僧說深寄書應不到結伴擬同尋廢寢方終夕迢迢紫閣心雨夜同厲玄懷皇甫荀桐竹遶庭匝雨多風更吹還如舊山夜卧聽瀑泉時磧鴈來期近秋鍾到夢遲溝西吟苦客中夕話兼思秋暮北門楊栁葉不覺巳􅌭紛值鶴因臨水迎僧忽背雲白鬚相並出暗淚兩行分黙黙空朝夕苦吟誰喜聞哭胡遇天壽知齊理何曾免歎嗟祭廽一作葬時收朔雪吊後折寒花野水吟秋㫁空山影暮斜弟兄相識徧猶得到君家送丹師歸閩中波濤路杳然衰栁洛陽蟬行李經雷電禪前漱島泉歸林久別寺過越未離船自說從今去身應老海邊送安南惟鑒法師講經春殿裏花遶御牀飛南海幾廽過舊山臨老歸潮摇蠻草落月濕島松㣲一作觸風香損印霑雨磬生衣空水旣如彼一作雲水路迢徃來消息稀題李凝幽居閑居少隣並草徑入荒園鳥宿池邊一作中樹僧𫾣月下門過橋分野色移石動雲根暫去還來此幽期不負言送韓湘掛席從古一作中路長風起廣津楚城花未發上苑蝶來新半没湖波月𥘉生島草春孤霞臨石鏡極浦映村神細響吟乾葦餘馨動逺蘋欲憑將一扎寄與沃州人寄董武雖同一城裏少省得從容門掩園林僻日高巾幘慵孤鴻來半夜積雪在諸峰正憶毘陵客聲聲隔水鍾宿贇上人房堦前多是竹閑地擬栽松朱點草書䟽雪平麻履蹤御溝寒夜雨宫寺静時鍾此時一作室無他事來尋不厭重訪李甘原居原西居處静門對曲江𨳩石縫銜枯草查根上净苔一作漬古苔翠㣲泉夜落紫閣鳥時來仍憶尋淇岸同行採蕨廽題山寺屏沈沈百尺餘功就豈斯湏汲早僧出定鑿新蟲自無藏源重嶂底澄翳大空隅此地如經劫凉潭會共枯僻居無可上人相訪自從居此地少有事相關積雨荒隣圃秋池照逺山硯中枯葉落枕上斷雲閑野客將禪子依依偏往還送李餘及第歸蜀知音伸久屈覲省去光輝津渡逢淸夜途程盡翠㣲雲當綿竹疊鳥離錦江飛肯寄書來否原居出甚稀荒齋草合徑㣲㣲終南對掩扉晚凉踈雨絶𥘉暁逺山稀落葉無靑地閑身著白衣朴愚猶本性不是學忘機夜喜賀蘭三見訪漏鍾仍夜淺時節欲秋分泉聒棲松鶴風除翳月雲踏苔行引興枕石卧論文即此尋常静來多祗是君題靑龍寺鏡公房一夕曾留宿終南揺落時孤燈岡一作龕舎掩殘磬雪風吹樹老因寒折泉深出井遲踈慵豈有事多失上方期送陳判官赴綏德將軍遥入幕束帶便離家身暖蕉衣窄天寒磧日斜火燒岡斷葦一作草風卷雪和沙絲竹豐州有春來祗欠花送唐環歸敷水莊毛女峰當戸日高頭未梳地侵山影掃葉帶露㾗書松徑僧尋廟一作藥沙泉鶴見魚一川風景好恨不有吾廬原東居喜唐温琪頻至曲江春草生紫閣雪分明汲井甞泉味聽鍾問寺名墨研秋日雨茶試老僧鐺地近勞頻訪烏紗出送迎送敡法師度歲不相見嚴冬知出關孤烟寒色樹高雪夕陽山瀑布寺應到牡丹房甚閑南朝遺跡在此去幾時還寄錢庻子曲江春水滿北岸掩柴關秪有僧隣舎全無物映山樹隂終日掃藥債隔年還猶記聽琴夜寒燈竹屋間原上秋居關西又落木心事復如何歲月辭山久秋霖入夜多鳥從井口出人自岳陽過倚杖聊閑望田家未剪禾夏夜原寺偏隣近𨳩門物景澄磬通多葉罅月離片雲稜寄宿山中鳥相尋海畔僧唯愁秋色至乍可在炎蒸冬夜羈旅復經冬瓢空盎亦空淚流寒枕上跡絶舊山中凌結浮萍水雪和衰栁風曙光雞未報嘹唳兩三鴻送厲宗上人擁䇿背岷峨終南雨雪和漱泉秋鶴至禪樹夜猿過高頂白雲盡前山黃葉多曾吟廬嶽上月動九江波寄李存穆聞道船中病似憂親弟兄信來從水路身去到柴城久別長鬚鬢相思書姓名忽然消息絶頻夢却還京贈無懷禪師身從劫劫修果以此生周禪定石牀暖月移山樹秋捧盂觀宿飯𫾣磬過淸流不掩玄關路教人問白頭寄武功姚主簿居枕江沱北情懸渭曲西數宵曾夢見幾處得書披驛路穿荒坂公田帶淤泥静棊功奥妙閑作韻淸凄鋤草留叢藥尋山上石梯客廽河水漲風起夕陽低空地苔連井孤村火隔溪卷簾黃葉落鎻印子規啼隴色澄秋月邉聲入戰鼙會湏過縣去况是屢招携題劉華書齋白石牀無塵靑松樹有鱗一鶯啼帶雨兩樹合從春荒榭苔膠砌幽叢果墮榛偶來踈或數當暑夕勝晨露滴星河水巢重草木薪終南同往意趙北獨遊身渡葉司天漏驚蛩逺地人機淸公幹族也莫卧漳濵送盧秀才遊潞府雨餘滋潤在風不起塵沙邊日寡文思送君吟月華過山千相府臨水宿僧家能賦焉長屈他春宴杏花送南康姚明府銅章美少年小邑在南天版籍多遷客封疆接洞田静江鳴野鼓發䌫帶村烟却笑陶元亮何湏憶醉眠送友人棄官遊江左羡君休作尉萬事具全身寰海多虞日江湖獨往人姓名何處變鷗鳥幾時親別後吳中使應湏訪子眞雨中懷友人對雨思君子甞茶近竹幽儒家隣古寺不到又逢秋寄逺家住錦水上身征遼海邉十書九不到一到忽經年南齋獨自南齋卧神閑景亦空有山來枕上無事到心中簾卷侵牀月屏遮入座風望春春未至應在海門東早春題友人湖上新居二首近得雲中路門長侵早𨳩到時猶有雪行處巳無苔勸酒客𥘉醉留茶僧未來毎逢晴暖日惟見乞花栽又門不當官道行人到亦稀故從餐後出多是夜深歸𨳩篋收詩卷掃牀移卧衣幾時同買宅相送有柴扉唐賈浪仙長江集卷第四
