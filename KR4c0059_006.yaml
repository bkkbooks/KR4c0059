front:
  text: 唐賈浪仙長江集卷第六
  hash: sha256:4a9940368c3b478575309f4f157648e58c04b57e5daafde866c4cd59a83d0635
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0059_SBCK_006-1a}
body:
  text: 普州司倉參軍范陽賈島浪仙讓糾曹上樂使君戰戰復兢兢猶如履薄冰雖然叨一掾猶似説三乘瓶汲南溪水書來北嶽僧戇愚兼抱疾權糾不相應贈友人五字詩成卷清詩少得偕不同狂客醉自伴律僧齋春别和花樹秋辭帶月淮却歸登第日名姓榜頭排送雍陶及第歸成都寧覲不惟詩著籍兼又賦知名議論於題稱春秋對問精半應隂隲與全賴有司平歸去峯巒衆别來松桂生漲江流水品當道白雲坑勿以攻文捷而將學劍輕製衣新濯錦開醖舊燒罌同日升科士誰同膝下榮謝令狐相公賜衣九事長江飛鳥外主簿跨驢歸逐客寒前夜元戎與厚衣雪來松更緑霜降月彌輝即入調殷鼎朝分是與非送金州鑒周上人池必尋天目溪仍住若耶帆隨風便發月不要雲遮極浦浮霜鴈回潮落海查峨嵋省春上立雪指流沙送談逺上人下視白雲時山房蓋一作挂樹皮垂枝松落子側頂鶴聽棊清淨從沙劫中終未日欹金光明本行同侍出峨嵋新年嗟以龍鍾身一作貌如何歲復新石門思隱久銅鏡強窺頻花發新移樹心知故國春誰能平此恨豈是比宗人送僧出家從丱歲解論造玄門不惜揮談柄誰能聽至言中時山果熟後夏竹隂繁此去逢何日峨嵋曉復昏送姚杭州白雲峰下城日夕白雲生人老江波釣田侵海樹耕吳山鍾如越蓮葉吹搖旌詩異石門思濤來向越迎夜集田卿宅朗詠高齋下如將古洞彈翻鴻向桂水來雪渡桑乾滴滴玉漏曙翛翛竹籟殘曩年曾宿此亦值五陵寒寄山友長孫栖嶠此時氣蕭颯琴院可應關鶴似君無事風吹雨遍山松生青石上泉落白雲間有徑連高頂心期相與還酬厲玄我來從北鄙子省陟西陵白髮初相識秋山擬共登鄰居帝城雨會宿御溝冰未報見貽作耿然中夜興送劉式洛中覲省晴峯三十六侍立上春臺同宿别離恨共看星月回野鶯臨苑語河棹厯江來便寄相思札緘封花下開送空公往金州七百里山水手中鄉栗粗松生師坐石潭滌祖傳盂長擬老嶽嶠又聞思海湖惠能同俗姓不是嶺南盧贈紹明上人未住青龍室中秋獨往年上方嵩古寺下視雨和一作如煙祖豈無言去心因斷臂傳不知能巳後更有幾燈然贈弘泉上人洗足下藍嶺古師精進同心知溪卉長居此玉林空西殿宵燈磬東林曙雨風舊峰鄰太白石座雨苔𪷟送宣皎上人逰太白剃髮鬢無雪去年三十三山過春草寺磬度落花潭得句才鄰約論宗意在南峰靈疑懶下蒼翠太虛參病起嵩邱歸未得空自責遲回身事豈能遂蘭花又巳開病令新作少雨阻故人來燈下南華卷祛愁當酒杯送殷侍御起同州馮翊蒲一作連蒲西郡沙岡擁地形中條全離嶽清渭半和涇夜莫眠明月秋深至洞庭猶來交辟士事別偃林扄送沈鶴家楚壻於秦携妻去養親陸行千里外風卷一帆新夜泊疏山雨秋吟搗藥輪蕪城登眺作一作後才動廣陵人秋夜仰懷錢孟二公琴客會月色四時好秋光君一作吾子知南山昨夜雨為我寫清規獨鶴聳寒骨高杉韻細颸仙家縹眇弄髣佛此中期贈李金州綺里祠前後山程踐白雲泝流隨大斾登岸見全軍曉角吹人夢秋風卷鴈群霧開方露日漢水底一作與沙分酬姚合校書因貧行道逺得見舊交遊美酒易傾盡好詩難卒酬公堂朝共到私第夜相留不覺入關晚別來林木秋送獨孤馬二秀才居明月山讀書濯志俱高潔儒科慕冉顔家辭臨水郡雨到讀書山棲鳥棕花上聲鍾礫閣間寂寥窗戶外時見一舟還病蟬病蟬飛不得向我掌中行折翼猶能薄酸吟尚極淸露華凝在腹塵點誤侵睛黃雀并鳶鳥俱懷害爾情靑門里作燕存鴻巳過海內幾人愁欲問南宗理將歸北嶽修若無攀桂分秪是卧雲休泉樹一為別依稀三十秋盧秀才南臺居在靑門里臺當千萬岑下因岡助勢上有樹交隂陵逺根才近空長畔可尋新晴登嘯處驚起宿枝禽寄李輈侍郎終過盟津書分明夢不虛人從淸渭別地隔太行餘賔幕誰嫌靜公門但晏如櫑鞞乾霹靂斜漢濕蟾蜍追琢垂今後敦龎得古𥘉井臺憐操築漳岸想丕疏亦冀鏗珉珮終當直石渠此身多抱疾幽里近營居憶潄蘇門澗經浮楚澤瀦松栽侵古影葷斷尚芹𦵔語默曾延接心源離滓淤誰言姓琴氏獨跨角生魚寄令狐綯相公驢駿勝羸馬東川路匪賖一緘論賈誼三蜀寄嚴家澄徹霜江水分明露石沙話言聲及政棧閣谷離斜自著衣偏暖誰憂雪六花裏裳留濶幞防患與通茶山館中宵起星河殘月華雙僮前日雇數口向天涯良樂知麒􆇷張雷驗鏌鎁謙光賢將相別𥿄聖龍蛇豈有斯言玷應無白璧瑕不妨圎魄裏人亦指蝦蟇再投李益常侍何處𥘉投刺當時赴尹京淹留花木變然諾肺腸傾避暑蟬移樹登高鴈過城人家嵩嶽色公府洛河聲聮句逢秋盡嘗茶見月生新衣裁白紵思從曲江行樓聞異香出塵頭末白入定衲凝霜莫話五湖事令人心欲狂送友人遊塞飄蓬多塞下君見益澘然逈磧沙銜日長河水接天夜泉行客火曉戍向京煙少結相思恨佳期芳草前思遊邉友人凝愁對孤燭昨日飲離杯葉下故人去天中新鴈來連沙秋草薄帶雪暮山開苑北紅塵道何時見逺廽秋暮寄友人寥落關河暮霜風樹葉低逺天垂地外寒日下峰西有志煙霞切無家歲月迷淸霄話白閣巳負十年棲寄令狐綯相公宫高頻勑授老色把犂鋤一主長江印三封東省書不無濠上思唯食圃中𬞞夢幻將泡影浮生事只如和孟逸人林下道情四時相陶鑄中庸道豈銷夏雲生此日春色盡今朝陋巷貧無悶毗耶疾未調巳栽天末柏合抱豈非遙宿姚少府北齋石溪同夜泛復此北齋期鳥絶吏歸後蛩鳴客卧時鎖城涼雨細開印曙鍾遲憶此漳川岸如今是別離雪晴晚望倚杖望晴雪溪雲幾萬重樵人歸白屋寒日下危峰野火燒岡草斷煙生石一作古松却廽山寺路聞打暮天鍾唐賈浪仙長江集卷第六
